WATCH
1. [Signal] — confirms if [X], denies if [Y]
2. [Signal] — confirms if [X], denies if [Y]
3. [Signal] — confirms if [X], denies if [Y]`;

    console.log('Thesis prompt size:', (userPrompt.length/1024).toFixed(1)+'KB');

    const resp = await fetch(FN+'generate-thesis',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ systemPrompt, userPrompt }),
    });
    if(!resp.ok){
      const errData = await resp.json().catch(()=>({error:'Unknown error '+resp.status}));
      throw new Error(errData.error||'Thesis gen failed: '+resp.status);
    }
    const data = await resp.json();
    theses[gameId] = data.thesis;
    localStorage.setItem('nba4:theses', JSON.stringify(theses));
    cs.genSteps[13].status = 'done';
  }catch(e){
    cs.genSteps[13].status = 'err';
    cs.genSteps[13].error = e.message;
    console.error('Thesis generation failed at step 14:', e.message, e.stack);
  }
  cs.generating = false;
  cs.genError = cs.genSteps[13]?.status==='err' ? cs.genSteps[13].error : null;
  paused = wasPaused; // Resume polling state
  renderCard(game);
}

function renderGenProgress(gameId){
  const el = document.getElementById('gen-progress-'+gameId);
  const cs = cardState[gameId];
  if(!el||!cs?.genSteps) return;
  el.innerHTML = cs.genSteps.map(s=>{
    const icon = s.status==='done'?'✓':s.status==='active'?'⟳':s.status==='err'?'✗':'·';
    return `<span class="gen-step ${s.status}">${icon} ${s.label}${s.error?' — '+s.error:''}</span>`;
  }).join('<br>');
}

// ══════════════════════════════════════════════════════════════════════════════
// COMPUTE INDICATORS (SR FORMAT)
// ══════════════════════════════════════════════════════════════════════════════
function compute(game){
  if(!game?.summary || getState(game)==='PRE') return null;
  const s = game.summary;
  const H = s.home, A = s.away;
  const hs = H?.statistics||{}, as = A?.statistics||{};
  const hA = H?.alias||H?.name||'HOME', aA = A?.alias||A?.name||'AWAY';
  const hS = H?.points||0, aS = A?.points||0;

  // I1 — Possession & Transition
  const hGen = (hs.steals||0)+(hs.offensive_rebounds||0)-(hs.turnovers||0);
  const aGen = (as.steals||0)+(as.offensive_rebounds||0)-(as.turnovers||0);
  const hConv = (hs.fast_break_points||0)+(hs.points_off_turnovers||0)+(hs.second_chance_points||0);
  const aConv = (as.fast_break_points||0)+(as.points_off_turnovers||0)+(as.second_chance_points||0);
  const i1 = (hGen>aGen?1:hGen<aGen?-1:0)+(hConv>aConv?1:hConv<aConv?-1:0);
  const I1={score:i1>0?1:i1===0?.5:0, leader:i1>0?hA:i1<0?aA:'EVEN',
    detail:`${hA} ${hs.steals||0}stl ${hs.offensive_rebounds||0}or ${hs.turnovers||0}to | ${aA} ${as.steals||0}stl ${as.offensive_rebounds||0}or ${as.turnovers||0}to | Conv:${hConv}–${aConv}`};

  // I2 — Rim Pressure & Foul
  const hPaint = hs.points_in_the_paint||0, aPaint = as.points_in_the_paint||0;
  const hAtRim = hs.field_goals_at_rim_att||0, aAtRim = as.field_goals_at_rim_att||0;
  const hFTA = hs.free_throws_att||0, aFTA = as.free_throws_att||0;
  const hBlk = hs.blocks||0, aBlk = as.blocks||0;
  const rimScore = (hPaint+hAtRim+hFTA+hBlk)-(aPaint+aAtRim+aFTA+aBlk);
  const I2={score:rimScore>10?1:rimScore<-10?0:.5, leader:rimScore>10?hA:rimScore<-10?aA:'EVEN',
    detail:`Paint:${hPaint}–${aPaint} AtRim:${hs.field_goals_at_rim_made||0}/${hAtRim}–${as.field_goals_at_rim_made||0}/${aAtRim} FTA:${hFTA}–${aFTA} BLK:${hBlk}–${aBlk}${H?.bonus?' '+hA+'⬤':''}${A?.bonus?' '+aA+'⬤':''}`};

  // I3 — Shot Quality & Creation
  const hFGA=hs.field_goals_att||1, aFGA=as.field_goals_att||1;
  const hEFG=(((hs.field_goals_made||0)+.5*(hs.three_points_made||0))/hFGA);
  const aEFG=(((as.field_goals_made||0)+.5*(as.three_points_made||0))/aFGA);
  const hAst=hs.assists||0, aAst=as.assists||0;
  const hFGM=hs.field_goals_made||1, aFGM=as.field_goals_made||1;
  const hAR=(hAst/hFGM)*100, aAR=(aAst/aFGM)*100;
  const i3=(hEFG>aEFG+.02?1:hEFG<aEFG-.02?-1:0)+(hAR>aAR+5?1:hAR<aAR-5?-1:0);
  const I3={score:i3>0?1:i3===0?.5:0, leader:i3>0?hA:i3<0?aA:'EVEN',
    detail:`eFG%:${(hEFG*100).toFixed(1)}–${(aEFG*100).toFixed(1)} AR:${hAR.toFixed(0)}–${aAR.toFixed(0)} AST:${hAst}–${aAst}`};

  // I4 — Lineup Integrity
  const periods = s.periods||[];
  const qDs = periods.map(p=>(p.home_points||0)-(p.away_points||0));
  const trend = qDs.length>=2 ? qDs[qDs.length-1]-qDs[0] : 0;
  const hBigLead = hs.biggest_lead||0, aBigLead = as.biggest_lead||0;
  const i4 = (hBigLead>aBigLead+4?1:hBigLead<aBigLead-4?-1:0)+(trend>2?1:trend<-2?-1:0);
  const I4={score:i4>0?1:i4===0?.5:0, leader:i4>0?hA:i4<0?aA:'EVEN',
    detail:`BigLead:${hBigLead}–${aBigLead} Δ:${hS>aS?'+':''}${hS-aS} trend:${trend>0?'+':''}${trend} ${qDs.map((d,i)=>'Q'+(i+1)+':'+(d>0?'+':'')+d).join(' ')}`};

  // I5 — Tempo & Efficiency
  const hOPPP = hs.offensive_points_per_possession||0, aOPPP = as.offensive_points_per_possession||0;
  const hDPPP = hs.defensive_points_per_possession||0, aDPPP = as.defensive_points_per_possession||0;
  const effD = (hOPPP-aDPPP)-(aOPPP-hDPPP);
  const hPoss = hs.possessions||0, aPoss = as.possessions||0;
  const I5={score:effD>0.08?1:effD<-0.08?0:.5, leader:effD>0.08?hA:effD<-0.08?aA:'EVEN',
    detail:`OPPP:${hOPPP.toFixed(2)}–${aOPPP.toFixed(2)} DPPP:${hDPPP.toFixed(2)}–${aDPPP.toFixed(2)} NetΔ:${effD>0?'+':''}${effD.toFixed(3)} Poss:${hPoss}–${aPoss}`};

  const raw = I1.score*W.I1 + I2.score*W.I2 + I3.score*W.I3 + I4.score*W.I4 + I5.score*W.I5;
  const controlHome = raw>=.5, cTeam = controlHome?hA:aA, score = controlHome?raw:1-raw;

  // Trajectory
  const traj = buildTrajectory(game, hA, aA, hs, as, H, A, hS, aS, qDs, periods);

  return {I1,I2,I3,I4,I5, score, controlTeam:cTeam, dataQuality:'FULL', traj};
}

function buildTrajectory(game, hA, aA, hs, as, H, A, hS, aS, qDs, periods){
  const p = game.period||0;
  if(p<2) return {signals:[], lean:'NEUTRAL', count:0, total:0, tooEarly:true};
  const sigs = [], overall=hS-aS, currQ=qDs.length>0?qDs[qDs.length-1]:null;

  // T1 — Conversion
  const hC=(hs.fast_break_points||0)+(hs.points_off_turnovers||0), aC=(as.fast_break_points||0)+(as.points_off_turnovers||0);
  if(Math.abs(hC-aC)>=10){const w=hC>aC?hA:aA;sigs.push({key:'T1',w:1,team:w,color:'#ffd166',text:w+' conversion +'+(Math.abs(hC-aC))+' (FBP+POT)'});}
  else sigs.push({key:'T1',w:0,team:null,color:'#3e3e48',text:'Conversion flat ('+hC+'–'+aC+')'});

  // T3 — Quarter Delta (highest weight)
  if(currQ!=null&&Math.abs(currQ)>=6){const w=currQ>0?hA:aA,tr=(currQ>0&&overall<0)||(currQ<0&&overall>0);sigs.push({key:'T3',w:2,team:w,color:'#00ff88',text:w+' winning Q'+p+' by '+Math.abs(currQ)+(tr?' (trailing—comeback)':'')});}
  else sigs.push({key:'T3',w:0,team:null,color:'#3e3e48',text:'Q delta <6 — neutral'});

  // T4 — Foul Gate (now available via SR per-player data)
  let t4sig = {key:'T4',w:0,team:null,color:'#3e3e48',text:'No foul crisis detected'};
  if(H?.players && A?.players){
    const allPlayers = [...(H.players||[]).map(pl=>({...pl,team:hA})),...(A.players||[]).map(pl=>({...pl,team:aA}))];
    for(const pl of allPlayers){
      const pf = pl.statistics?.personal_fouls||0;
      if((p<=1&&pf>=2)||(p===2&&pf>=3)||(p===3&&pf>=4)){
        const level=p<=1?'WATCH':p===2?'CONSTRAINT':'CRISIS';
        t4sig={key:'T4',w:1,team:pl.team===hA?aA:hA,color:'#ff6b6b',text:(pl.full_name||'?')+' '+pf+' fouls Q'+p+' — '+level};
        break;
      }
    }
  }
  sigs.push(t4sig);

  // T5 — Interior Trend
  const hPaint=hs.points_in_the_paint||0, aPaint=as.points_in_the_paint||0;
  if(Math.abs(hPaint-aPaint)>=8){const w=hPaint>aPaint?hA:aA;sigs.push({key:'T5',w:1,team:w,color:'#a8ff78',text:w+' paint +'+(Math.abs(hPaint-aPaint))+' ('+hPaint+'–'+aPaint+')'});}
  else sigs.push({key:'T5',w:0,team:null,color:'#3e3e48',text:'Paint even ('+hPaint+'–'+aPaint+')'});

  // T6 — Assist Ratio
  const hFGM=hs.field_goals_made||1,aFGM=as.field_goals_made||1;
  const hAR=(hs.assists||0)/hFGM*100, aAR=(as.assists||0)/aFGM*100;
  if(Math.abs(hAR-aAR)>=15){const w=hAR>aAR?hA:aA;sigs.push({key:'T6',w:1,team:w,color:'#a8ff78',text:w+' AR '+Math.max(hAR,aAR).toFixed(0)+'% vs '+Math.min(hAR,aAR).toFixed(0)+'%'});}
  else sigs.push({key:'T6',w:0,team:null,color:'#3e3e48',text:'AR even ('+hAR.toFixed(0)+'% vs '+aAR.toFixed(0)+'%)'});

  // T7 — Closing Lineup (now available via SR on_court)
  let t7sig = {key:'T7',w:0,team:null,color:'#3e3e48',text:'Lineup data pending'};
  if(p>=2 && H?.players && A?.players){
    // Identify on_court players and check if they're starters (high USG/minutes)
    const hOnCourt = (H.players||[]).filter(pl=>pl.on_court).map(pl=>pl.full_name||'?');
    const aOnCourt = (A.players||[]).filter(pl=>pl.on_court).map(pl=>pl.full_name||'?');
    if(hOnCourt.length>0||aOnCourt.length>0){
      t7sig.text = hA+': '+hOnCourt.length+' on court | '+aA+': '+aOnCourt.length+' on court';
    }
  }
  sigs.push(t7sig);

  // T8 — Shot Diet
  const hFGA=hs.field_goals_att||1, aFGA=as.field_goals_att||1;
  const h3r=(hs.three_points_att||0)/hFGA*100, a3r=(as.three_points_att||0)/aFGA*100;
  if(h3r>=40)sigs.push({key:'T8',w:1,team:aA,color:'#ff6b6b',text:hA+' 3PA/FGA '+h3r.toFixed(0)+'% — perimeter heavy'});
  else if(a3r>=40)sigs.push({key:'T8',w:1,team:hA,color:'#ff6b6b',text:aA+' 3PA/FGA '+a3r.toFixed(0)+'% — perimeter heavy'});
  else sigs.push({key:'T8',w:0,team:null,color:'#3e3e48',text:'Diet nominal ('+hA+' '+h3r.toFixed(0)+'% / '+aA+' '+a3r.toFixed(0)+'%)'});

  const lm={};sigs.forEach(s=>{if(s.team&&s.w>0)lm[s.team]=(lm[s.team]||0)+s.w;});
  const sorted=Object.entries(lm).sort((a,b)=>b[1]-a[1]),lean=sorted.length>0?sorted[0][0]:'NEUTRAL';
  const count=sigs.filter(s=>s.team===lean&&s.w>0).length,total=sigs.filter(s=>s.w>0).length;
  return {signals:sigs, lean, count, total, tooEarly:false};
}

function getVerdict(s){
  if(s>=.90) return {label:'DOMINANT',color:'#00ff88',bg:'rgba(0,255,136,.10)',lvl:'entry'};
  if(s>=.75) return {label:'STRONG',color:'#a8ff78',bg:'rgba(168,255,120,.08)',lvl:'entry'};
  if(s>=.60) return {label:'EARNED',color:'#ffd166',bg:'rgba(255,209,102,.08)',lvl:'watch'};
  if(s>=.45) return {label:'NO EDGE',color:'#ff5252',bg:'rgba(255,82,82,.06)',lvl:null};
  return {label:'WAIT',color:'#555',bg:'rgba(60,60,60,.06)',lvl:null};
}

// ══════════════════════════════════════════════════════════════════════════════
// COMPUTE DISPATCH — routes to SR or BDL compute path
// ══════════════════════════════════════════════════════════════════════════════
function computeAny(game){
  if(game.dataSource==='BDL' && game.bdlData) return computeBDL(game);
  return compute(game);
}

// ══════════════════════════════════════════════════════════════════════════════
// COMPUTE INDICATORS (BDL FORMAT) — Option B: separate path
// ══════════════════════════════════════════════════════════════════════════════
function computeBDL(game){
  const d = game.bdlData;
  if(!d || getState(game)==='PRE') return null;
  const hs = d.home, as = d.away;
  const hA = hs.alias||'HOME', aA = as.alias||'AWAY';
  const hS = d.homePoints||0, aS = d.awayPoints||0;

  // I1 — Possession & Transition (no chaos layer — forced/unforced TOs unavailable)
  const hGen = (hs.steals||0)+(hs.offensive_rebounds||0)-(hs.turnovers||0);
  const aGen = (as.steals||0)+(as.offensive_rebounds||0)-(as.turnovers||0);
  const hConv = (hs.fast_break_points||0)+(hs.points_off_turnovers||0)+(hs.second_chance_points||0);
  const aConv = (as.fast_break_points||0)+(as.points_off_turnovers||0)+(as.second_chance_points||0);
  const i1 = (hGen>aGen?1:hGen<aGen?-1:0)+(hConv>aConv?1:hConv<aConv?-1:0);
  const I1={score:i1>0?1:i1===0?.5:0, leader:i1>0?hA:i1<0?aA:'EVEN',
    detail:`${hA} ${hs.steals||0}stl ${hs.offensive_rebounds||0}or ${hs.turnovers||0}to | ${aA} ${as.steals||0}stl ${as.offensive_rebounds||0}or ${as.turnovers||0}to | Conv:${hConv}–${aConv} [no chaos layer]`};

  // I2 — Rim Pressure & Foul (paint + FTA + bonus from BDL — no at-rim splits)
  const hPaint = hs.points_in_the_paint||0, aPaint = as.points_in_the_paint||0;
  const hFTA = hs.free_throws_att||0, aFTA = as.free_throws_att||0;
  const hBlk = hs.blocks||0, aBlk = as.blocks||0;
  const rimScore = (hPaint+hFTA+hBlk)-(aPaint+aFTA+aBlk);
  const I2={score:rimScore>8?1:rimScore<-8?0:.5, leader:rimScore>8?hA:rimScore<-8?aA:'EVEN',
    detail:`Paint:${hPaint}–${aPaint} FTA:${hFTA}–${aFTA} BLK:${hBlk}–${aBlk}${d.homeBonus?' '+hA+'⬤':''}${d.awayBonus?' '+aA+'⬤':''} [no at-rim]`};

  // I3 — Shot Quality & Creation (full-game assist ratio only, no per-quarter trend)
  const hFGA=hs.field_goals_att||1, aFGA=as.field_goals_att||1;
  const hEFG=(((hs.field_goals_made||0)+.5*(hs.three_points_made||0))/hFGA);
  const aEFG=(((as.field_goals_made||0)+.5*(as.three_points_made||0))/aFGA);
  const hAst=hs.assists||0, aAst=as.assists||0;
  const hFGM=hs.field_goals_made||1, aFGM=as.field_goals_made||1;
  const hAR=(hAst/hFGM)*100, aAR=(aAst/aFGM)*100;
  const i3=(hEFG>aEFG+.02?1:hEFG<aEFG-.02?-1:0)+(hAR>aAR+5?1:hAR<aAR-5?-1:0);
  const I3={score:i3>0?1:i3===0?.5:0, leader:i3>0?hA:i3<0?aA:'EVEN',
    detail:`eFG%:${(hEFG*100).toFixed(1)}–${(aEFG*100).toFixed(1)} AR:${hAR.toFixed(0)}–${aAR.toFixed(0)} AST:${hAst}–${aAst}`};

  // I4 — Lineup Integrity (score delta + quarters — no on_court, no per-Q plus/minus)
  const qDs = (d.quarters||[]).map(q=>(q.home_points||0)-(q.away_points||0));
  const trend = qDs.length>=2 ? qDs[qDs.length-1]-qDs[0] : 0;
  // No biggest_lead from BDL — use score differential as proxy
  const scoreDiff = Math.abs(hS-aS);
  const i4 = (scoreDiff>8&&hS>aS?1:scoreDiff>8&&aS>hS?-1:0)+(trend>2?1:trend<-2?-1:0);
  const I4={score:i4>0?1:i4===0?.5:0, leader:i4>0?hA:i4<0?aA:'EVEN',
    detail:`Δ:${hS>aS?'+':''}${hS-aS} trend:${trend>0?'+':''}${trend} ${qDs.map((dd,i)=>'Q'+(i+1)+':'+(dd>0?'+':'')+dd).join(' ')} [no lineup/bench split]`};

  // I5 — Tempo & Efficiency (derived from BDL offensive/defensive rating)
  const hOPPP = (hs.offensive_rating||0)/100, aOPPP = (as.offensive_rating||0)/100;
  const hDPPP = (hs.defensive_rating||0)/100, aDPPP = (as.defensive_rating||0)/100;
  const effD = (hOPPP-aDPPP)-(aOPPP-hDPPP);
  const hPoss = hs.possessions||0, aPoss = as.possessions||0;
  const I5={score:effD>0.08?1:effD<-0.08?0:.5, leader:effD>0.08?hA:effD<-0.08?aA:'EVEN',
    detail:`ORtg:${(hs.offensive_rating||0).toFixed(1)}–${(as.offensive_rating||0).toFixed(1)} DRtg:${(hs.defensive_rating||0).toFixed(1)}–${(as.defensive_rating||0).toFixed(1)} Poss:${hPoss}–${aPoss}`};

  const raw = I1.score*W.I1 + I2.score*W.I2 + I3.score*W.I3 + I4.score*W.I4 + I5.score*W.I5;
  const controlHome = raw>=.5, cTeam = controlHome?hA:aA, score = controlHome?raw:1-raw;

  // Trajectory — BDL partial (T4 and T7 unavailable)
  const traj = buildTrajectoryBDL(game, hA, aA, hs, as, hS, aS, qDs, d);

  return {I1,I2,I3,I4,I5, score, controlTeam:cTeam, dataQuality:'PARTIAL', traj};
}

function buildTrajectoryBDL(game, hA, aA, hs, as, hS, aS, qDs, d){
  const p = game.period||0;
  if(p<2) return {signals:[], lean:'NEUTRAL', count:0, total:0, tooEarly:true};
  const sigs = [], overall=hS-aS, currQ=qDs.length>0?qDs[qDs.length-1]:null;

  // T1 — Conversion (available via BDL advanced)
  const hC=(hs.fast_break_points||0)+(hs.points_off_turnovers||0), aC=(as.fast_break_points||0)+(as.points_off_turnovers||0);
  if(Math.abs(hC-aC)>=10){const w=hC>aC?hA:aA;sigs.push({key:'T1',w:1,team:w,color:'#ffd166',text:w+' conversion +'+(Math.abs(hC-aC))+' (FBP+POT)'});}
  else sigs.push({key:'T1',w:0,team:null,color:'#3e3e48',text:'Conversion flat ('+hC+'–'+aC+')'});

  // T3 — Quarter Delta (available from BDL quarter scores)
  if(currQ!=null&&Math.abs(currQ)>=6){const w=currQ>0?hA:aA,tr=(currQ>0&&overall<0)||(currQ<0&&overall>0);sigs.push({key:'T3',w:2,team:w,color:'#00ff88',text:w+' winning Q'+p+' by '+Math.abs(currQ)+(tr?' (trailing—comeback)':'')});}
  else sigs.push({key:'T3',w:0,team:null,color:'#3e3e48',text:'Q delta <6 — neutral'});

  // T4 — UNAVAILABLE in BDL (no per-player per-quarter fouls)
  sigs.push({key:'T4',w:0,team:null,color:'#555',text:'⊘ Unavailable (BDL — no per-player fouls)'});

  // T5 — Interior Trend (paint points available)
  const hPaint=hs.points_in_the_paint||0, aPaint=as.points_in_the_paint||0;
  if(Math.abs(hPaint-aPaint)>=8){const w=hPaint>aPaint?hA:aA;sigs.push({key:'T5',w:1,team:w,color:'#a8ff78',text:w+' paint +'+(Math.abs(hPaint-aPaint))+' ('+hPaint+'–'+aPaint+')'});}
  else sigs.push({key:'T5',w:0,team:null,color:'#3e3e48',text:'Paint even ('+hPaint+'–'+aPaint+')'});

  // T6 — Assist Ratio (full-game only, no per-quarter)
  const hFGM=hs.field_goals_made||1,aFGM=as.field_goals_made||1;
  const hAR=(hs.assists||0)/hFGM*100, aAR=(as.assists||0)/aFGM*100;
  if(Math.abs(hAR-aAR)>=15){const w=hAR>aAR?hA:aA;sigs.push({key:'T6',w:1,team:w,color:'#a8ff78',text:w+' AR '+Math.max(hAR,aAR).toFixed(0)+'% vs '+Math.min(hAR,aAR).toFixed(0)+'%'});}
  else sigs.push({key:'T6',w:0,team:null,color:'#3e3e48',text:'AR even ('+hAR.toFixed(0)+'% vs '+aAR.toFixed(0)+'%)'});

  // T7 — UNAVAILABLE in BDL (no on_court flags)
  sigs.push({key:'T7',w:0,team:null,color:'#555',text:'⊘ Unavailable (BDL — no lineup data)'});

  // T8 — Shot Diet (3PA/FGA available from BDL basic stats)
  const hFGA=hs.field_goals_att||1, aFGA=as.field_goals_att||1;
  const h3r=(hs.three_points_att||0)/hFGA*100, a3r=(as.three_points_att||0)/aFGA*100;
  if(h3r>=40)sigs.push({key:'T8',w:1,team:aA,color:'#ff6b6b',text:hA+' 3PA/FGA '+h3r.toFixed(0)+'% — perimeter heavy'});
  else if(a3r>=40)sigs.push({key:'T8',w:1,team:hA,color:'#ff6b6b',text:aA+' 3PA/FGA '+a3r.toFixed(0)+'% — perimeter heavy'});
  else sigs.push({key:'T8',w:0,team:null,color:'#3e3e48',text:'Diet nominal ('+hA+' '+h3r.toFixed(0)+'% / '+aA+' '+a3r.toFixed(0)+'%)'});

  const lm={};sigs.forEach(s=>{if(s.team&&s.w>0)lm[s.team]=(lm[s.team]||0)+s.w;});
  const sorted=Object.entries(lm).sort((a,b)=>b[1]-a[1]),lean=sorted.length>0?sorted[0][0]:'NEUTRAL';
  const count=sigs.filter(s=>s.team===lean&&s.w>0).length,total=sigs.filter(s=>s.w>0).length;
  return {signals:sigs, lean, count, total, tooEarly:false};
}

// UI HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function showLoading(v){document.getElementById('loading').style.display=v?'flex':'none';}
function showErr(msg){const el=document.getElementById('err');el.style.display=msg?'block':'none';if(msg)el.textContent='⚠ '+msg;}
function getState(g){const s=(g.status||'').toLowerCase();if(s==='closed'||s==='complete')return'FINAL';if(s==='inprogress'||s==='halftime')return'LIVE';return'PRE';}
function updateCounts(){
  const lc=games.filter(g=>getState(g)==='LIVE').length;
  document.getElementById('live-count').textContent=lc;
  document.getElementById('sel-count').textContent=selIds.length;
  document.getElementById('game-count').textContent=games.length;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setPaused(v){
  paused=v;
  document.getElementById('btn-live').classList.toggle('on',!v);
  document.getElementById('btn-pause').classList.toggle('on',v);
  document.getElementById('pulse').classList.toggle('off',v);
  document.getElementById('hdr-sub').textContent=(v?'PAUSED':'LIVE')+' · SR via Netlify · v5.0 · FULL';
}

function setFreq(sec){
  pollInterval=sec*1000;
  ['f30','f60','f90'].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove('on','warn');
  });
  document.getElementById('f'+sec).classList.add('on');
  if(sec===30) document.getElementById('f30').classList.add('warn');
  clearInterval(pollTimer);
  pollTimer=setInterval(()=>{if(!paused)refreshLiveCards();}, pollInterval);
}

// ── Alert ─────────────────────────────────────────────────────────────────
function showAlert(type,msg){
  const el=document.getElementById('abar');
  document.getElementById('abar-msg').textContent=(type==='entry'?'⬤ ENTRY SIGNAL':'⬤ WATCH')+' — '+msg;
  el.className='abar show '+type;
  clearTimeout(alertTimer);alertTimer=setTimeout(hideAlert,8000);
}
function hideAlert(){document.getElementById('abar').className='abar';}

function checkAlert(game){
  const cs=cardState[game.id];if(!cs)return;
  const ind=cs.sonnetIndicators||computeAny(game);if(!ind)return;
  const v=getVerdict(ind.score);
  if(v.lvl&&v.lvl!==cs.prevLvl)
    showAlert(v.lvl,ind.controlTeam+' '+v.label+' — '+(game.away?.alias||'')+'@'+(game.home?.alias||''));
  cs.prevLvl=v.lvl;
}

// ── Pills ─────────────────────────────────────────────────────────────────
function renderPills(){
  const q=(document.getElementById('search').value||'').toUpperCase();
  const filtered=games.filter(g=>{
    if(!q)return true;
    return[g.home?.alias,g.away?.alias,g.home?.name,g.away?.name].some(s=>s?.toUpperCase().includes(q));
  });
  document.getElementById('pills').innerHTML=filtered.map(g=>{
    const gs=getState(g),sel=selIds.includes(g.id);
    const cls='pill'+(sel?' sel':gs==='LIVE'?' live':gs==='FINAL'?' done':'');
    let label=(g.away?.alias||'?')+'@'+(g.home?.alias||'?');
    if(gs==='LIVE') label+=' Q'+(g.period||'?');
    else if(gs==='FINAL') label+=' F';
    else try{label+=' '+new Date(g.scheduled).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/Phoenix'});}catch(e){}
    return`<button class="${cls}" onclick="toggleGame('${g.id}')">${label}</button>`;
  }).join('');
  renderGrid();
}

function toggleGame(id){
  if(selIds.includes(id)) selIds=selIds.filter(x=>x!==id);
  else if(selIds.length<5) selIds.push(id);
  renderPills(); updateCounts();
}

function renderGrid(){
  const sel=games.filter(g=>selIds.includes(g.id));
  document.getElementById('empty').style.display=sel.length?'none':'block';
  document.getElementById('grid').style.display=sel.length?'grid':'none';
  sel.forEach(g=>{if(!document.getElementById('card-'+g.id))mountCard(g);});
  document.querySelectorAll('[id^="card-"]').forEach(el=>{
    const id=el.id.replace('card-','');
    if(!selIds.includes(id)){
      if(cardState[id]?._countdown)clearInterval(cardState[id]._countdown);
      delete cardState[id];
      el.remove();
    }
  });
}

// ── Thesis helpers ────────────────────────────────────────────────────────
function saveThesis(gameId,text){theses[gameId]=text;localStorage.setItem('nba4:theses',JSON.stringify(theses));}
function clearTheses(){if(!confirm('Clear all theses?'))return;Object.keys(theses).forEach(k=>delete theses[k]);localStorage.removeItem('nba4:theses');games.filter(g=>selIds.includes(g.id)).forEach(g=>renderCard(g));}
function parseThesis(t){
  if(!t)return{lean:null,entry:null,pass:null,watches:[],flags:[]};
  const r={lean:null,entry:null,pass:null,watches:[],flags:[]};
  t.split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{
    const l=line.toLowerCase();
    if(l.startsWith('lean:'))r.lean=line.replace(/^lean:?\s*/i,'').trim();
    else if(l.startsWith('entry'))r.entry=line.replace(/^entry(?: trigger)?:?\s*/i,'').trim();
    else if(l.startsWith('pass'))r.pass=line.replace(/^pass(?: if)?:?\s*/i,'').trim();
    else if(l.startsWith('watch:'))r.watches.push(line.replace(/^-?\s*watch:?\s*/i,'').trim());
    else if(l.startsWith('flag:')||l.startsWith('⚠')||l.startsWith('!'))r.flags.push(line.replace(/^[⚠!]\s*|^flag:?\s*/i,'').trim());
    else if(/^\d+\.\s+/.test(line))r.watches.push(line.replace(/^\d+\.\s+/,''));
  });
  return r;
}
function crossRef(parsed,ind){
  if(!parsed||!ind||!parsed.watches.length)return[];
  const a=[],txt=parsed.watches.join(' ').toLowerCase();
  if((txt.includes('turnover')||txt.includes('to rate'))&&ind.I1)
    a.push(ind.I1.score===0?{msg:'⚠ Turnover concern confirmed — I1 flagged',level:'warn'}:{msg:'✓ Turnover rate holding — I1 intact',level:'ok'});
  if((txt.includes('paint')||txt.includes('interior')||txt.includes('rim'))&&ind.I2)
    a.push(ind.I2.score===1?{msg:'✓ Interior edge confirmed — I2 developing',level:'ok'}:ind.I2.score===0?{msg:'⚠ Interior edge denied',level:'warn'}:{msg:'I2 contested',level:'info'});
  if((txt.includes('assist')||txt.includes('creation'))&&ind.I3)
    a.push(ind.I3.score===1?{msg:'✓ Ball movement confirmed — I3 developing',level:'ok'}:{msg:'⚠ Creation edge not materializing',level:'warn'});
  if((txt.includes('bonus')||txt.includes('foul'))&&ind.I2)
    a.push({msg:'Foul/bonus: '+ind.I2.detail,level:'info'});
  return a;
}

// CARD MOUNT & RENDER
// ══════════════════════════════════════════════════════════════════════════════
function mountCard(game){
  const id=game.id;
  cardState[id]={logs:[],lastUp:null,editing:false,generating:false,analyzing:false,
    prevLvl:null,_countdown:null,lastFingerprint:'',analysis:null,analysisTime:null,genSteps:null,genError:null,
    lastScoreFP:'',lastStatsFP:'',staleCount:0,dataFreshness:'FRESH',sonnetIndicators:null,
    prediction:null, clutchData:null, clutchTier:3, oddsData:null, oddsAll:null, oddsHistory:[], trackingData:null, enriching:false, enrichDone:false, evCollapsed:false, edgeHistory:[]};
  // Auto-distribute global clutch data if available (uploaded before game selected)
  if(globalClutchData?.teams){
    const hA = game.home?.alias||'', aA = game.away?.alias||'';
    const hC = globalClutchData.teams[hA], aC = globalClutchData.teams[aA];
    if(hC || aC){
      const cs = cardState[id];
      cs.clutchData = {
        tier:1,
        home: hC ? { netRtg:hC.netRtg, offRtg:hC.offRtg, defRtg:hC.defRtg, gp:hC.gp, w:hC.w, l:hC.l, wl:hC.wl, efg:hC.efg, ts:hC.ts, pace:hC.pace, pie:hC.pie, tovPct:hC.tovPct, orebPct:hC.orebPct, drebPct:hC.drebPct, astRatio:hC.astRatio } : {},
        away: aC ? { netRtg:aC.netRtg, offRtg:aC.offRtg, defRtg:aC.defRtg, gp:aC.gp, w:aC.w, l:aC.l, wl:aC.wl, efg:aC.efg, ts:aC.ts, pace:aC.pace, pie:aC.pie, tovPct:aC.tovPct, orebPct:aC.orebPct, drebPct:aC.drebPct, astRatio:aC.astRatio } : {},
      };
      cs.clutchTier = 1;
      addLog(id, `📋 L15 clutch auto-loaded from OCR`, true);
    }
  }
  const div=document.createElement('div');
  div.id='card-'+id;
  document.getElementById('grid').appendChild(div);
  renderCard(game);
  if(getState(game)==='LIVE'||getState(game)==='FINAL') fetchSummary(game);
}

function addLog(id,msg,ok){const cs=cardState[id];if(!cs)return;cs.logs=[...cs.logs.slice(-5),{msg,ok,t:new Date().toLocaleTimeString()}];}

function renderCard(game){
  const id=game.id, cs=cardState[id];
  if(!cs||cs.editing) return;
  const el=document.getElementById('card-'+id);
  if(!el)return;
  const state=getState(game), rawInd=computeAny(game);
  // Prefer Sonnet indicators when available, fall back to compute()
  const ind = cs.sonnetIndicators || rawInd;
  const v=ind?getVerdict(ind.score):null;
  // Count indicators where the leader matches the controlling team (0.75+ for Sonnet, 1.0 for compute)
  const indWon = ind ? [ind.I1,ind.I2,ind.I3,ind.I4,ind.I5].filter(d => {
    if(d.leader === 'EVEN') return false;
    const leaderMatchesControl = d.leader.toUpperCase().substring(0,3) === ind.controlTeam.toUpperCase().substring(0,3);
    return leaderMatchesControl;
  }).length : 0;
  const indTotal = 5;
  const thesis=theses[id]||'', p=parseThesis(thesis);
  const xrefs=ind&&state!=='PRE'?crossRef(p,ind):[];
  const hA=game.home?.alias||'HOME', aA=game.away?.alias||'AWAY';
  const periodLabel=state==='PRE'?'PRE':state==='FINAL'?'FINAL':({1:'1ST',2:'2ND',3:'3RD',4:'4TH',5:'OT',6:'2OT'}[game.period]||'Q'+game.period);
  el.className='card'+(v?.lvl==='entry'?' ce':v?.lvl==='watch'?' cw':'');

  let html=`
  <div class="ch">
    <div><div class="mup">${esc(aA)} @ ${esc(hA)}</div>

    <div class="chr">${state==='LIVE'?'<div class="ld"></div>':''}<span class="pb">${periodLabel}${game.clock?' '+game.clock:''}</span></div>
  </div>
  <div class="sr">
    <div><div class="srt">${esc(aA)}</div>
    <div><span class="srs">${state==='PRE'?'—':game.awayPoints??'—'}</span>${game.summary?.away?.bonus?'<span class="bonus-tag">BONUS</span>':''}</div></div>
    <span class="sr-sep">–</span>
    <div style="text-align:right"><div class="srt">${esc(hA)}</div>
    <div>${game.summary?.home?.bonus?'<span class="bonus-tag">BONUS</span>':''}<span class="srs">${state==='PRE'?'—':game.homePoints??'—'}</span></div></div>
  </div>`;

  if(state==='PRE'){
    const ms=new Date(game.scheduled)-new Date();
    const h=Math.max(0,Math.floor(ms/3600000)),m=Math.max(0,Math.floor((ms%3600000)/60000)),s=Math.max(0,Math.floor((ms%60000)/1000));
    const cdown=ms<=0?'TIP OFF SOON':(h>0?h+'h ':'')+m+'m '+String(s).padStart(2,'0')+'s';
    html+=`<div class="pre"><div class="prelbl">TIP OFF IN</div><div class="countdown">${cdown}</div>
    <div class="prediv"></div><div style="font-size:6px;color:var(--t3)">Indicators activate at tip · Generate or paste thesis below</div></div>`;
  }

  if(state!=='PRE'&&ind){
    const analyzeBtn = state==='LIVE' ? (cs.analyzing ? `<button class="tgen" style="font-size:6px;padding:1px 6px;margin-left:4px;opacity:.5;color:var(--t3);border-color:var(--t3);" disabled>⏳ ANALYZING</button>` : `<button class="tgen" style="font-size:6px;padding:1px 6px;margin-left:4px;" onclick="triggerAnalysis(games.find(g=>g.id==='${id}'))">⚡ ANALYZE</button>`) : '';
    const pred = cs.prediction;

    // ─── CONTROL BAR (compact) ───
    html+=`
    <div class="ctrl-bar">
      <div class="vrd" style="color:${v.color};border-color:${v.color};background:${v.bg}">${v.label} (${indWon}/${indTotal})</div>
      <div><div class="cl">CONTROL</div><div class="ct">${esc(ind.controlTeam)}</div></div>
      <div class="bw"><div class="bt2"><div class="bf" style="width:${ind.score*100}%;background:${v.color}"></div></div></div>
      <div class="cn" style="color:${v.color}">${ind.score.toFixed(2)}</div>
      <span class="dq" style="${ind.dataQuality==='PARTIAL'?'color:var(--yellow);border-color:var(--yellow)':ind.dataQuality==='SONNET'?'color:#a78bfa;border-color:#a78bfa':''}">${ind.dataQuality==='SONNET'?'SONNET':ind.dataQuality}${ind.traj&&!ind.traj.tooEarly?' ('+ind.traj.count+'/'+ind.traj.total+')':''}</span>
    </div>`;

    // ─── DECISION VIEW (primary — always visible) ───
    if(pred){
      const edgeNum = pred.edgeNum;
      const edgeColor = edgeNum===null?'var(--t3)':edgeNum>=10?'var(--green)':edgeNum>=5?'var(--g2)':edgeNum>=1?'var(--yellow)':edgeNum>=0?'var(--t3)':'var(--red)';
      const convColor = ({DOMINANT:'var(--green)',STRONG:'var(--g2)',EARNED:'var(--yellow)',CONDITIONAL:'var(--amber)'})[pred.conviction]||'var(--t3)';
      const entryColor = pred.entry==='OPTIMAL WINDOW'?'var(--green)':pred.entry==='WINDOW OPEN'?'var(--g2)':pred.entry==='WINDOW CLOSING'?'var(--yellow)':pred.entry==='COUNTER-SIGNAL'?'var(--red)':'var(--t3)';

      // Edge history analysis
      const eh = cs.edgeHistory.filter(e=>e.edgeNum!==null&&e.edgeNum!==undefined);
      let peakEdge = null, edgeTrend = '';
      if(eh.length >= 2){
        peakEdge = eh.reduce((max,e)=>e.edgeNum>max.edgeNum?e:max, eh[0]);
        const recent = eh.slice(-2);
        const diff = recent[1].edgeNum - recent[0].edgeNum;
        edgeTrend = diff > 1.5 ? '▲' : diff < -1.5 ? '▼' : '─';
      }

      // Clutch tier badge
      const clutchTier = cs.clutchTier || (cs.clutchData?.tier) || 3;
      const tierBadge = clutchTier===1 ? 'T1·L15' : clutchTier===2 ? 'T2·PRX' : 'T3·Δ';
      const tierColor = clutchTier===1 ? 'var(--green)' : clutchTier===2 ? 'var(--yellow)' : 'var(--t3)';

      html+=`
      <div class="dv">
        <div class="dv-hdr">DECISION ${analyzeBtn}<span class="analysis-cost">${cs.analysisTime?cs.analysisTime.toLocaleTimeString():''}</span></div>
        <div class="dv-row">
          <span class="dv-label">EDGE</span>
          <span class="dv-val" style="color:${edgeColor}">${esc(pred.edge||'—')}</span>
          <span class="dv-sub">FWP ${esc(pred.fwp||'—')}</span>
          <span class="dv-sub">MIP ${esc(pred.mip||'N/A')}</span>
          ${edgeTrend?`<span style="font-size:8px;color:${edgeTrend==='▲'?'var(--green)':edgeTrend==='▼'?'var(--red)':'var(--t3)'};margin-left:2px">${edgeTrend}</span>`:''}
        </div>
        ${peakEdge?`<div class="dv-row"><span class="dv-label">PEAK</span><span class="dv-sub" style="color:var(--t2)">+${peakEdge.edgeNum.toFixed(1)}% at ${peakEdge.time} (${peakEdge.score})</span></div>`:''}
        <div class="dv-row">
          <span class="dv-label">ENTRY</span>
          <span class="dv-tag" style="color:${entryColor};border-color:${entryColor}">${esc(pred.entry||'—')}</span>
          <span class="dv-tag" style="color:${convColor};border-color:${convColor};margin-left:4px">${esc(pred.conviction||'—')}</span>
        </div>
        <div class="dv-row">
          <span class="dv-label">SUSTAIN</span>
          <span class="dv-sub">${esc(pred.sustainability||'—')}</span>
        </div>
        <div class="dv-row">
          <span class="dv-label">CLUTCH</span>
          <span class="dv-tag" style="font-size:5px;color:${tierColor};border-color:${tierColor};padding:0 3px">${tierBadge}</span>
          <span class="dv-sub">${esc(pred.clutch||'No data')}</span>
        </div>
        <div class="dv-pred">${esc(pred.prediction||'')}</div>
        ${eh.length>=3?`<div style="font-size:5px;color:var(--t2);margin-top:3px;letter-spacing:.5px">EDGE HISTORY: ${eh.slice(-6).map(e=>(e.edgeNum>=0?'+':'')+e.edgeNum.toFixed(0)+'%').join(' → ')}</div>`:''}
      </div>`;
    } else if(cs.analyzing){
      html+=`<div class="dv"><div class="dv-hdr">DECISION</div><div class="analysis-loading"><div class="spin"></div> Sonnet analyzing…</div></div>`;
    } else {
      html+=`<div class="dv"><div class="dv-hdr">DECISION ${analyzeBtn}</div><div style="font-size:6px;color:var(--t3);padding:2px 0">${cs.analysisError?'<span style="color:var(--red)">⚠ '+esc(cs.analysisError)+'</span>':game.period<2?'Predictive layer activates Q2+ on data change':'Awaiting analysis — press ⚡ or wait for data change'}</div></div>`;
    }

    // ─── DATA INPUTS (Clutch + Odds) ───
    const cl = cs.clutchData, od = cs.oddsData;
    const cTier = cs.clutchTier || (cl?.tier) || 3;
    const isOCR = cTier===1 && globalClutchData?.teams;
    const cTierLabel = cTier===1 ? (isOCR ? '<span style="color:var(--green)">✓ TIER 1 (OCR)</span>' : '<span style="color:var(--green)">✓ TIER 1 (L15)</span>') : cTier===2 ? '<span style="color:var(--yellow)">✓ TIER 2 (BDL)</span>' : '<span style="color:var(--t3)">TIER 3 (manual)</span>';
    html+=`<div class="data-inputs">
      <div class="di-hdr">MARKET & CLUTCH<span style="font-size:5px">${cTierLabel} · ${od?'<span style="color:var(--green)">✓ ODDS</span>':'<span style="color:var(--t3)">no odds</span>'}${cs.trackingData?' · <span style="color:var(--green)">✓ TRACKING</span>':''}</span>
        <button class="di-btn" style="margin-left:auto;background:${cs.enriching?'var(--b2)':cs.enrichDone?'rgba(0,255,136,.15)':'rgba(147,130,220,.15)'};color:${cs.enriching?'var(--t3)':cs.enrichDone?'var(--green)':'#9382dc'};font-size:6px;padding:2px 6px" onclick="enrichFromBDL('${id}')" ${cs.enriching?'disabled':''}>${cs.enriching?'⏳ PULLING...':cs.enrichDone?'✓ UPDATED':'⚡ ENRICH'}</button>
      </div>
      <div class="di-row" style="margin-bottom:0;gap:3px">
        <span class="di-lbl"></span>
        <span style="width:54px;font-size:5px;color:var(--t2);text-align:center;letter-spacing:.3px">SPREAD</span>
        <span style="width:54px;font-size:5px;color:var(--t2);text-align:center;letter-spacing:.3px">${esc(hA)} ML</span>
        <span style="width:54px;font-size:5px;color:var(--t2);text-align:center;letter-spacing:.3px">${esc(aA)} ML</span>
        <span style="width:48px;font-size:5px;color:var(--t2);text-align:center;letter-spacing:.3px">TOTAL</span>
      </div>
      <div class="di-row" style="gap:3px">
        <span class="di-lbl">ODDS</span>
        <input class="di-input di-sm" id="od-hs-${id}" placeholder="sprd" value="${od?.homeSpread||''}" style="width:54px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <input class="di-input di-sm" id="od-hml-${id}" placeholder="ML" value="${od?.homeML||''}" style="width:54px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <input class="di-input di-sm" id="od-aml-${id}" placeholder="ML" value="${od?.awayML||''}" style="width:54px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <input class="di-input di-sm" id="od-tot-${id}" placeholder="O/U" value="${od?.total||''}" style="width:48px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <button class="di-btn" onclick="saveOdds('${id}')">SET</button>
      </div>`;
    // Odds movement row
    const mv = oddsMovement(cs);
    if(mv){
      const cell = (d) => d ? `<span style="width:54px;font-size:5px;text-align:center;color:${d.color}">${d.val}</span>` : `<span style="width:54px;font-size:5px;text-align:center;color:var(--t3)">—</span>`;
      html+=`<div class="di-row" style="gap:3px;margin-top:0;margin-bottom:1px">
        <span class="di-lbl" style="font-size:5px;color:var(--t2)">MOVE</span>
        ${cell(mv.spread)}${cell(mv.homeML)}${cell(mv.awayML)}
        <span style="width:48px;font-size:5px;text-align:center;color:${mv.total?mv.total.color:'var(--t3)'}">${mv.total?mv.total.val:'—'}</span>
        <span style="font-size:4px;color:var(--t2);white-space:nowrap">${mv.pulls} pulls</span>
      </div>`;
    }
    html+=`<div class="di-row" style="margin-bottom:0;gap:3px">
        <span class="di-lbl"></span>
        <span style="width:54px;font-size:5px;color:var(--t2);text-align:center;letter-spacing:.3px">NET RTG</span>
        <span style="width:54px;font-size:5px;color:var(--t2);text-align:center;letter-spacing:.3px">OFF RTG</span>
        <span style="width:54px;font-size:5px;color:var(--t2);text-align:center;letter-spacing:.3px">DEF RTG</span>
        <span style="width:32px;font-size:5px;color:var(--t2);text-align:center;letter-spacing:.3px">GP</span>
        <span style="width:40px;font-size:5px;color:var(--t2);text-align:center;letter-spacing:.3px">W-L</span>
      </div>
      <div class="di-row" style="gap:3px">
        <span class="di-lbl">L15 ${esc(hA)}</span>
        <input class="di-input di-sm" id="cl-h-net-${id}" placeholder="" value="${cl?.home?.netRtg??''}" style="width:54px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <input class="di-input di-sm" id="cl-h-off-${id}" placeholder="" value="${cl?.home?.offRtg??''}" style="width:54px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <input class="di-input di-sm" id="cl-h-def-${id}" placeholder="" value="${cl?.home?.defRtg??''}" style="width:54px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <input class="di-input di-sm" id="cl-h-gp-${id}" placeholder="" value="${cl?.home?.gp??''}" style="width:32px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <input class="di-input di-sm" id="cl-h-wl-${id}" placeholder="" value="${cl?.home?.wl??''}" style="width:40px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
      </div>
      <div class="di-row" style="gap:3px">
        <span class="di-lbl">L15 ${esc(aA)}</span>
        <input class="di-input di-sm" id="cl-a-net-${id}" placeholder="" value="${cl?.away?.netRtg??''}" style="width:54px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <input class="di-input di-sm" id="cl-a-off-${id}" placeholder="" value="${cl?.away?.offRtg??''}" style="width:54px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <input class="di-input di-sm" id="cl-a-def-${id}" placeholder="" value="${cl?.away?.defRtg??''}" style="width:54px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <input class="di-input di-sm" id="cl-a-gp-${id}" placeholder="" value="${cl?.away?.gp??''}" style="width:32px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
        <input class="di-input di-sm" id="cl-a-wl-${id}" placeholder="" value="${cl?.away?.wl??''}" style="width:40px" onfocus="cardState['${id}'].editing=true" onblur="cardState['${id}'].editing=false">
      </div>
      <div class="di-row"><button class="di-btn" onclick="saveClutch('${id}')">SET CLUTCH</button></div>
    </div>`;

    // ─── EVIDENCE VIEW TOGGLE ───
    html+=`<div class="ev-toggle ${cs.evCollapsed?'':'open'}" id="ev-toggle-${id}" onclick="toggleEV('${id}')">
      EVIDENCE <span class="arr">▸</span>
      <span style="margin-left:auto;font-size:5px;color:var(--t2)">Control ${ind.controlTeam} ${ind.score.toFixed(2)} · Traj ${ind.traj.tooEarly?'Q1':ind.traj.lean+' '+ind.traj.count+'/'+ind.traj.total}</span>
    </div>`;

    // ─── EVIDENCE BODY (collapsible) ───
    html+=`<div class="ev-body ${cs.evCollapsed?'collapsed':''}" id="ev-body-${id}" style="${cs.evCollapsed?'max-height:0':'max-height:2000px'}">`;

    // Indicators
    html+=`<div class="inds">
    ${[{id:'I1',nm:'POSSESS/TRANS',wt:25,d:ind.I1},{id:'I2',nm:'RIM/FOUL',wt:25,d:ind.I2},
       {id:'I3',nm:'SHOT QUALITY',wt:20,d:ind.I3},{id:'I4',nm:'LINEUP INTEG',wt:20,d:ind.I4},
       {id:'I5',nm:'TEMPO/EFF',wt:10,d:ind.I5}].map(({id:iid,nm,wt,d})=>{
      let displayScore;
      if(d.sonnet){
        const leaderIsControl = d.leader.toUpperCase().substring(0,3) === ind.controlTeam.toUpperCase().substring(0,3);
        displayScore = leaderIsControl ? d.rawScore : (1 - d.rawScore);
      } else {
        displayScore = d.score;
      }
      const col = d.sonnet ? indColor(displayScore) : (d.score===1?'var(--green)':d.score===.5?'var(--yellow)':'var(--red)');
      const pc = d.sonnet ? pipClass(displayScore) : (d.score===1?'pw':d.score===.5?'pd':'pl');
      return `
      <div class="ind">
        <span class="ii">${iid}</span><span class="in">${nm}</span><span class="iw">${wt}%</span>
        <div class="pip ${pc}"></div>
        <span class="il" style="color:${col}">${esc(d.leader)}${d.sonnet?' <span style="opacity:0.6">'+d.rawScore.toFixed(2)+'</span>':''}</span>
        ${d.sonnet?'<span style="color:#a78bfa;font-size:5px;margin-left:2px">◈</span>':''}
        <span class="id">${esc(d.detail)}</span>
      </div>`;}).join('')}
    </div>`;

    // Trajectory
    html+=`<div class="traj">
      <div class="th">TRAJECTORY — ${ind.dataQuality==='SONNET'?'Sonnet-scored':ind.dataQuality==='FULL'?'8/8 signals (FULL)':'6/8 signals (PARTIAL — T4,T7 unavail)'}
        ${!ind.traj.tooEarly?`<span class="tl" style="color:${ind.traj.lean==='NEUTRAL'?'var(--t3)':'var(--amber)'};border-color:${ind.traj.lean==='NEUTRAL'?'var(--b2)':'var(--amber)'}">${esc(ind.traj.lean)}${ind.traj.total>0?' '+ind.traj.count+'/'+ind.traj.total:''}</span>`:''}
      </div>
      ${ind.traj.tooEarly
        ?'<div style="font-size:6px;color:var(--t3)">Q1 — trajectory check begins Q2</div>'
        :ind.traj.signals.length>0
          ?ind.traj.signals.map(s=>`<div class="ts"><span class="tk" style="color:${s.color}">${s.key}</span><span class="tt" style="color:${s.color==='#3e3e48'?'var(--t3)':s.color}">${esc(s.text)}</span></div>`).join('')
          :(rawInd&&rawInd.traj&&!rawInd.traj.tooEarly
            ?rawInd.traj.signals.map(s=>`<div class="ts"><span class="tk" style="color:${s.color}">${s.key}</span><span class="tt" style="color:${s.color==='#3e3e48'?'var(--t3)':s.color}">${esc(s.text)}</span></div>`).join('')
            :'<div style="font-size:6px;color:var(--t3)">See Sonnet analysis for trajectory detail</div>')}
    </div>`;

    // Full Sonnet analysis text (in evidence view)
    html+=`<div class="analysis" id="analysis-${id}">`;
    if(cs.analysis){
      const usage=cs.analysisUsage;
      const cost=usage?((usage.input_tokens*3+usage.output_tokens*15)/1000000).toFixed(4):'?';
      html+=`<div class="analysis-hdr">FULL ANALYSIS<span class="analysis-cost">~$${cost} · ${cs.analysisTime?.toLocaleTimeString()||''}</span></div><div class="analysis-body">${esc(cs.analysis)}</div>`;
    } else if(cs.analyzing){
      html+=`<div class="analysis-loading"><div class="spin"></div> Analyzing…</div>`;
    } else {
      html+=`<div style="font-size:6px;color:var(--t3)">No analysis yet</div>`;
    }
    html+=`</div>`;

    // Close evidence body
    html+=`</div>`;
  }

  // Thesis xref
  if(xrefs.length){
    html+=`<div class="xref"><div class="xh">THESIS × LIVE</div>${xrefs.map(r=>`<div class="xr ${r.level}">${esc(r.msg)}</div>`).join('')}</div>`;
  }

  // Thesis block
  html+=`<div class="thesis" id="thesis-block-${id}">
    <div class="thdr">
      PRE-GAME THESIS
      <div style="display:flex;gap:6px;align-items:center;">
        ${state==='PRE'&&!cs.generating?`<button class="tgen" onclick="generateThesis('${id}')">⚡ ${localStorage.getItem('nba4:srCache:'+id)?'GEN (cached)':'GENERATE'}</button>${localStorage.getItem('nba4:srCache:'+id)?`<button class="tedit" onclick="localStorage.removeItem('nba4:srCache:${id}');renderCard(games.find(g=>g.id==='${id}'))">🗑 CLR</button>`:''}`:''}
        <button class="tedit" onclick="startEdit('${id}')">EDIT</button>
      </div>
    </div>`;

  if(cs.generating){
    html+=`<div class="gen-progress" id="gen-progress-${id}">${(cs.genSteps||[]).map(s=>{
      const icon=s.status==='done'?'✓':s.status==='active'?'⟳':s.status==='err'?'✗':'·';
      return `<span class="gen-step ${s.status}">${icon} ${s.label}${s.error?' — '+s.error:''}</span>`;
    }).join('<br>')}</div>`;
  } else if(cs.genError && !thesis){
    html+=`<div style="font-size:7px;color:var(--red);padding:4px 0;">⚠ Thesis generation failed: ${esc(cs.genError)}</div>`;
  } else if(thesis){
    html+=`<div class="tbody">${esc(thesis)}</div>`;
    if(p.lean||p.entry||p.pass||p.watches.length){
      html+=`<div class="tpr">
        ${p.lean?`<div class="trow">LEAN: <span>${esc(p.lean)}</span></div>`:''}
        ${p.entry?`<div class="trow">ENTRY: <span>${esc(p.entry)}</span></div>`:''}
        ${p.pass?`<div class="trow">PASS IF: <span>${esc(p.pass)}</span></div>`:''}
        ${p.watches.map(w=>`<div class="trow">WATCH: <span>${esc(w)}</span></div>`).join('')}
        ${p.flags.map(f=>`<div class="trow" style="color:var(--yellow)">⚠ ${esc(f)}</div>`).join('')}
      </div>`;
    }
  } else {
    html+=`<div class="tempty">No thesis — click GENERATE or EDIT</div>`;
  }
  html+=`</div>`;

  // Logs + footer
  if(cs.logs.length){
    html+=`<div class="log">${cs.logs.map(l=>`<div class="${l.ok?'ok':'er'}">${l.t} ${esc(l.msg)}</div>`).join('')}</div>`;
  }
  if(cs.lastUp){
    const srcLabel = game.dataSource==='BDL'?'<span style="color:var(--yellow)">BDL</span>':'SR';
    const freshLabel = cs.dataFreshness==='STALE'?' · <span style="color:var(--red)">STALE</span>':cs.dataFreshness==='WATCH'?' · <span style="color:var(--yellow)">STATS LAG</span>':'';
    html+=`<div class="foot">↻ ${cs.lastUp.toLocaleTimeString()} · ${pollInterval/1000}s · ${srcLabel}${freshLabel}</div>`;
  }

  el.innerHTML=html;

  // Countdown for PRE
  if(state==='PRE'&&game.scheduled){
    if(cs._countdown)clearInterval(cs._countdown);
    cs._countdown=setInterval(()=>{if(!cs.editing&&!cs.generating)renderCard(game);},1000);
  }else if(cs._countdown){clearInterval(cs._countdown);cs._countdown=null;}
}

// ── Thesis editing ────────────────────────────────────────────────────────
function startEdit(cardId){
  const cs=cardState[cardId];if(!cs)return;
  cs.editing=true;
  const tb=document.getElementById('thesis-block-'+cardId);
  if(!tb)return;
  const currentThesis=theses[cardId]||'';
  tb.innerHTML=`
    <div class="thdr">PRE-GAME THESIS<span style="font-size:6px;color:var(--amber);letter-spacing:1px;">EDITING</span></div>
    <textarea class="ta" id="ta-${cardId}" autocomplete="off" autocorrect="on" spellcheck="true">${esc(currentThesis)}</textarea>
    <div class="thint">Lean: [team]
Entry: [trigger]
Pass: [condition]
Watch: [signal]
Flag: [risk]</div>
    <div class="tbtn-row">
      <button class="tsave" onclick="saveThesisFromCard('${cardId}')">SAVE</button>
      <button class="tcancel" onclick="cancelEdit('${cardId}')">CANCEL</button>
    </div>`;
  setTimeout(()=>{const ta=document.getElementById('ta-'+cardId);if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}},50);
}
function cancelEdit(cardId){const cs=cardState[cardId];if(!cs)return;cs.editing=false;const g=games.find(x=>x.id===cardId);if(g)renderCard(g);}
function saveThesisFromCard(cardId){
  const ta=document.getElementById('ta-'+cardId);if(!ta)return;
  saveThesis(cardId,ta.value);
  const cs=cardState[cardId];if(cs)cs.editing=false;
  const g=games.find(x=>x.id===cardId);if(g)renderCard(g);
}

// ── Visibility API ────────────────────────────────────────────────────────
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&!paused)refreshLiveCards();});
</script>
