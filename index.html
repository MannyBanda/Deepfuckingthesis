async function generateThesis(gameId){
  const game = games.find(g=>g.id===gameId);
  const cs = cardState[gameId];
  if(!game||!cs) return;
  cs.generating = true;
  cs.genError = null;
  const wasPaused = paused;
  paused = true; // Pause polling during generation to avoid SR rate limit conflicts
  const homeAlias = game.home?.alias||'';
  const awayAlias = game.away?.alias||'';
  const homeId = TEAM_IDS[homeAlias];
  const awayId = TEAM_IDS[awayAlias];
  if(!homeId||!awayId){
    cs.genError = 'Unknown team alias: '+(homeId?'':homeAlias)+' '+(awayId?'':awayAlias);
    cs.generating=false; renderCard(game); return;
  }

  cs.genSteps = [
    {label:'BDL Enrich',status:'pending'},
    {label:'Injuries',status:'pending'},
    {label:'Standings',status:'pending'},
    {label:homeAlias+' Profile',status:'pending'},
    {label:awayAlias+' Profile',status:'pending'},
    {label:homeAlias+' Depth',status:'pending'},
    {label:awayAlias+' Depth',status:'pending'},
    {label:homeAlias+' Stats',status:'pending'},
    {label:awayAlias+' Stats',status:'pending'},
    {label:homeAlias+' Splits(G)',status:'pending'},
    {label:awayAlias+' Splits(G)',status:'pending'},
    {label:homeAlias+' Splits(S)',status:'pending'},
    {label:awayAlias+' Splits(S)',status:'pending'},
    {label:'BDL Odds',status:'pending'},
    {label:'Sonnet Thesis',status:'pending'},
  ];
  renderGenProgress(gameId);

  // ── STEP 0: Ensure BDL enrichment is complete (odds, clutch, tracking) ──
  cs.genSteps[0].status = 'active';
  renderGenProgress(gameId);
  try{
    if(cs.enriching){
      // Enrichment already in progress — wait for it (up to 12s)
      addLog(gameId, 'Waiting for BDL enrichment to finish…', true);
      for(let w=0;w<24&&cs.enriching;w++) await new Promise(r=>setTimeout(r,500));
    } else if(!cs.enrichDone && !cs.oddsData && !cs.trackingData){
      // Not started yet — trigger and wait
      addLog(gameId, 'Triggering BDL enrichment for thesis…', true);
      await enrichFromBDL(gameId);
    }
    cs.genSteps[0].status = (cs.oddsData||cs.clutchData||cs.trackingData)?'done':'err';
    if(cs.genSteps[0].status==='err') cs.genSteps[0].error = 'No data (optional)';
  }catch(e){
    cs.genSteps[0].status = 'err';
    cs.genSteps[0].error = 'optional';
  }
  renderGenProgress(gameId);

  const calls = [
    {key:'injuries', type:'injuries', params:{}},
    {key:'standings', type:'standings', params:{}},
    {key:'homeProfile', type:'profile', params:{team_id:homeId}},
    {key:'awayProfile', type:'profile', params:{team_id:awayId}},
    {key:'homeDepth', type:'depth_chart', params:{team_id:homeId}},
    {key:'awayDepth', type:'depth_chart', params:{team_id:awayId}},
    {key:'homeStats', type:'statistics', params:{team_id:homeId}},
    {key:'awayStats', type:'statistics', params:{team_id:awayId}},
    {key:'homeSplitsGame', type:'splits_game', params:{team_id:homeId}},
    {key:'awaySplitsGame', type:'splits_game', params:{team_id:awayId}},
    {key:'homeSplitsSchedule', type:'splits_schedule', params:{team_id:homeId}},
    {key:'awaySplitsSchedule', type:'splits_schedule', params:{team_id:awayId}},
  ];

  const cacheKey = 'nba4:srCache:'+gameId;
  let collected = {};
  const cached = localStorage.getItem(cacheKey);

  if(cached){
    // Use cached SR data — skip all 12 API calls
    collected = JSON.parse(cached);
    cs.genSteps.forEach((s,i)=>{ if(i>=1 && i<=12) s.status='done'; });
    renderGenProgress(gameId);
    console.log('Using cached SR data for', gameId);
  } else {
    // Fetch fresh SR data
    for(let i=0; i<calls.length; i++){
      cs.genSteps[i+1].status = 'active';
      renderGenProgress(gameId);
      try{
        const data = await sr(calls[i].type, calls[i].params);
        collected[calls[i].key] = data;
        cs.genSteps[i+1].status = 'done';
      }catch(e){
        cs.genSteps[i+1].status = 'err';
        cs.genSteps[i+1].error = e.message;
      }
      renderGenProgress(gameId);
      if(i < calls.length-1) await new Promise(r=>setTimeout(r,1500));
    }
    // Cache for re-runs (skip if too large for localStorage)
    try{
      const cacheStr = JSON.stringify(collected);
      if(cacheStr.length < 3000000) localStorage.setItem(cacheKey, cacheStr);
      else console.warn('SR data too large to cache:', (cacheStr.length/1024).toFixed(0)+'KB');
    }catch(e){ console.warn('Cache write failed:', e.message); }
  }

  // Extract structural context from cached SR data (closers, Pythagorean, opp profiles, shot diet)
  try{
    const structural = extractStructuralContext(gameId);
    if(structural && structural.built){
      cs.structural = structural;
      persistStructural(gameId, cs);
      addLog(gameId, '📊 Structural context extracted — '+structural.keyOuts.length+' key outs, diet: '+structural.shotDiet.home+'/'+structural.shotDiet.away, true);
    }
  }catch(e){ console.warn('Structural extract failed:', e.message); }

  // BDL Odds — skip if already populated by step 0 enrich
  if(cs.oddsData && cs.oddsData.homeML){
    cs.genSteps[13].status = 'done';
    renderGenProgress(gameId);
  } else {
  cs.genSteps[13].status = 'active';
  renderGenProgress(gameId);
  try{
    const bdlId = bdlGameMap[game.id];
    if(bdlId){
      try{
        const oddsResp = await bdl('odds',{game_id:bdlId});
        const oddsArr = oddsResp.data || oddsResp || [];
        if(Array.isArray(oddsArr) && oddsArr.length > 0){
          // Find consensus or first bookmaker
          const book = oddsArr[0];
          if(book){
            const hML = book.home_team_ml || book.home_moneyline || '';
            const aML = book.away_team_ml || book.away_moneyline || book.visitor_team_ml || '';
            const spread = book.home_team_spread || book.home_spread || '';
            const total = book.over_under || book.total || '';
            if(hML || spread){
              if(cs.oddsData && cs.oddsData.homeML){
                cs.oddsHistory = cs.oddsHistory || [];
                cs.oddsHistory.push({...cs.oddsData, time: cs.oddsData.time || cs.lastUp?.toLocaleTimeString() || '?'});
                if(cs.oddsHistory.length > 20) cs.oddsHistory = cs.oddsHistory.slice(-20);
              }
              cs.oddsData = {homeSpread:String(spread), homeML:String(hML), awayML:String(aML), total:String(total), time:new Date().toLocaleTimeString()};
              persistOdds(gameId, cs);
              console.log('BDL odds auto-populated:', cs.oddsData);
            }
          }
        }
      }catch(oe){ console.warn('BDL odds pull failed (non-fatal):', oe.message); }
    } else {
      console.log('No BDL game ID — odds not auto-populated');
    }
    cs.genSteps[13].status = 'done';
  }catch(e){
    cs.genSteps[13].status = 'err';
    cs.genSteps[13].error = 'optional';
  }
  } // end skip-if-already-populated
  renderGenProgress(gameId);

  // Now send to Sonnet via smart compute layer — server pre-computes SIA, redistribution, Pythagorean, BHV
  cs.genSteps[14].status = 'active';
  renderGenProgress(gameId);
  try{
    const tipTime = new Date(game.scheduled).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/Phoenix'});

    // Trim functions to reduce prompt size (text sections for Sonnet context)
    const trimProfile = (p) => {
      if(!p) return '(unavailable)';
      const players = (p.players||[])
        .filter(pl => pl.status==='ACT'||pl.status==='SUS'||pl.status==='NWT')
        .map(pl => `${pl.full_name} [${pl.primary_position||pl.position||'?'}] ${pl.status}${pl.injuries?' — '+JSON.stringify(pl.injuries):''}`);
      return players.join('\n');
    };
    const trimStats = (s) => {
      if(!s) return '(unavailable)';
      const own = s.own_record||s;
      const teamStats = own.statistics||s.statistics||{};
      const oppStats = (s.opponents||{}).statistics||{};
      const players = (own.players||s.players||[])
        .sort((a,b)=>(b.average?.minutes||0)-(a.average?.minutes||0))
        .slice(0,10)
        .map(pl=>`${pl.full_name} [${pl.primary_position||'?'}] ${pl.average?.minutes||0}mpg ${pl.average?.points||0}ppg ${pl.average?.assists||0}apg ${pl.average?.rebounds||0}rpg ${pl.average?.steals||0}spg ${pl.average?.turnovers||0}to FG:${pl.average?.field_goals_made||0}/${pl.average?.field_goals_att||0} 3P:${pl.average?.three_points_made||0}/${pl.average?.three_points_att||0} FT:${pl.average?.free_throws_made||0}/${pl.average?.free_throws_att||0} USG:${(pl.average?.usage_pct||0).toFixed(1)}%`);
      const t = teamStats;
      const teamLine = `Team: ${t.points||0}ppg ${t.assists||0}apg ${t.rebounds||0}rpg ${t.steals||0}spg ${t.blocks||0}bpg ${t.turnovers||0}to FBP:${t.fast_break_points||0} POT:${t.points_off_turnovers||0} SCP:${t.second_chance_points||0} Paint:${t.points_in_the_paint||0} OREB:${t.offensive_rebounds||0} FTA:${t.free_throws_att||0} eFG:${(((t.field_goals_made||0)+.5*(t.three_points_made||0))/(t.field_goals_att||1)*100).toFixed(1)}%`;
      const opp = oppStats;
      const oppLine = opp ? `Opp allowed: ${opp.points||0}ppg Paint:${opp.points_in_the_paint||0} FTA:${opp.free_throws_att||0} OREB:${opp.offensive_rebounds||0} Stl:${opp.steals||0}` : '';
      return teamLine + '\n' + oppLine + '\nTop players:\n' + players.join('\n');
    };
    const trimSplits = (s) => {
      if(!s) return '(unavailable)';
      const str = JSON.stringify(s);
      return str.length > 12000 ? str.substring(0, 12000) + '...(truncated)' : str;
    };
    const trimDepth = (d) => {
      if(!d) return '(unavailable)';
      // Resolve positions from various SR nesting structures
      let pos = [];
      if(d.positions){
        if(Array.isArray(d.positions)) pos = d.positions;
        else if(typeof d.positions === 'object'){
          Object.keys(d.positions).forEach(posName=>{
            const val = d.positions[posName];
            let players = [];
            if(Array.isArray(val)) players = val;
            else if(val?.players && Array.isArray(val.players)) players = val.players;
            else if(val && typeof val === 'object') players = Object.values(val).filter(v=>v&&typeof v==='object'&&(v.full_name||v.name));
            if(players.length>0) pos.push({name:posName, position:posName, players});
          });
        }
      }
      if(pos.length===0 && Array.isArray(d)) pos = d;
      if(pos.length===0 && d.depth_chart){
        if(Array.isArray(d.depth_chart)) pos = d.depth_chart;
        else if(d.depth_chart.positions) return trimDepth(d.depth_chart);
      }
      if(pos.length===0){
        const skip = ['id','name','market','alias','founded','sr_id','reference','venue','league','conference','division','coaches'];
        for(const k of Object.keys(d)){
          if(skip.includes(k)) continue;
          const v = d[k];
          if(Array.isArray(v) && v.length > 0 && v[0] && (Array.isArray(v[0].players) || v[0].name || v[0].position)){
            pos = v; break;
          }
        }
      }
      console.log('Depth chart resolved:', pos.length, 'positions from', Object.keys(d).slice(0,6));
      if(pos.length===0) return JSON.stringify(d).substring(0,2000);
      return pos.map(p =>
        (p.name||p.position||'?') + ': ' + (Array.isArray(p.players)?p.players:[]).map(pl=>`${pl.depth||'?'}. ${pl.full_name||pl.name||'?'}`).join(', ')
      ).join('\n');
    };
    const trimStandings = (s) => {
      if(!s) return '(unavailable)';
      const teams = [];
      (s.conferences||[]).forEach(conf=>{
        (conf.divisions||[]).forEach(div=>{
          (div.teams||[]).forEach(t=>{
            teams.push(`${t.name} ${t.wins}-${t.losses} (${(t.win_pct||0).toFixed(3)}) PF:${t.calc_points?.for||'?'} PA:${t.calc_points?.against||'?'}`);
          });
        });

    };
    const trimInjuries = (inj) => {
      if(!inj) return '(unavailable)';

        .map(t=> (t.alias||t.market||'?') + ': ' + (t.players||[]).map(p=>{
          const injArr = Array.isArray(p.injuries)?p.injuries:[];
          const li = injArr.length>0?injArr[0]:{};
          return `${p.full_name} [${p.primary_position||p.position||'?'}] ${li.status||p.status||'?'} — ${li.desc||li.comment||p.desc||'?'}`;
        }).join('; '))
        .join('\n');

    const c = collected;
    const safe = (fn, label) => { try{ return fn(); }catch(e){ console.error('TRIM CRASH in '+label+':', e.message, e.stack); return '(ERROR: '+label+' — '+e.message+')'; } };

    // Build text sections for Sonnet context
    const sections = {
      injuries: safe(()=>trimInjuries(c.injuries), 'injuries'),
      homeRoster: safe(()=>trimProfile(c.homeProfile), 'homeProfile'),
      awayRoster: safe(()=>trimProfile(c.awayProfile), 'awayProfile'),
      homeDepth: safe(()=>trimDepth(c.homeDepth), 'homeDepth'),
      awayDepth: safe(()=>trimDepth(c.awayDepth), 'awayDepth'),
      homeStats: safe(()=>trimStats(c.homeStats), 'homeStats'),
      awayStats: safe(()=>trimStats(c.awayStats), 'awayStats'),
      homeSplitsGame: safe(()=>trimSplits(c.homeSplitsGame), 'homeSplitsGame'),
      awaySplitsGame: safe(()=>trimSplits(c.awaySplitsGame), 'awaySplitsGame'),
      homeSplitsSchedule: safe(()=>trimSplits(c.homeSplitsSchedule), 'homeSplitsSchedule'),
      awaySplitsSchedule: safe(()=>trimSplits(c.awaySplitsSchedule), 'awaySplitsSchedule'),
      standings: safe(()=>trimStandings(c.standings), 'standings'),
    };

    // Inject enrichment data into sections
    const od = cs.oddsData;
    if(od && (od.homeML || od.homeSpread)){
      sections.odds = '\n=== MARKET ODDS ===\nSpread: '+homeAlias+' '+(od.homeSpread||'N/A')+' | ML: '+awayAlias+' '+(od.awayML||'N/A')+' / '+homeAlias+' '+(od.homeML||'N/A')+' | O/U: '+(od.total||'N/A')+'\n';
    } else {

    const td = cs.trackingData;
    if(td){

      if(at.catchAndShoot || ht.catchAndShoot) trk += 'Catch & Shoot eFG%: '+awayAlias+' '+(at.catchAndShoot?at.catchAndShoot.efg||'?':'?')+'% | '+homeAlias+' '+(ht.catchAndShoot?ht.catchAndShoot.efg||'?':'?')+'%\n';
      if(at.pullUp || ht.pullUp) trk += 'Pull-up eFG%: '+awayAlias+' '+(at.pullUp?at.pullUp.efg||'?':'?')+'% | '+homeAlias+' '+(ht.pullUp?ht.pullUp.efg||'?':'?')+'%\n';
      sections.tracking = trk;
    } else { sections.tracking = ''; }
    const cd = cs.clutchData;
    if(cd){
      const tierLabel = cd.tier===1?'L15 NBA.com (Tier 1)':cd.tier===2?'Season BDL (Tier 2)':'Proxy (Tier 3)';
      let cl = '\n=== CLUTCH DATA ('+tierLabel+') ===\n';
      if(cd.away) cl += awayAlias+': NetRtg '+(cd.away.netRtg!=null?cd.away.netRtg:'N/A')+' OffRtg '+(cd.away.offRtg!=null?cd.away.offRtg:'N/A')+' DefRtg '+(cd.away.defRtg!=null?cd.away.defRtg:'N/A')+' '+(cd.away.wl||'')+'\n';
      if(cd.home) cl += homeAlias+': NetRtg '+(cd.home.netRtg!=null?cd.home.netRtg:'N/A')+' OffRtg '+(cd.home.offRtg!=null?cd.home.offRtg:'N/A')+' DefRtg '+(cd.home.defRtg!=null?cd.home.defRtg:'N/A')+' '+(cd.home.wl||'')+'\n';
      sections.clutch = cl;
    } else { sections.clutch = ''; }

    // Build analytical payload — raw structured data for server-side SIA computation
    const analytical = {
      injuries: c.injuries || {},
      homeProfile: c.homeProfile || {},
      awayProfile: c.awayProfile || {},
      homeStats: c.homeStats || {},
      awayStats: c.awayStats || {},
      homeDepth: c.homeDepth || {},
      awayDepth: c.awayDepth || {},
      standings: c.standings || {},
    };

    const payload = {
      matchup: { home: homeAlias, away: awayAlias, homeId: homeId, awayId: awayId, date: getEasternDate(0).str, time: tipTime, venue: game.venue||'TBD' },
      sections: sections,
      analytical: analytical,
    };

    console.log('Thesis payload size:', (JSON.stringify(payload).length/1024).toFixed(1)+'KB');
    // Pre-send diagnostic — what does the client think it's sending?
    const injCheck = payload.analytical.injuries;
    console.log('%c📋 CLIENT PRE-SEND: injuries', 'color:#f0c040;font-weight:bold', {
      type: typeof injCheck, isNull: injCheck===null, isUndef: injCheck===undefined,
      topKeys: injCheck ? Object.keys(injCheck) : 'N/A',
      hasTeams: injCheck ? Array.isArray(injCheck.teams) : false,
      teamsCount: injCheck && Array.isArray(injCheck.teams) ? injCheck.teams.length : 0,
      sampleTeam: injCheck && Array.isArray(injCheck.teams) && injCheck.teams.length > 0 ? {alias:injCheck.teams[0].alias, players:(injCheck.teams[0].players||[]).length} : 'N/A',
      jsonSize: injCheck ? JSON.stringify(injCheck).length : 0
    });
    console.log('%c📋 CLIENT PRE-SEND: all analytical', 'color:#f0c040', {
      injuries: injCheck ? Object.keys(injCheck).join(',') : 'EMPTY',
      homeProfile: payload.analytical.homeProfile ? (payload.analytical.homeProfile.players||[]).length + ' players' : 'EMPTY',
      awayProfile: payload.analytical.awayProfile ? (payload.analytical.awayProfile.players||[]).length + ' players' : 'EMPTY',
      homeStats: payload.analytical.homeStats ? Object.keys(payload.analytical.homeStats).join(',') : 'EMPTY',
      awayStats: payload.analytical.awayStats ? Object.keys(payload.analytical.awayStats).join(',') : 'EMPTY',
      homeDepth: payload.analytical.homeDepth ? Object.keys(payload.analytical.homeDepth).join(',') : 'EMPTY',
      awayDepth: payload.analytical.awayDepth ? Object.keys(payload.analytical.awayDepth).join(',') : 'EMPTY',
      standings: payload.analytical.standings ? Object.keys(payload.analytical.standings).join(',') : 'EMPTY',
    });

    const resp = await fetch(FN+'generate-thesis',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    if(!resp.ok){
      const errData = await resp.json().catch(()=>({error:'Unknown error '+resp.status}));
      throw new Error(errData.error||'Thesis gen failed: '+resp.status);
    }
    const data = await resp.json();
    theses[gameId] = (data.thesis||'').replace(/\*\*/g,'').replace(/^#{1,3}\s/gm,'');
    localStorage.setItem('nba4:theses', JSON.stringify(theses));
    // Log pre-computed SIA results if available
    if(data.preComputed){
      const pc = data.preComputed;
      addLog(gameId, '🔬 SIA: '+homeAlias+' '+pc.rosterAudit.homeOut+' OUT ('+((pc.rosterAudit.homeOutNames||[]).join(', ')||'none')+'), '+awayAlias+' '+pc.rosterAudit.awayOut+' OUT ('+((pc.rosterAudit.awayOutNames||[]).join(', ')||'none')+')'+(pc.depletion.home?' | '+homeAlias+' '+pc.depletion.home.label:'')+(pc.depletion.away?' | '+awayAlias+' '+pc.depletion.away.label:''), true);
      // Data integrity diagnostics
      if(pc.diagnostics){
        const dx = pc.diagnostics;
        console.log('%c📋 DATA INTEGRITY REPORT', 'color:#f0c040;font-weight:bold', dx);
        let dxLog = '📋 Data: '+dx.summary;
        if(dx.critical && dx.critical.length > 0) dxLog += ' ❌ '+dx.critical.join(', ');
        if(dx.warnings && dx.warnings.length > 0) dxLog += ' ⚠️ '+dx.warnings.join(', ');
        addLog(gameId, dxLog, true);
        // Cross-reference: can SIA match injury names to stats?
        const cr = dx.crossRef || {};
        if(cr.home && cr.home.length > 0) addLog(gameId, '🔗 '+homeAlias+' xref: '+cr.home.join(' | '), true);
        if(cr.away && cr.away.length > 0) addLog(gameId, '🔗 '+awayAlias+' xref: '+cr.away.join(' | '), true);
        // Injuries structure detail — the data we need most right now
        const injDx = dx.endpoints && dx.endpoints.injuries;
        if(injDx){
          const matchedStr = (injDx.matchedTeams||[]).map(t=>(t.side||'?')+'='+t.market+' '+t.name+':'+t.players+'p').join(', ');
          addLog(gameId, '🩺 Injuries: '+(injDx.hasTeams?injDx.teamsCount+' teams':'NO .teams[]')+' | matched=['+matchedStr+'] | topKeys=['+((injDx.topKeys||[]).join(','))+']', true);
          if(injDx.sampleTeamKeys) addLog(gameId, '🩺 Team keys: '+injDx.sampleTeamKeys.join(', '), true);
          if(injDx.samplePlayerKeys) addLog(gameId, '🩺 Player keys: '+injDx.samplePlayerKeys.join(', '), true);
          if(injDx.samplePlayerDump) addLog(gameId, '🩺 Sample player: '+JSON.stringify(injDx.samplePlayerDump).substring(0,300), true);
          if(injDx.rawPlayerKeys) addLog(gameId, '🔑 MATCHED player keys: '+injDx.rawPlayerKeys.join(', '), true);
          if(injDx.rawPlayerJSON) addLog(gameId, '🔑 RAW PLAYER: '+injDx.rawPlayerJSON, true);
          if(injDx.matchedPlayerStatuses && injDx.matchedPlayerStatuses.length > 0) addLog(gameId, '🩺 Statuses: '+injDx.matchedPlayerStatuses.join(' | '), true);
          if(injDx.nestedPath) addLog(gameId, '🩺 ⚠️ Found nested path: '+injDx.nestedPath+' — compute may need patching', true);
        }
        // Depth chart diagnostics
        ['home','away'].forEach(side=>{
          const depDx = dx.endpoints && dx.endpoints[side+'Depth'];
          if(depDx){
            addLog(gameId, '📐 '+(side==='home'?homeAlias:awayAlias)+' depth: '+(depDx.resolvedPositions||0)+' positions | hasPositions:'+depDx.hasPositions+' | allKeys=['+(depDx.allKeys||[]).join(',')+']', true);
            if(depDx.keyTypes) addLog(gameId, '📐 keyTypes: '+Object.entries(depDx.keyTypes).map(([k,v])=>k+':'+v).join(' | '), true);
          }
        });
      }
    }
    cs.genSteps[14].status = 'done';
  }catch(e){
    cs.genSteps[14].status = 'err';
    cs.genSteps[14].error = e.message;
    console.error('Thesis generation failed at step 14:', e.message, e.stack);
  }
  cs.generating = false;
  renderConfidenceTable();
  cs.genError = cs.genSteps[14]?.status==='err' ? cs.genSteps[14].error : null;
  paused = wasPaused; // Resume polling state
  renderCard(game);
}

function renderGenProgress(gameId){
  const el = document.getElementById('gen-progress-'+gameId);
  const cs = cardState[gameId];
  if(!el||!cs?.genSteps) return;
  el.innerHTML = cs.genSteps.map(s=>{
    const icon = s.status==='done'?'✓':s.status==='active'?'⟳':s.status==='err'?'✗':'·';
    return `<span class="gen-step ${s.status}">${icon} ${s.label}${s.error?' — '+s.error:''}</span>`;
  }).join('<br>');
}

// ══════════════════════════════════════════════════════════════════════════════
// COMPUTE INDICATORS (SR FORMAT)
// ══════════════════════════════════════════════════════════════════════════════
function compute(game){
  if(!game?.summary || getState(game)==='PRE') return null;
  const s = game.summary;
  const H = s.home, A = s.away;
  const hs = H?.statistics||{}, as = A?.statistics||{};
  const hA = H?.alias||H?.name||'HOME', aA = A?.alias||A?.name||'AWAY';
  const hS = H?.points||0, aS = A?.points||0;

  // I1 — Possession & Transition
  const hGen = (hs.steals||0)+(hs.offensive_rebounds||0)-(hs.turnovers||0);
  const aGen = (as.steals||0)+(as.offensive_rebounds||0)-(as.turnovers||0);
  const hConv = (hs.fast_break_points||0)+(hs.points_off_turnovers||0)+(hs.second_chance_points||0);
  const aConv = (as.fast_break_points||0)+(as.points_off_turnovers||0)+(as.second_chance_points||0);
  let i1 = (hGen>aGen?1:hGen<aGen?-1:0)+(hConv>aConv?1:hConv<aConv?-1:0);
  // Chaos layer from PBP — forced vs unforced TOs
  const pbp = cardState[game.id]?.pbpAudit;
  let chaosNote = '';
  if(pbp){
    const hForced = pbp.away.tos.forced||0; // home team FORCES opponent (away) TOs
    const aForced = pbp.home.tos.forced||0; // away team FORCES opponent (home) TOs
    const hUnforced = pbp.home.tos.unforced||0; // home team's own unforced
    const aUnforced = pbp.away.tos.unforced||0; // away team's own unforced
    if(hForced >= aForced+3) { i1 += 1; chaosNote = ` | CHAOS:${hA} +${hForced-aForced} forced`; }
    else if(aForced >= hForced+3) { i1 -= 1; chaosNote = ` | CHAOS:${aA} +${aForced-hForced} forced`; }
    else if(hUnforced >= aUnforced+3) { i1 -= 1; chaosNote = ` | CHAOS:${hA} ${hUnforced} unforced`; }
    else if(aUnforced >= hUnforced+3) { i1 += 1; chaosNote = ` | CHAOS:${aA} ${aUnforced} unforced`; }
    else { chaosNote = ` | chaos:even`; }
  }
  const I1={score:i1>0?1:i1===0?.5:0, leader:i1>0?hA:i1<0?aA:'EVEN',
    detail:`${hA} ${hs.steals||0}stl ${hs.offensive_rebounds||0}or ${hs.turnovers||0}to | ${aA} ${as.steals||0}stl ${as.offensive_rebounds||0}or ${as.turnovers||0}to | Conv:${hConv}–${aConv}${chaosNote}`};

  // I2 — Rim Pressure & Foul
  const hPaint = hs.points_in_the_paint||0, aPaint = as.points_in_the_paint||0;
  const hAtRim = hs.field_goals_at_rim_att||0, aAtRim = as.field_goals_at_rim_att||0;
  const hFTA = hs.free_throws_att||0, aFTA = as.free_throws_att||0;
  const hBlk = hs.blocks||0, aBlk = as.blocks||0;
  const rimScore = (hPaint+hAtRim+hFTA+hBlk)-(aPaint+aAtRim+aFTA+aBlk);
  const I2={score:rimScore>10?1:rimScore<-10?0:.5, leader:rimScore>10?hA:rimScore<-10?aA:'EVEN',
    detail:`Paint:${hPaint}–${aPaint} AtRim:${hs.field_goals_at_rim_made||0}/${hAtRim}–${as.field_goals_at_rim_made||0}/${aAtRim} FTA:${hFTA}–${aFTA} BLK:${hBlk}–${aBlk}${H?.bonus?' '+hA+'⬤':''}${A?.bonus?' '+aA+'⬤':''}`};

  // I3 — Shot Quality & Creation (enhanced with PBP zone data)
  const hFGA=hs.field_goals_att||1, aFGA=as.field_goals_att||1;
  const hEFG=(((hs.field_goals_made||0)+.5*(hs.three_points_made||0))/hFGA);
  const aEFG=(((as.field_goals_made||0)+.5*(as.three_points_made||0))/aFGA);
  const hAst=hs.assists||0, aAst=as.assists||0;
  const hFGM=hs.field_goals_made||1, aFGM=as.field_goals_made||1;
  const hAR=(hAst/hFGM)*100, aAR=(aAst/aFGM)*100;
  const i3=(hEFG>aEFG+.02?1:hEFG<aEFG-.02?-1:0)+(hAR>aAR+5?1:hAR<aAR-5?-1:0);
  let i3detail=`eFG%:${(hEFG*100).toFixed(1)}–${(aEFG*100).toFixed(1)} AR:${hAR.toFixed(0)}–${aAR.toFixed(0)} AST:${hAst}–${aAst}`;
  if(pbp){
    const hD=pbp.home?.shotDiet, aD=pbp.away?.shotDiet;
    if(hD&&aD) i3detail+=` | diet ${hA}:rim${hD.rimPct}%/mid${hD.midPct}%/3pt${hD.threePct}% ${aA}:rim${aD.rimPct}%/mid${aD.midPct}%/3pt${aD.threePct}%`;
  }
  const I3={score:i3>0?1:i3===0?.5:0, leader:i3>0?hA:i3<0?aA:'EVEN', detail:i3detail};

  // I4 — Lineup Integrity
  const periods = s.periods||[];
  const qDs = periods.map(p=>(p.home_points||0)-(p.away_points||0));
  const trend = qDs.length>=2 ? qDs[qDs.length-1]-qDs[0] : 0;
  const hBigLead = hs.biggest_lead||0, aBigLead = as.biggest_lead||0;
  const i4 = (hBigLead>aBigLead+4?1:hBigLead<aBigLead-4?-1:0)+(trend>2?1:trend<-2?-1:0);
  const I4={score:i4>0?1:i4===0?.5:0, leader:i4>0?hA:i4<0?aA:'EVEN',
    detail:`BigLead:${hBigLead}–${aBigLead} Δ:${hS>aS?'+':''}${hS-aS} trend:${trend>0?'+':''}${trend} ${qDs.map((d,i)=>'Q'+(i+1)+':'+(d>0?'+':'')+d).join(' ')}`};

  // I5 — Tempo & Efficiency
  const hOPPP = hs.offensive_points_per_possession||0, aOPPP = as.offensive_points_per_possession||0;
  const hDPPP = hs.defensive_points_per_possession||0, aDPPP = as.defensive_points_per_possession||0;
  const effD = (hOPPP-aDPPP)-(aOPPP-hDPPP);
  const hPoss = hs.possessions||0, aPoss = as.possessions||0;
  const I5={score:effD>0.08?1:effD<-0.08?0:.5, leader:effD>0.08?hA:effD<-0.08?aA:'EVEN',
    detail:`OPPP:${hOPPP.toFixed(2)}–${aOPPP.toFixed(2)} DPPP:${hDPPP.toFixed(2)}–${aDPPP.toFixed(2)} NetΔ:${effD>0?'+':''}${effD.toFixed(3)} Poss:${hPoss}–${aPoss}`};

  const raw = I1.score*W.I1 + I2.score*W.I2 + I3.score*W.I3 + I4.score*W.I4 + I5.score*W.I5;
  const controlHome = raw>=.5, cTeam = controlHome?hA:aA;
  let score = controlHome?raw:1-raw;

  // Pythagorean cap (requires structural context from thesis gen)
  const struct = cardState[game.id]?.structural;
  let pythNote = null;
  if(struct?.built && struct.pythagorean){
    const cSide = controlHome?'home':'away';
    const pyth = struct.pythagorean[cSide];
    if(pyth && pyth.cap && score > pyth.cap){
      pythNote = cTeam+' PYTH CAP: actual '+pyth.actual+'-'+(pyth.gp-pyth.actual)+' vs expected '+pyth.expected.toFixed(0)+' ('+pyth.delta.toFixed(1)+') — capped at '+pyth.cap;
      score = pyth.cap;
    }
  }

  // Client-side sustainability audit
  const bl = cardState[game.id]?.baselines;
  let clientSust = null;
  if(bl && bl.built){
    const tracking = cardState[game.id]?.trackingData;
    const hSust = computeSustainabilityClient(H, bl, hA, 'home', tracking);
    const aSust = computeSustainabilityClient(A, bl, aA, 'away', tracking);
    clientSust = {home:hSust, away:aSust};
    cardState[game.id].clientSustainability = clientSust;
  }

  // Trajectory
  const traj = buildTrajectory(game, hA, aA, hs, as, H, A, hS, aS, qDs, periods);

  return {I1,I2,I3,I4,I5, score, controlTeam:cTeam, dataQuality:'FULL', traj, pythNote, clientSust};
}

function buildTrajectory(game, hA, aA, hs, as, H, A, hS, aS, qDs, periods){
  const p = game.period||0;
  if(p<2) return {signals:[], lean:'NEUTRAL', count:0, total:0, tooEarly:true};
  const sigs = [], overall=hS-aS, currQ=qDs.length>0?qDs[qDs.length-1]:null;

  // T1 — Role Player Heater (real player-level detection when baselines available)
  const pbpD = cardState[game.id]?.pbpAudit;
  const bl = cardState[game.id]?.baselines;
  if(bl && bl.built){
    let bestHeater = null;
    (H.players||[]).concat(A.players||[]).forEach(pl=>{
      const live = pl.statistics||{};
      const live3a = live.three_points_att||0, live3m = live.three_points_made||0;
      if(live3a<3) return;
      const name = pl.full_name||pl.name||'?';
      const b = bl.players[name];
      if(!b || b.szn3Pct===null) return;
      const livePct = live3m/live3a*100;
      if(livePct > b.szn3Pct+15 && (b.tier==='NON'||b.tier==='AVG'||b.tier==='UNK')){
        const dev = livePct-b.szn3Pct;
        if(!bestHeater || dev>bestHeater.dev) bestHeater = {name,team:b.team,livePct,sznPct:b.szn3Pct,tier:b.tier,dev,live3m,live3a};
      }
    });
    if(bestHeater){
      const beneficiary = bestHeater.team===hA ? aA : hA;
      sigs.push({key:'T1',w:1,team:beneficiary,color:'#ffd166',
        text:bestHeater.name+' '+bestHeater.live3m+'/'+bestHeater.live3a+' 3PT ('+bestHeater.livePct.toFixed(0)+'% vs '+bestHeater.sznPct.toFixed(0)+'% szn) '+bestHeater.tier+' — '+bestHeater.team+' lead variance-sourced'});
    } else {
      sigs.push({key:'T1',w:0,team:null,color:'#3e3e48',text:'No role player heater detected'});
    }
  } else {
    // Fallback: conversion signal when baselines unavailable
    const hC=(hs.fast_break_points||0)+(hs.points_off_turnovers||0), aC=(as.fast_break_points||0)+(as.points_off_turnovers||0);
    if(Math.abs(hC-aC)>=10){const w=hC>aC?hA:aA;sigs.push({key:'T1*',w:1,team:w,color:'#ffd166',text:w+' conversion +'+(Math.abs(hC-aC))+' (FBP+POT) [no baseline]'});}
    else sigs.push({key:'T1*',w:0,team:null,color:'#3e3e48',text:'Conversion flat ('+hC+'–'+aC+') [no baseline]'});
  }

  // T2 — Star Process Integrity Check
  if(bl && bl.built){
    let starFlag = null;
    const allStars = [...(bl.stars.home||[]), ...(bl.stars.away||[])];
    for(const starName of allStars){
      const b = bl.players[starName]; if(!b || b.sznFGPct===null) continue;
      const plObj = (b.side==='home'?H:A)?.players?.find(x=>(x.full_name||x.name)===starName);
      if(!plObj) continue;
      const live = plObj.statistics||{};
      const liveFGA = live.field_goals_att||0, liveFGM = live.field_goals_made||0;
      if(liveFGA<6) continue;
      const livePct = liveFGM/liveFGA*100;
      if(livePct < b.sznFGPct-10){
        // Check process: Q-over-Q assists from periods
        let processLabel = 'intact';
        if(periods && periods.length>=2){
          const plPeriods = plObj.periods||[];
          if(plPeriods.length>=2){
            const lastQAst = plPeriods[plPeriods.length-1]?.statistics?.assists||0;
            const prevQAst = plPeriods[plPeriods.length-2]?.statistics?.assists||0;
            if(lastQAst>prevQAst+1) processLabel='accelerating';
            else if(lastQAst<prevQAst-1) processLabel='declining';
          }
        }
        const liveFGA2 = live.field_goals_att||0;
        const liveAst = live.assists||0, liveReb = live.rebounds||0;
        if(liveAst<=1 && liveReb<=2 && liveFGA2>=10) processLabel='collapsed';
        // Attribution: cold + accelerating/intact → benefits star's team; declining/collapsed → benefits opponent
        const starTeam = b.team;
        const beneficiary = (processLabel==='accelerating'||processLabel==='intact') ? starTeam : (starTeam===hA?aA:hA);
        const col = (processLabel==='declining'||processLabel==='collapsed') ? '#ff6b6b' : '#ffd166';
        starFlag = {name:starName,team:starTeam,livePct,sznPct:b.sznFGPct,process:processLabel,beneficiary,col};
        break; // Report most impactful star
      }
    }
    if(starFlag){
      sigs.push({key:'T2',w:1,team:starFlag.beneficiary,color:starFlag.col,
        text:starFlag.name+' '+starFlag.livePct.toFixed(0)+'% FG (vs '+starFlag.sznPct.toFixed(0)+'% szn) — process '+starFlag.process});
    } else {
      sigs.push({key:'T2',w:0,team:null,color:'#3e3e48',text:'Stars shooting within range'});
    }
  } else {
    sigs.push({key:'T2*',w:0,team:null,color:'#3e3e48',text:'No baseline data'});
  }

  // T3 — Quarter Delta (highest weight)
  if(currQ!=null&&Math.abs(currQ)>=6){const w=currQ>0?hA:aA,tr=(currQ>0&&overall<0)||(currQ<0&&overall>0);sigs.push({key:'T3',w:2,team:w,color:'#00ff88',text:w+' winning Q'+p+' by '+Math.abs(currQ)+(tr?' (trailing—comeback)':'')});}
  else sigs.push({key:'T3',w:0,team:null,color:'#3e3e48',text:'Q delta <6 — neutral'});

  // T4 — Foul Gate (now available via SR per-player data)
  let t4sig = {key:'T4',w:0,team:null,color:'#3e3e48',text:'No foul crisis detected'};
  if(H?.players && A?.players){
    const allPlayers = [...(H.players||[]).map(pl=>({...pl,team:hA})),...(A.players||[]).map(pl=>({...pl,team:aA}))];
    for(const pl of allPlayers){
      const pf = pl.statistics?.personal_fouls||0;
      if((p<=1&&pf>=2)||(p===2&&pf>=3)||(p===3&&pf>=4)){
        const level=p<=1?'WATCH':p===2?'CONSTRAINT':'CRISIS';
        t4sig={key:'T4',w:1,team:pl.team===hA?aA:hA,color:'#ff6b6b',text:(pl.full_name||'?')+' '+pf+' fouls Q'+p+' — '+level};
        break;
      }
    }
  }
  sigs.push(t4sig);

  // T5 — Interior Trend (enhanced with PBP at-rim context)
  const hPaint=hs.points_in_the_paint||0, aPaint=as.points_in_the_paint||0;
  if(Math.abs(hPaint-aPaint)>=8){
    const w=hPaint>aPaint?hA:aA;
    let t5detail=w+' paint +'+(Math.abs(hPaint-aPaint))+' ('+hPaint+'–'+aPaint+')';
    if(pbpD){
      const wRim = w===hA ? pbpD.home?.rim : pbpD.away?.rim;
      if(wRim && wRim.byPlayer && wRim.byPlayer.length>0){
        // Show top rim attacker's context breakdown
        const top = wRim.byPlayer[0];
        const ctxStr = Object.entries(top.contexts||{}).map(([k,v])=>k+':'+v).join('/');
        t5detail += ' | rim: '+wRim.made+'/'+wRim.att+' ('+top.name+' '+top.made+'/'+top.att+' '+ctxStr+')';
      }
    }
    sigs.push({key:'T5',w:1,team:w,color:'#a8ff78',text:t5detail});
  }
  else sigs.push({key:'T5',w:0,team:null,color:'#3e3e48',text:'Paint even ('+hPaint+'–'+aPaint+')'});

  // T6 — Assist Ratio
  const hFGM=hs.field_goals_made||1,aFGM=as.field_goals_made||1;
  const hAR=(hs.assists||0)/hFGM*100, aAR=(as.assists||0)/aFGM*100;
  if(Math.abs(hAR-aAR)>=15){const w=hAR>aAR?hA:aA;sigs.push({key:'T6',w:1,team:w,color:'#a8ff78',text:w+' AR '+Math.max(hAR,aAR).toFixed(0)+'% vs '+Math.min(hAR,aAR).toFixed(0)+'%'});}
  else sigs.push({key:'T6',w:0,team:null,color:'#3e3e48',text:'AR even ('+hAR.toFixed(0)+'% vs '+aAR.toFixed(0)+'%)'});

  // T7 — Closing Lineup (real closer identification)
  let t7sig = {key:'T7',w:0,team:null,color:'#3e3e48',text:'Lineup data pending'};
  if(p>=2 && H?.players && A?.players){
    const hOnCourt = (H.players||[]).filter(pl=>pl.on_court).map(pl=>pl.full_name||'?');
    const aOnCourt = (A.players||[]).filter(pl=>pl.on_court).map(pl=>pl.full_name||'?');
    // Use baselines starters OR structural closers for identification
    const knownClosers = cardState[game.id]?.structural?.closers;
    const knownStarters = bl?.starters;
    const hClosers = knownClosers?.home || knownStarters?.home || [];
    const aClosers = knownClosers?.away || knownStarters?.away || [];
    if(hClosers.length>0 || aClosers.length>0){
      const hCloserCount = hOnCourt.filter(n=>hClosers.some(c=>n.includes(c)||c.includes(n))).length;
      const aCloserCount = aOnCourt.filter(n=>aClosers.some(c=>n.includes(c)||c.includes(n))).length;
      // Get combined +/- of on-court players
      const hPM = (H.players||[]).filter(pl=>pl.on_court).reduce((s,pl)=>s+(pl.statistics?.plus_minus||0),0);
      const aPM = (A.players||[]).filter(pl=>pl.on_court).reduce((s,pl)=>s+(pl.statistics?.plus_minus||0),0);
      if(hCloserCount>=4 && hPM>0){
        t7sig = {key:'T7',w:1,team:hA,color:'#a8ff78',text:hA+' closing '+hCloserCount+'/5 on floor (+'+ hPM+' combined) — sustained'};
      } else if(aCloserCount>=4 && aPM>0){
        t7sig = {key:'T7',w:1,team:aA,color:'#a8ff78',text:aA+' closing '+aCloserCount+'/5 on floor (+'+aPM+' combined) — sustained'};
      } else if(hCloserCount<=2 && hPM>0){
        t7sig = {key:'T7',w:0,team:null,color:'#ffd166',text:hA+' bench-heavy generating (+'+hPM+') — CONDITIONAL'};
      } else if(aCloserCount<=2 && aPM>0){
        t7sig = {key:'T7',w:0,team:null,color:'#ffd166',text:aA+' bench-heavy generating (+'+aPM+') — CONDITIONAL'};
      } else {
        t7sig.text = hA+': '+hCloserCount+'/'+hClosers.length+' closers ('+hPM+') | '+aA+': '+aCloserCount+'/'+aClosers.length+' ('+aPM+')';
      }
    } else {
      t7sig.text = hA+': '+hOnCourt.length+' on court | '+aA+': '+aOnCourt.length+' on court';
    }
  }
  sigs.push(t7sig);

  // T8 — Shot Diet Misalignment (team-specific thresholds)
  const hFGA=hs.field_goals_att||1, aFGA=as.field_goals_att||1;
  const h3r=(hs.three_points_att||0)/hFGA*100, a3r=(as.three_points_att||0)/aFGA*100;
  // Determine thresholds based on team identity
  const struct = cardState[game.id]?.structural;
  let hThreshold=40, aThreshold=40;
  if(bl && bl.built){
    hThreshold = (bl.teamSeason3PARate?.home||35) + (struct?.shotDiet?.home==='INTERIOR'?8:struct?.shotDiet?.home==='PERIMETER'?12:10);
    aThreshold = (bl.teamSeason3PARate?.away||35) + (struct?.shotDiet?.away==='INTERIOR'?8:struct?.shotDiet?.away==='PERIMETER'?12:10);
  }
  if(h3r>=hThreshold){
    let detail = hA+' 3PA/FGA '+h3r.toFixed(0)+'% vs '+hThreshold.toFixed(0)+'% threshold — MISALIGNED';
    if(pbpD){
      const h3 = pbpD.home.threes;
      const astPct = h3.made>0 ? (h3.assisted/h3.made*100).toFixed(0) : '0';
      detail += ' ('+astPct+'% ast)';
    }
    sigs.push({key:'T8',w:1,team:aA,color:'#ff6b6b',text:detail});
  } else if(a3r>=aThreshold){
    let detail = aA+' 3PA/FGA '+a3r.toFixed(0)+'% vs '+aThreshold.toFixed(0)+'% threshold — MISALIGNED';
    if(pbpD){
      const a3 = pbpD.away.threes;
      const astPct = a3.made>0 ? (a3.assisted/a3.made*100).toFixed(0) : '0';
      detail += ' ('+astPct+'% ast)';
    }
    sigs.push({key:'T8',w:1,team:hA,color:'#ff6b6b',text:detail});
  } else {
    let dietNote = hA+' '+h3r.toFixed(0)+'%'+(bl?.built?' (thr:'+hThreshold.toFixed(0)+'%)':'')+' / '+aA+' '+a3r.toFixed(0)+'%'+(bl?.built?' (thr:'+aThreshold.toFixed(0)+'%)':'');
    if(pbpD) dietNote += ' | rim:'+pbpD.home.shotDiet.rimPct+'%/'+pbpD.away.shotDiet.rimPct+'%';
    sigs.push({key:'T8',w:0,team:null,color:'#3e3e48',text:'Diet aligned ('+dietNote+')'});
  }

  const lm={};sigs.forEach(s=>{if(s.team&&s.w>0)lm[s.team]=(lm[s.team]||0)+s.w;});
  const sorted=Object.entries(lm).sort((a,b)=>b[1]-a[1]),lean=sorted.length>0?sorted[0][0]:'NEUTRAL';
  const count=sigs.filter(s=>s.team===lean&&s.w>0).length,total=sigs.filter(s=>s.w>0).length;
  return {signals:sigs, lean, count, total, tooEarly:false};
}

function getVerdict(s){
  if(s>=.90) return {label:'DOMINANT',color:'#00ff88',bg:'rgba(0,255,136,.10)',lvl:'entry'};
  if(s>=.75) return {label:'STRONG',color:'#a8ff78',bg:'rgba(168,255,120,.08)',lvl:'entry'};
  if(s>=.60) return {label:'EARNED',color:'#ffd166',bg:'rgba(255,209,102,.08)',lvl:'watch'};
  if(s>=.45) return {label:'NO EDGE',color:'#ff5252',bg:'rgba(255,82,82,.06)',lvl:null};
  return {label:'WAIT',color:'#555',bg:'rgba(60,60,60,.06)',lvl:null};
}

// ══════════════════════════════════════════════════════════════════════════════
// PLAYER BASELINES — Built from p.average on every SR summary refresh
// ══════════════════════════════════════════════════════════════════════════════
function buildPlayerBaselines(game){
  const s = game.summary;
  if(!s || !s.home?.players || !s.away?.players) return null;
  const hA = s.home?.alias||s.home?.name||'HOME', aA = s.away?.alias||s.away?.name||'AWAY';
  const players = {};
  let hSzn3PM=0, hSzn3PA=0, hSznFGM=0, hSznFGA=0;
  let aSzn3PM=0, aSzn3PA=0, aSznFGM=0, aSznFGA=0;
  const hStarters=[], aStarters=[], hByUSG=[], aByUSG=[];

  function processPlayer(p, teamAlias, side){
    const avg = p.average||{};
    const name = p.full_name||p.name||'?';
    const szn3m = avg.three_points_made||0, szn3a = avg.three_points_att||0;
    const sznFGm = avg.field_goals_made||0, sznFGa = avg.field_goals_att||0;
    const szn3Pct = szn3a >= 1.0 ? (szn3m/szn3a*100) : null;
    const sznFGPct = sznFGa >= 1.0 ? (sznFGm/sznFGa*100) : null;
    const sznUSG = avg.usage_pct||0, sznMin = avg.minutes||0;
    // Tier classification (matches analyze.js logic)
    let tier = 'NON';
    if(szn3Pct===null) tier = 'UNK';
    else if(szn3Pct>=38.0 && szn3a>=2.0) tier = 'ELITE';
    else if(szn3Pct>=33.0 || (szn3Pct>=30.0 && szn3a>=3.0)) tier = 'AVG';
    else tier = 'NON';
    if(szn3a<1.5 && tier==='ELITE') tier = 'AVG';
    if(szn3a<0.8 && tier!=='NON' && tier!=='UNK') tier = 'NON';

    const entry = {team:teamAlias, side, szn3Pct, szn3Vol:szn3a, sznFGPct, sznUSG, sznMin,
      sznPts:avg.points||0, sznAst:avg.assists||0, sznReb:avg.rebounds||0, sznStl:avg.steals||0,
      tier, position:p.primary_position||'?', starter:!!p.starter, name};
    players[name] = entry;
    if(side==='home'){
      hSzn3PM+=szn3m; hSzn3PA+=szn3a; hSznFGM+=sznFGm; hSznFGA+=sznFGa;
      if(p.starter) hStarters.push(name);
      hByUSG.push({name, usg:sznUSG, min:sznMin});
    } else {
      aSzn3PM+=szn3m; aSzn3PA+=szn3a; aSznFGM+=sznFGm; aSznFGA+=sznFGa;
      if(p.starter) aStarters.push(name);
      aByUSG.push({name, usg:sznUSG, min:sznMin});
    }
  }

  (s.home.players||[]).forEach(p=>processPlayer(p, hA, 'home'));
  (s.away.players||[]).forEach(p=>processPlayer(p, aA, 'away'));

  // Verify we got real season data (not all zeros)
  const hasData = hSzn3PA>=3 || aSzn3PA>=3;
  if(!hasData) return {built:false, players:{}, reason:'No season averages in summary'};

  hByUSG.sort((a,b)=>b.usg-a.usg); aByUSG.sort((a,b)=>b.usg-a.usg);
  return {
    built: true,
    players,
    stars: {
      home: hByUSG.slice(0,2).map(x=>x.name),
      away: aByUSG.slice(0,2).map(x=>x.name),
    },
    starters: {
      home: hStarters.length>=4 ? hStarters : hByUSG.slice(0,5).map(x=>x.name),
      away: aStarters.length>=4 ? aStarters : aByUSG.slice(0,5).map(x=>x.name),
    },
    teamSeason3Pct: {
      home: hSzn3PA>=5 ? (hSzn3PM/hSzn3PA*100) : 36.0,
      away: aSzn3PA>=5 ? (aSzn3PM/aSzn3PA*100) : 36.0,
    },
    teamSeason3PARate: {
      home: hSznFGA>=10 ? (hSzn3PA/hSznFGA*100) : 35.0,
      away: aSznFGA>=10 ? (aSzn3PA/aSznFGA*100) : 35.0,
    },
  };
}

// STRUCTURAL CONTEXT — Extracted once from srCache after thesis generation
// ══════════════════════════════════════════════════════════════════════════════
function extractStructuralContext(gameId){
  try{
    const cached = localStorage.getItem('nba4:srCache:'+gameId);
    if(!cached) return null;
    const c = JSON.parse(cached);
    const game = games.find(g=>g.id===gameId);
    if(!game) return null;
    const hA = game.home?.alias||'HOME', aA = game.away?.alias||'AWAY';
    const hId = game.home?.id||game.home?.sr_id||'', aId = game.away?.id||game.away?.sr_id||'';

    // Multi-strategy team matching for injuries (same as server)
    function matchSide(t){
      if(hId && (t.id===hId || t.sr_id===hId)) return 'home';
      if(aId && (t.id===aId || t.sr_id===aId)) return 'away';
      const a = (t.alias||t.abbreviation||t.abbr||'').toUpperCase();
      if(a && a===hA.toUpperCase()) return 'home';
      if(a && a===aA.toUpperCase()) return 'away';
      const nm = (t.name||'').toLowerCase(), mk = (t.market||'').toLowerCase();
      if(nm.indexOf(hA.toLowerCase())>=0 || mk.indexOf(hA.toLowerCase())>=0) return 'home';
      if(nm.indexOf(aA.toLowerCase())>=0 || mk.indexOf(aA.toLowerCase())>=0) return 'away';
      return null;
    }

    // Closers from depth charts
    const closers = {home:[], away:[]};
    const foulBackups = {home:{}, away:{}};
    function resolvePos(d){
      if(!d) return [];
      // Check positions key first
      if(d.positions){
        if(Array.isArray(d.positions)) return d.positions;
        if(typeof d.positions === 'object'){
          const conv = [];
          Object.keys(d.positions).forEach(posName=>{
            const val = d.positions[posName];
            let players = [];
            if(Array.isArray(val)) players = val;
            else if(val?.players && Array.isArray(val.players)) players = val.players;
            else if(val && typeof val === 'object') players = Object.values(val).filter(v=>v&&typeof v==='object'&&(v.full_name||v.name));
            if(players.length>0) conv.push({name:posName, position:posName, players});
          });
          if(conv.length>0) return conv;
        }
      }
      if(Array.isArray(d)) return d;
      if(d.depth_chart) return resolvePos(d.depth_chart);
      const skip = ['id','name','market','alias','founded','sr_id','reference','venue','league','conference','division','coaches'];
      for(const k of Object.keys(d)){
        if(skip.includes(k)) continue;
        const v=d[k];
        if(Array.isArray(v)&&v.length>0&&v[0]&&(Array.isArray(v[0].players)||v[0].name||v[0].position)) return v;
      }
      return [];
    }
    function extractDepth(d, side){
      const pos = resolvePos(d);
      pos.forEach(p=>{
        const pls = Array.isArray(p.players)?p.players:[];
        const d1 = pls.find(x=>x.depth===1||x.depth==='1');
        const d2 = pls.find(x=>x.depth===2||x.depth==='2');
        if(d1) closers[side].push(d1.full_name||d1.name||'?');
        if(d1 && d2) foulBackups[side][d1.full_name||d1.name] = d2.full_name||d2.name||'?';
      });
    }
    extractDepth(c.homeDepth, 'home');
    extractDepth(c.awayDepth, 'away');

    // Pythagorean from standings
    const pyth = {home:{expected:0,actual:0,delta:0,cap:null}, away:{expected:0,actual:0,delta:0,cap:null}};
    if(c.standings){
      const allTeams = [];
      (c.standings.conferences||[]).forEach(conf=>{
        (conf.divisions||[]).forEach(div=>{
          (div.teams||[]).forEach(t=>allTeams.push(t));
        });
      });
      function calcPyth(alias){
        const t = allTeams.find(x=>(x.alias||x.abbr||'').toUpperCase()===alias.toUpperCase());
        if(!t) return {expected:0,actual:0,delta:0,cap:null};
        const pf = t.calc_points?.for || t.points_for || 0;
        const pa = t.calc_points?.against || t.points_against || 0;
        const gp = (t.wins||0)+(t.losses||0);
        if(!pf||!pa||!gp) return {expected:0,actual:0,delta:0,cap:null};
        const pythWin = Math.pow(pf,13.91)/(Math.pow(pf,13.91)+Math.pow(pa,13.91));
        const expW = Math.round(pythWin*gp*10)/10;
        const actW = t.wins||0;
        const delta = actW-expW;
        let cap = null;
        if(delta<=-5) cap = 0.70;
        else if(delta<=-3) cap = 0.75;
        else if(delta>=5) cap = 0.75;
        return {expected:expW, actual:actW, delta:Math.round(delta*10)/10, cap, gp, losses:t.losses||0};
      }
      pyth.home = calcPyth(hA);
      pyth.away = calcPyth(aA);
    }

    // Opponent profile from seasonal stats
    const oppProfile = {home:{steals:0,disruptionTier:'LOW'}, away:{steals:0,disruptionTier:'LOW'}};
    function extractOpp(stats, side){
      const opp = stats?.opponents?.statistics || (stats?.own_record?.opponents||{}).statistics || {};
      const stl = opp.steals||0;
      oppProfile[side] = {steals:stl, disruptionTier: stl>=8.5?'HIGH':stl>=7.0?'MODERATE':'LOW'};
    }
    extractOpp(c.homeStats, 'home');
    extractOpp(c.awayStats, 'away');

    // Key outs from injuries
    const keyOuts = [];
    if(c.injuries?.teams){
      c.injuries.teams.forEach(t=>{
        const side = matchSide(t);
        if(!side) return;
        (t.players||[]).forEach(p=>{
          const injArr = Array.isArray(p.injuries) ? p.injuries : [];
          const latestInj = injArr.length > 0 ? injArr[0] : {};
          let st = (latestInj.status || p.status || '').toUpperCase();
          if(!st){
            const desc = (latestInj.comment||latestInj.desc||p.desc||'').toUpperCase();
            if(desc.indexOf('OUT')>=0 || desc.indexOf('NOT WITH TEAM')>=0) st='OUT';
            else if(desc.indexOf('DOUBTFUL')>=0) st='DOUBTFUL';
            else if(desc.indexOf('QUESTIONABLE')>=0) st='QUESTIONABLE';
          }
          const injDesc = latestInj.desc || latestInj.comment || p.desc || '?';
          if(st==='OUT'||st==='O'||st==='IR'||st==='NOT WITH TEAM'){
            keyOuts.push({name:p.full_name||'?', team:t.alias||t.abbreviation||t.market||'?', position:p.primary_position||p.position||'?',
              injury:injDesc, status:'OUT', side: side});
          }
        });
      });
    }

    // Shot diet identity from seasonal stats
    const shotDiet = {home:'BALANCED', away:'BALANCED'};
    function classifyDiet(stats, side){
      const own = stats?.own_record||stats||{};
      const ts = own.statistics||stats?.statistics||{};
      const fga = ts.field_goals_att||1;
      const threeRate = (ts.three_points_att||0)/fga*100;
      const paintPts = ts.points_in_the_paint||0;
      const atRimRate = (ts.field_goals_at_rim_att||0)/fga*100;
      if(threeRate>=38 && (ts.assists||0)/(ts.field_goals_made||1)*100>=65) shotDiet[side] = 'PERIMETER';
      else if(paintPts>=48 || atRimRate>=35) shotDiet[side] = 'INTERIOR';
      else shotDiet[side] = 'BALANCED';
    }
    classifyDiet(c.homeStats, 'home');
    classifyDiet(c.awayStats, 'away');

    const result = {built:true, closers, foulBackups, pythagorean:pyth, oppProfile, keyOuts, shotDiet};
    return result;
  }catch(e){
    console.error('extractStructuralContext failed:', e.message);
    return {built:false};
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// CLIENT-SIDE SUSTAINABILITY AUDIT — Port of server-side analyze.js logic
// ══════════════════════════════════════════════════════════════════════════════
function computeSustainabilityClient(teamData, baselines, teamAlias, side, trackingData){
  if(!teamData || !baselines?.built) return null;
  const stats = teamData.statistics||{};
  const players = teamData.players||[];
  const team3PM = stats.three_points_made||0, team3PA = stats.three_points_att||0;
  const teamFGA = stats.field_goals_att||1;
  const live3Pct = team3PA>0 ? (team3PM/team3PA*100) : 0;
  const seasonBaseline = baselines.teamSeason3Pct?.[side]||36.0;

  // Auto-override: shooting at or below baseline → LOCKED
  if(live3Pct <= seasonBaseline+2) return {tier:'LOCKED', reason:'Shooting at/below baseline ('+live3Pct.toFixed(0)+'% vs '+seasonBaseline.toFixed(0)+'% szn)', personnel:'N/A', regression:'N/A', shotType:'N/A', autoLocked:true};

  // Personnel audit (40%)
  const makesByTier = {ELITE:0,AVG:0,NON:0,UNK:0};
  const hotPlayers = [];
  players.forEach(p=>{
    const live = p.statistics||{};
    const live3m = live.three_points_made||0, live3a = live.three_points_att||0;
    if(live3a<2) return;
    const name = p.full_name||p.name||'?';
    const bl = baselines.players?.[name];
    const tier = bl?.tier||'UNK';
    makesByTier[tier] = (makesByTier[tier]||0) + live3m;
    if(bl && bl.szn3Pct!==null){
      const livePct = live3m/live3a*100;
      if(livePct > bl.szn3Pct+12) hotPlayers.push({name, livePct:livePct.toFixed(0), sznPct:bl.szn3Pct.toFixed(0), tier, live3m, live3a});
    }
  });
  const totalMakes = team3PM||1;
  const elitePct = makesByTier.ELITE/totalMakes*100;
  const nonPct = (makesByTier.NON+makesByTier.UNK)/totalMakes*100;
  let personnelGrade;
  if(elitePct>=70) personnelGrade = 'LOCKED';
  else if(elitePct>=50 && nonPct<=20) personnelGrade = 'DURABLE';
  else if(nonPct>=50) personnelGrade = 'UNSUSTAINABLE';
  else if(nonPct>=35) personnelGrade = 'FRAGILE';
  else personnelGrade = 'MIXED';

  // Bayesian regression (35%)
  const priorStrength = 30;
  const priorAlpha = seasonBaseline/100*priorStrength;
  const priorBeta = (1-seasonBaseline/100)*priorStrength;
  const postAlpha = priorAlpha+team3PM;
  const postBeta = priorBeta+(team3PA-team3PM);
  const posteriorMean = postAlpha/(postAlpha+postBeta)*100;
  const deviation = live3Pct-seasonBaseline;
  let regressionProb;
  if(team3PA<=8) regressionProb=85;
  else if(team3PA<=14) regressionProb=70;
  else if(team3PA<=20) regressionProb=55;
  else if(team3PA<=28) regressionProb=40;
  else regressionProb=25;
  if(deviation>15) regressionProb=Math.min(95,regressionProb+15);
  else if(deviation>8) regressionProb=Math.min(95,regressionProb+8);
  else if(deviation>3) regressionProb=Math.min(95,regressionProb+3);
  else if(deviation<-3) regressionProb=Math.max(5,regressionProb-8);
  let regressionGrade;
  if(regressionProb>=75) regressionGrade='HIGH';
  else if(regressionProb>=55) regressionGrade='MODERATE';
  else if(regressionProb>=35) regressionGrade='LOW';
  else regressionGrade='MINIMAL';

  // Shot type proxy (25%)
  const teamAst = stats.assists||0, teamFGM = stats.field_goals_made||1;
  const assistRatio = teamAst/teamFGM*100;
  let shotTypeGrade = 'MIXED';
  const tracking = trackingData?.[side==='home'?'home':'away'] || trackingData;
  if(tracking?.catchAndShoot){
    const casEfg = tracking.catchAndShoot.efg||tracking.catchAndShoot.fg3pct||null;
    const puEfg = tracking.pullUp?.efg||tracking.pullUp?.fg3pct||null;
    if(casEfg!==null && puEfg!==null){
      if(assistRatio>=60 && casEfg>=38) shotTypeGrade='DURABLE';
      else if(assistRatio<45 && puEfg<35) shotTypeGrade='FRAGILE';
      else if(assistRatio>=50) shotTypeGrade='MIXED';
      else shotTypeGrade='FRAGILE';
    } else {
      if(assistRatio>=65) shotTypeGrade='DURABLE';
      else if(assistRatio<45) shotTypeGrade='FRAGILE';
    }
  } else {
    if(assistRatio>=65) shotTypeGrade='DURABLE';
    else if(assistRatio<45) shotTypeGrade='FRAGILE';
  }

  // Composite — 5 tiers
  const tierMap = {'LOCKED':5,'DURABLE':4,'MIXED':3,'FRAGILE':2,'UNSUSTAINABLE':1,'HIGH':1,'MODERATE':2,'LOW':4,'MINIMAL':5};
  const pScore = tierMap[personnelGrade]||3;
  const rScore = tierMap[regressionGrade]||3;
  const sScore = tierMap[shotTypeGrade]||3;
  const composite = pScore*0.40 + rScore*0.35 + sScore*0.25;
  let tier;
  if(composite>=4.5) tier='LOCKED';
  else if(composite>=3.8) tier='DURABLE';
  else if(composite>=2.8) tier='MIXED';
  else if(composite>=1.8) tier='FRAGILE';
  else tier='UNSUSTAINABLE';

  // Build reason line
  let reason = '';
  if(nonPct>=50) reason = Math.round(nonPct)+'% of 3PM from non-shooters';
  else if(elitePct>=70) reason = Math.round(elitePct)+'% of 3PM from elite shooters';
  else if(hotPlayers.length>0) reason = hotPlayers.map(h=>h.name+' '+h.livePct+'% vs '+h.sznPct+'% szn').join(', ');
  else if(regressionProb>=70) reason = 'High regression probability ('+regressionProb+'%) — small sample';
  else reason = 'P:'+personnelGrade+' R:'+regressionGrade+' S:'+shotTypeGrade;

  return {tier, reason, personnel:personnelGrade, regression:regressionGrade, shotType:shotTypeGrade,
    live3Pct:live3Pct.toFixed(1), seasonBaseline:seasonBaseline.toFixed(1), hotPlayers, autoLocked:false};
}

// ══════════════════════════════════════════════════════════════════════════════
// COMPUTE DISPATCH — routes to SR or BDL compute path
// ══════════════════════════════════════════════════════════════════════════════
function computeAny(game){
  if(game.dataSource==='BDL' && game.bdlData) return computeBDL(game);
  return compute(game);
}

// ══════════════════════════════════════════════════════════════════════════════
// COMPUTE INDICATORS (BDL FORMAT) — Option B: separate path
// ══════════════════════════════════════════════════════════════════════════════
function computeBDL(game){
  const d = game.bdlData;
  if(!d || getState(game)==='PRE') return null;
  const hs = d.home, as = d.away;
  const hA = hs.alias||'HOME', aA = as.alias||'AWAY';
  const hS = d.homePoints||0, aS = d.awayPoints||0;

  // I1 — Possession & Transition (no chaos layer — forced/unforced TOs unavailable)
  const hGen = (hs.steals||0)+(hs.offensive_rebounds||0)-(hs.turnovers||0);
  const aGen = (as.steals||0)+(as.offensive_rebounds||0)-(as.turnovers||0);
  const hConv = (hs.fast_break_points||0)+(hs.points_off_turnovers||0)+(hs.second_chance_points||0);
  const aConv = (as.fast_break_points||0)+(as.points_off_turnovers||0)+(as.second_chance_points||0);
  const i1 = (hGen>aGen?1:hGen<aGen?-1:0)+(hConv>aConv?1:hConv<aConv?-1:0);
  const I1={score:i1>0?1:i1===0?.5:0, leader:i1>0?hA:i1<0?aA:'EVEN',
    detail:`${hA} ${hs.steals||0}stl ${hs.offensive_rebounds||0}or ${hs.turnovers||0}to | ${aA} ${as.steals||0}stl ${as.offensive_rebounds||0}or ${as.turnovers||0}to | Conv:${hConv}–${aConv} [no chaos layer]`};

  // I2 — Rim Pressure & Foul (paint + FTA + bonus from BDL — no at-rim splits)
  const hPaint = hs.points_in_the_paint||0, aPaint = as.points_in_the_paint||0;
  const hFTA = hs.free_throws_att||0, aFTA = as.free_throws_att||0;
  const hBlk = hs.blocks||0, aBlk = as.blocks||0;
  const rimScore = (hPaint+hFTA+hBlk)-(aPaint+aFTA+aBlk);
  const I2={score:rimScore>8?1:rimScore<-8?0:.5, leader:rimScore>8?hA:rimScore<-8?aA:'EVEN',
    detail:`Paint:${hPaint}–${aPaint} FTA:${hFTA}–${aFTA} BLK:${hBlk}–${aBlk}${d.homeBonus?' '+hA+'⬤':''}${d.awayBonus?' '+aA+'⬤':''} [no at-rim]`};

  // I3 — Shot Quality & Creation (full-game assist ratio only, no per-quarter trend)
  const hFGA=hs.field_goals_att||1, aFGA=as.field_goals_att||1;
  const hEFG=(((hs.field_goals_made||0)+.5*(hs.three_points_made||0))/hFGA);
  const aEFG=(((as.field_goals_made||0)+.5*(as.three_points_made||0))/aFGA);
  const hAst=hs.assists||0, aAst=as.assists||0;
  const hFGM=hs.field_goals_made||1, aFGM=as.field_goals_made||1;
  const hAR=(hAst/hFGM)*100, aAR=(aAst/aFGM)*100;
  const i3=(hEFG>aEFG+.02?1:hEFG<aEFG-.02?-1:0)+(hAR>aAR+5?1:hAR<aAR-5?-1:0);
  const I3={score:i3>0?1:i3===0?.5:0, leader:i3>0?hA:i3<0?aA:'EVEN',
    detail:`eFG%:${(hEFG*100).toFixed(1)}–${(aEFG*100).toFixed(1)} AR:${hAR.toFixed(0)}–${aAR.toFixed(0)} AST:${hAst}–${aAst}`};

  // I4 — Lineup Integrity (score delta + quarters — no on_court, no per-Q plus/minus)
  const qDs = (d.quarters||[]).map(q=>(q.home_points||0)-(q.away_points||0));
  const trend = qDs.length>=2 ? qDs[qDs.length-1]-qDs[0] : 0;
  // No biggest_lead from BDL — use score differential as proxy
  const scoreDiff = Math.abs(hS-aS);
  const i4 = (scoreDiff>8&&hS>aS?1:scoreDiff>8&&aS>hS?-1:0)+(trend>2?1:trend<-2?-1:0);
  const I4={score:i4>0?1:i4===0?.5:0, leader:i4>0?hA:i4<0?aA:'EVEN',
    detail:`Δ:${hS>aS?'+':''}${hS-aS} trend:${trend>0?'+':''}${trend} ${qDs.map((dd,i)=>'Q'+(i+1)+':'+(dd>0?'+':'')+dd).join(' ')} [no lineup/bench split]`};

  // I5 — Tempo & Efficiency (derived from BDL offensive/defensive rating)
  const hOPPP = (hs.offensive_rating||0)/100, aOPPP = (as.offensive_rating||0)/100;
  const hDPPP = (hs.defensive_rating||0)/100, aDPPP = (as.defensive_rating||0)/100;
  const effD = (hOPPP-aDPPP)-(aOPPP-hDPPP);
  const hPoss = hs.possessions||0, aPoss = as.possessions||0;
  const I5={score:effD>0.08?1:effD<-0.08?0:.5, leader:effD>0.08?hA:effD<-0.08?aA:'EVEN',
    detail:`ORtg:${(hs.offensive_rating||0).toFixed(1)}–${(as.offensive_rating||0).toFixed(1)} DRtg:${(hs.defensive_rating||0).toFixed(1)}–${(as.defensive_rating||0).toFixed(1)} Poss:${hPoss}–${aPoss}`};

  const raw = I1.score*W.I1 + I2.score*W.I2 + I3.score*W.I3 + I4.score*W.I4 + I5.score*W.I5;
  const controlHome = raw>=.5, cTeam = controlHome?hA:aA, score = controlHome?raw:1-raw;

  // Trajectory — BDL partial (T4 and T7 unavailable)
  const traj = buildTrajectoryBDL(game, hA, aA, hs, as, hS, aS, qDs, d);

  return {I1,I2,I3,I4,I5, score, controlTeam:cTeam, dataQuality:'PARTIAL', traj};
}

function buildTrajectoryBDL(game, hA, aA, hs, as, hS, aS, qDs, d){
  const p = game.period||0;
  if(p<2) return {signals:[], lean:'NEUTRAL', count:0, total:0, tooEarly:true};
  const sigs = [], overall=hS-aS, currQ=qDs.length>0?qDs[qDs.length-1]:null;

  // T1 — BDL: no per-player live shooting available, use conversion fallback
  const bl = cardState[game.id]?.baselines;
  const hC=(hs.fast_break_points||0)+(hs.points_off_turnovers||0), aC=(as.fast_break_points||0)+(as.points_off_turnovers||0);
  if(Math.abs(hC-aC)>=10){const w=hC>aC?hA:aA;sigs.push({key:'T1*',w:1,team:w,color:'#ffd166',text:w+' conversion +'+(Math.abs(hC-aC))+' (FBP+POT) [BDL]'});}
  else sigs.push({key:'T1*',w:0,team:null,color:'#3e3e48',text:'Conversion flat ('+hC+'–'+aC+') [BDL]'});

  // T2 — BDL: no per-player live stats for star process check
  sigs.push({key:'T2*',w:0,team:null,color:'#555',text:'⊘ Unavailable (BDL — no per-player live stats)'});

  // T3 — Quarter Delta (available from BDL quarter scores)
  if(currQ!=null&&Math.abs(currQ)>=6){const w=currQ>0?hA:aA,tr=(currQ>0&&overall<0)||(currQ<0&&overall>0);sigs.push({key:'T3',w:2,team:w,color:'#00ff88',text:w+' winning Q'+p+' by '+Math.abs(currQ)+(tr?' (trailing—comeback)':'')});}
  else sigs.push({key:'T3',w:0,team:null,color:'#3e3e48',text:'Q delta <6 — neutral'});

  // T4 — UNAVAILABLE in BDL (no per-player per-quarter fouls)
  sigs.push({key:'T4',w:0,team:null,color:'#555',text:'⊘ Unavailable (BDL — no per-player fouls)'});

  // T5 — Interior Trend (paint points available)
  const hPaint=hs.points_in_the_paint||0, aPaint=as.points_in_the_paint||0;
  if(Math.abs(hPaint-aPaint)>=8){const w=hPaint>aPaint?hA:aA;sigs.push({key:'T5',w:1,team:w,color:'#a8ff78',text:w+' paint +'+(Math.abs(hPaint-aPaint))+' ('+hPaint+'–'+aPaint+')'});}
  else sigs.push({key:'T5',w:0,team:null,color:'#3e3e48',text:'Paint even ('+hPaint+'–'+aPaint+')'});

  // T6 — Assist Ratio (full-game only, no per-quarter)
  const hFGM=hs.field_goals_made||1,aFGM=as.field_goals_made||1;
  const hAR=(hs.assists||0)/hFGM*100, aAR=(as.assists||0)/aFGM*100;
  if(Math.abs(hAR-aAR)>=15){const w=hAR>aAR?hA:aA;sigs.push({key:'T6',w:1,team:w,color:'#a8ff78',text:w+' AR '+Math.max(hAR,aAR).toFixed(0)+'% vs '+Math.min(hAR,aAR).toFixed(0)+'%'});}
  else sigs.push({key:'T6',w:0,team:null,color:'#3e3e48',text:'AR even ('+hAR.toFixed(0)+'% vs '+aAR.toFixed(0)+'%)'});

  // T7 — UNAVAILABLE in BDL (no on_court flags)
  sigs.push({key:'T7',w:0,team:null,color:'#555',text:'⊘ Unavailable (BDL — no lineup data)'});

  // T8 — Shot Diet (team-specific thresholds when baselines available)
  const hFGA=hs.field_goals_att||1, aFGA=as.field_goals_att||1;
  const h3r=(hs.three_points_att||0)/hFGA*100, a3r=(as.three_points_att||0)/aFGA*100;
  const struct = cardState[game.id]?.structural;
  let hThr=40, aThr=40;
  if(bl && bl.built){
    hThr = (bl.teamSeason3PARate?.home||35) + (struct?.shotDiet?.home==='INTERIOR'?8:struct?.shotDiet?.home==='PERIMETER'?12:10);
    aThr = (bl.teamSeason3PARate?.away||35) + (struct?.shotDiet?.away==='INTERIOR'?8:struct?.shotDiet?.away==='PERIMETER'?12:10);
  }
  if(h3r>=hThr)sigs.push({key:'T8',w:1,team:aA,color:'#ff6b6b',text:hA+' 3PA/FGA '+h3r.toFixed(0)+'% vs '+hThr.toFixed(0)+'% threshold — MISALIGNED'});
  else if(a3r>=aThr)sigs.push({key:'T8',w:1,team:hA,color:'#ff6b6b',text:aA+' 3PA/FGA '+a3r.toFixed(0)+'% vs '+aThr.toFixed(0)+'% threshold — MISALIGNED'});
  else sigs.push({key:'T8',w:0,team:null,color:'#3e3e48',text:'Diet aligned ('+hA+' '+h3r.toFixed(0)+'% / '+aA+' '+a3r.toFixed(0)+'%)'});

  const lm={};sigs.forEach(s=>{if(s.team&&s.w>0)lm[s.team]=(lm[s.team]||0)+s.w;});
  const sorted=Object.entries(lm).sort((a,b)=>b[1]-a[1]),lean=sorted.length>0?sorted[0][0]:'NEUTRAL';
  const count=sigs.filter(s=>s.team===lean&&s.w>0).length,total=sigs.filter(s=>s.w>0).length;
  return {signals:sigs, lean, count, total, tooEarly:false};
}
