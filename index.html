<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07070a">
<title>NBA Control v5.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#07070a;--s1:#0e0e12;--s2:#131318;--b1:#22222a;--b2:#2e2e38;
  --t1:#e2e2ee;--t2:#9a9aac;--t3:#5a5a6a;
  --amber:#f5a62a;--green:#00ff88;--g2:#a8ff78;--red:#ff5252;--yellow:#ffd166;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--mono);min-height:100vh;min-height:100dvh;overscroll-behavior:none;}
input,textarea,select{font-size:16px!important;}
@media(min-width:600px){input,textarea,select{font-size:inherit!important;}}
.app{padding:12px;max-width:1400px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,12px);}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 0 10px;border-bottom:1px solid var(--b1);margin-bottom:9px;gap:6px;}
.logo{font-size:8px;font-weight:600;letter-spacing:4px;color:var(--amber);text-transform:uppercase;white-space:nowrap;}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s ease-in-out infinite;margin:0 7px;flex-shrink:0;}
.pulse.off{background:var(--t3);box-shadow:none;animation:none;}
.hdr-sub{font-size:7px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-r{font-size:7px;color:var(--t3);white-space:nowrap;flex-shrink:0;}
.hdr-r span{color:var(--amber);}

/* Controls */
.ctrls{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:9px;}
.cbtn{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;background:none;border:1px solid var(--b2);color:var(--t2);font-family:var(--mono);padding:7px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-appearance:none;border-radius:0;min-height:32px;}
.cbtn:hover,.cbtn.on{border-color:var(--amber);color:var(--amber);background:rgba(245,166,42,.06);}
.cbtn:active{opacity:.7;}
.cbtn.freq{font-size:6px;padding:5px 7px;min-height:28px;}
.cbtn.freq.on{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.06);}
.cbtn.freq.warn{border-color:var(--red);color:var(--red);}
.ci{background:var(--s1);border:1px solid var(--b2);color:var(--t1);font-family:var(--mono);padding:7px 8px;outline:none;width:120px;-webkit-appearance:none;border-radius:0;min-height:32px;}
.ci:focus{border-color:var(--amber);}
.ci::placeholder{color:var(--t3);}
.cml{margin-left:auto;font-size:7px;color:var(--t3);white-space:nowrap;}
.cml span{color:var(--amber);}
.freq-group{display:flex;align-items:center;gap:2px;margin-left:4px;}
.freq-lbl{font-size:6px;color:var(--t3);letter-spacing:1px;margin-right:2px;}

/* Pills */
.pills{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:9px;}
.pill{font-size:7px;letter-spacing:.8px;padding:6px 10px;border:1px solid var(--b2);cursor:pointer;font-family:var(--mono);color:var(--t2);background:none;transition:all .15s;-webkit-appearance:none;border-radius:0;min-height:30px;}
.pill:hover,.pill.sel{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.04);}
.pill.live{border-color:var(--yellow);color:var(--yellow);}
.pill.done{color:var(--t3);border-color:var(--b1);}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:8px;}

/* Card */
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes cg{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.12)}50%{box-shadow:0 0 0 8px rgba(0,255,136,0)}}
.card{background:var(--s1);border:1px solid var(--b1);animation:fu .2s ease;overflow:hidden;position:relative;}
.card.ce{border-color:var(--green);animation:fu .2s ease,cg 2.5s ease-in-out infinite;}
.card.cw{border-color:var(--yellow);}
.card.ce::before,.card.cw::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.card.ce::before{background:var(--green);box-shadow:0 0 8px var(--green);}
.card.cw::before{background:var(--yellow);}

.ch{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:var(--s2);border-bottom:1px solid var(--b1);}
.mup{font-size:12px;font-weight:500;}
.sub{font-size:6px;color:var(--t3);margin-top:1px;}
.chr{display:flex;align-items:center;gap:5px;}
.pb{font-size:7px;letter-spacing:1px;padding:2px 6px;border:1px solid var(--b2);color:var(--amber);}
.ld{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 1.5s ease-in-out infinite;flex-shrink:0;}

.sr{display:flex;align-items:center;justify-content:space-between;padding:10px 11px;border-bottom:1px solid var(--b1);}
.srt{font-size:7px;color:var(--t2);letter-spacing:1px;margin-bottom:2px;}
.srs{font-size:26px;font-weight:600;letter-spacing:-1px;line-height:1;}
.bonus-tag{font-size:6px;color:var(--red);border:1px solid var(--red);padding:1px 3px;margin-left:3px;vertical-align:middle;}
.sr-sep{font-size:13px;color:var(--t3);}

.pre{padding:16px 11px;text-align:center;}
.prelbl{font-size:7px;color:var(--t2);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.prediv{height:1px;background:var(--b1);margin:14px 0;}
.countdown{color:var(--amber);font-size:22px;font-weight:600;}

.ctrl-bar{display:flex;align-items:center;gap:7px;padding:8px 11px;border-bottom:1px solid var(--b1);flex-wrap:wrap;}
.vrd{font-size:7px;font-weight:600;letter-spacing:2px;padding:2px 7px;border:1px solid;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.cl{font-size:6px;color:var(--t3);letter-spacing:1px;}
.ct{font-size:12px;font-weight:600;}
.bw{flex:1;min-width:60px;padding:0 3px;}
.bt2{height:2px;background:var(--b2);}
.bf{height:100%;transition:width .6s ease;}
.cn{font-size:17px;font-weight:600;letter-spacing:-1px;flex-shrink:0;}
.dq{font-size:6px;letter-spacing:1px;padding:1px 4px;border:1px solid;color:var(--green);border-color:var(--green);}

.inds{padding:6px 11px;border-bottom:1px solid var(--b1);}
.ind{display:flex;align-items:center;gap:4px;padding:2px 0;border-bottom:1px solid var(--b1);}
.ind:last-child{border:none;}
.ii{font-size:6px;color:var(--t3);width:14px;flex-shrink:0;}
.in{font-size:6px;color:var(--t2);width:78px;flex-shrink:0;}
.iw{font-size:6px;color:var(--t3);width:18px;flex-shrink:0;}
.pip{width:5px;height:5px;border-radius:1px;flex-shrink:0;}
.pw{background:#00ff88;}.plw{background:#a8ff78;}.pd{background:var(--yellow);}.pll{background:#ff8c42;}.pl{background:var(--red);}
.il{font-size:7px;font-weight:600;width:26px;flex-shrink:0;}
.id{font-size:6px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.traj{padding:6px 11px;border-bottom:1px solid var(--b1);}
.th{font-size:6px;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;margin-bottom:3px;gap:4px;flex-wrap:wrap;}
.tl{font-size:6px;font-weight:600;letter-spacing:1px;padding:1px 5px;border:1px solid;margin-left:auto;}
.ts{display:flex;align-items:flex-start;gap:3px;padding:2px 0;}
.tk{font-size:6px;font-weight:600;width:16px;flex-shrink:0;padding-top:1px;}
.tt{font-size:6px;flex:1;line-height:1.5;}

/* Sonnet Analysis */
.analysis{padding:8px 11px;border-bottom:1px solid var(--b1);background:rgba(0,255,136,.02);}
.analysis-hdr{font-size:6px;color:var(--green);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.analysis-body{font-size:7px;color:var(--t2);line-height:1.7;font-family:var(--sans);white-space:pre-wrap;word-break:break-word;}
.analysis-loading{font-size:7px;color:var(--t3);display:flex;align-items:center;gap:6px;}
.analysis-cost{font-size:5px;color:var(--t2);}

/* Decision View */
.dv{padding:8px 11px;border-bottom:1px solid var(--b1);background:rgba(167,139,250,.04);}
.dv-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.dv-row:last-child{margin-bottom:0;}
.dv-label{font-size:5px;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;width:56px;flex-shrink:0;}
.dv-val{font-size:9px;font-weight:600;}
.dv-sub{font-size:6px;color:var(--t2);}
.dv-tag{font-size:6px;letter-spacing:1px;padding:1px 5px;border:1px solid;white-space:nowrap;}
.dv-pred{font-size:7px;color:var(--t1);font-family:var(--sans);line-height:1.5;padding:4px 0 0;}
.dv-hdr{font-size:6px;color:#a78bfa;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}

/* Evidence toggle */
.ev-toggle{font-size:6px;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;padding:7px 11px;border-bottom:1px solid var(--b1);border-top:1px solid var(--b1);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;-webkit-user-select:none;background:rgba(255,255,255,.01);}
.ev-toggle:hover{color:var(--t2);background:rgba(255,255,255,.02);}
.ev-toggle .arr{transition:transform .2s;display:inline-block;}
.ev-toggle.open .arr{transform:rotate(90deg);}
.ev-body{overflow:hidden;transition:max-height .3s ease;}
.ev-body.collapsed{max-height:0!important;overflow:hidden;}

/* Data inputs (clutch + odds) */
.data-inputs{padding:4px 11px;border-bottom:1px solid var(--b1);background:rgba(245,166,42,.02);}
.di-hdr{font-size:5.5px;color:var(--amber);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;opacity:.8;}
.di-row{display:flex;align-items:center;gap:3px;margin-bottom:2px;flex-wrap:wrap;}
.di-lbl{font-size:5px;color:var(--t3);width:42px;flex-shrink:0;}
.di-input{background:var(--s2);border:1px solid var(--b1);color:var(--t2);font-family:var(--mono);font-size:5px;padding:1px 2px;width:44px;outline:none;-webkit-appearance:none;border-radius:0;text-align:center;}
.di-input:focus{border-color:var(--amber);}
.di-input.di-sm{font-size:5px;padding:1px 2px;}
.di-input::placeholder{color:var(--t3);font-size:4.5px;}
.di-btn{font-size:5px;letter-spacing:1px;background:none;border:1px solid var(--b2);color:var(--t2);font-family:var(--mono);padding:2px 6px;cursor:pointer;-webkit-appearance:none;border-radius:0;}
.di-btn:hover{border-color:var(--amber);color:var(--amber);}
.di-saved{font-size:5px;color:var(--green);margin-left:4px;}

/* Clutch Upload Zone */
.clutch-upload{display:flex;align-items:center;gap:6px;padding:6px 0;flex-wrap:wrap;}
.cu-btn{font-size:7px;letter-spacing:1px;text-transform:uppercase;background:rgba(147,130,220,.08);border:1px dashed rgba(147,130,220,.3);color:#9382dc;font-family:var(--mono);padding:7px 12px;cursor:pointer;-webkit-appearance:none;border-radius:0;min-height:32px;transition:all .15s;}
.cu-btn:hover{border-color:#9382dc;background:rgba(147,130,220,.15);}
.cu-btn.active{border-color:var(--amber);color:var(--amber);background:rgba(245,166,42,.06);border-style:solid;}
.cu-status{font-size:7px;color:var(--t3);font-family:var(--mono);}
.cu-status.ok{color:var(--green);}
.cu-status.err{color:var(--red);}
.cu-badge{display:inline-flex;align-items:center;gap:3px;font-size:6px;letter-spacing:.5px;background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);color:var(--green);padding:3px 8px;font-family:var(--mono);}

/* Thesis xref */
.xref{padding:6px 11px;border-bottom:1px solid var(--b1);background:rgba(245,166,42,.03);}
.xh{font-size:6px;color:var(--amber);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
.xr{font-size:6px;padding:1px 0;}
.xr.ok{color:var(--g2);}.xr.warn{color:var(--yellow);}.xr.info{color:var(--t2);}

/* Thesis */
.thesis{padding:7px 11px;}
.thdr{font-size:6px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:4px;}
.tedit,.tgen{font-size:7px;color:var(--amber);background:none;border:none;cursor:pointer;font-family:var(--mono);letter-spacing:1px;padding:6px 4px;min-height:28px;}
.tgen{color:var(--green);border:1px solid var(--green);padding:6px 10px;}
.tgen:active{background:rgba(0,255,136,.1);}
.tgen:disabled{opacity:.4;cursor:default;}
.tbody{font-size:7px;color:var(--t2);line-height:1.7;font-family:var(--sans);white-space:pre-wrap;word-break:break-word;}
.tpr{margin-top:5px;padding-top:5px;border-top:1px solid var(--b1);}
.trow{font-size:6px;color:var(--t3);padding:1px 0;}
.trow span{color:var(--t1);}
.tempty{font-size:7px;color:var(--t3);font-style:italic;}
.ta{width:100%;background:var(--bg);border:1px solid var(--b2);color:var(--t1);font-family:var(--sans);padding:10px;resize:vertical;min-height:120px;outline:none;line-height:1.6;border-radius:0;-webkit-appearance:none;touch-action:manipulation;}
.ta:focus{border-color:var(--amber);}
.thint{font-size:6px;color:var(--t3);margin-top:3px;line-height:1.7;white-space:pre-line;}
.tbtn-row{display:flex;gap:6px;margin-top:6px;}
.tsave,.tcancel{font-size:7px;background:none;font-family:var(--mono);padding:7px 14px;cursor:pointer;letter-spacing:1px;-webkit-appearance:none;border-radius:0;min-height:32px;}
.tsave{border:1px solid var(--amber);color:var(--amber);}
.tsave:active{background:rgba(245,166,42,.15);}
.tcancel{border:1px solid var(--b2);color:var(--t2);}

/* Gen progress */
.gen-progress{font-size:7px;color:var(--t2);padding:6px 0;line-height:1.7;}
.gen-step{color:var(--t3);}
.gen-step.done{color:var(--green);}
.gen-step.active{color:var(--amber);}
.gen-step.err{color:var(--red);}

.log{background:var(--s2);border-top:1px solid var(--b1);padding:4px 11px;font-size:6px;color:var(--t3);max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.log .ok{color:#3d9970;}.log .er{color:var(--red);}
.foot{font-size:6px;color:var(--t3);padding:3px 11px 6px;}

.loading{display:flex;align-items:center;gap:6px;padding:11px;font-size:7px;color:var(--t3);}
.err-msg{font-size:7px;color:var(--red);padding:6px 11px;}
.empty{padding:44px;text-align:center;color:var(--t3);font-size:8px;letter-spacing:2px;}
.date-label{font-size:7px;color:var(--t2);letter-spacing:1px;margin-bottom:6px;padding:4px 0;}
.date-label span{color:var(--amber);}

/* Alert bar */
.abar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:8px;letter-spacing:1px;transform:translateY(-100%);transition:transform .3s ease;padding-top:max(10px,env(safe-area-inset-top));}
.abar.show{transform:translateY(0);}
.abar.entry{background:rgba(0,255,136,.12);border-bottom:1px solid var(--green);color:var(--green);}
.abar.watch{background:rgba(255,209,102,.10);border-bottom:1px solid var(--yellow);color:var(--yellow);}
.ax{margin-left:auto;cursor:pointer;opacity:.5;font-size:14px;padding:6px;min-width:28px;text-align:center;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:8px;height:8px;border:1px solid var(--b2);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}

@media(max-width:600px){
  .app{padding:8px;padding-bottom:max(8px,env(safe-area-inset-bottom));}
  .grid{grid-template-columns:1fr;}
  .ctrls{gap:3px;}
  .cbtn{font-size:7px;padding:7px 8px;}
  .ci{width:100px;}
  .cml{display:none;}
  .mup{font-size:11px;}
  .srs{font-size:22px;}
  .cn{font-size:15px;}
  .in{width:68px;}
  .id{font-size:5px;}
}
#conf-table{margin:0 11px 8px;padding:8px 10px;background:var(--c1);border:1px solid var(--b1);border-radius:6px;}
#conf-table .ct-hdr{font-size:7px;letter-spacing:1.5px;color:var(--t2);text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
#conf-table table{width:100%;border-collapse:collapse;font-size:7px;}
#conf-table th{color:var(--t3);font-weight:400;text-align:left;padding:2px 4px;border-bottom:1px solid var(--b1);font-size:5.5px;letter-spacing:.5px;text-transform:uppercase;}
#conf-table td{padding:4px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle;}
#conf-table tr:last-child td{border-bottom:none;}
#conf-table .ct-score{font-weight:600;font-size:8px;text-align:center;}
#conf-table .ct-verdict{font-size:5.5px;letter-spacing:.5px;text-align:center;}
#conf-table .ct-cond{color:var(--t2);font-size:6px;line-height:1.4;max-width:180px;}
#conf-table tr.ct-final td{color:var(--t3) !important;opacity:.5;}
#conf-table tr.ct-row{border-left:2px solid transparent;}
#conf-table tr.ct-optimal{border-left:2px solid var(--green);background:rgba(0,200,83,.04);}
#conf-table tr.ct-window{border-left:2px solid var(--amber);background:rgba(255,160,0,.03);}
#conf-table tr.ct-closing{border-left:2px solid var(--yellow);background:rgba(255,235,59,.02);}
#conf-table tr.ct-counter{border-left:2px solid var(--red);background:rgba(255,82,82,.03);}
#conf-table .ct-badge{font-size:5px;letter-spacing:.5px;padding:1px 4px;border-radius:3px;font-weight:600;display:inline-block;text-transform:uppercase;}
#conf-table .ct-live{background:rgba(0,200,83,.15);color:var(--green);}
#conf-table .ct-pre{background:rgba(255,255,255,.06);color:var(--t3);}
#conf-table .ct-done{background:rgba(255,255,255,.04);color:var(--t3);}
@media(max-width:600px){#conf-table .ct-cond{max-width:120px;font-size:5.5px;}#conf-table table{font-size:6px;}}
</style>
</head>
<body>

<div id="abar" class="abar">
  <span id="abar-msg"></span>
  <span class="ax" onclick="hideAlert()">✕</span>
</div>

<div class="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;min-width:0;">
      <span class="logo">NBA Control</span>
      <div class="pulse" id="pulse"></div>
      <span class="hdr-sub" id="hdr-sub">LIVE · SR via Netlify · v5.1 · FULL</span>
    </div>
    <div class="hdr-r"><span id="live-count">0</span> live · <span id="sel-count">0</span>/5</div>
  </div>

  <div class="ctrls">
    <button class="cbtn on" id="btn-live" onclick="setPaused(false)">LIVE</button>
    <button class="cbtn" id="btn-pause" onclick="setPaused(true)">PAUSE</button>
    <button class="cbtn" onclick="loadSchedule()">↻ REFRESH</button>
    <input class="ci" id="search" placeholder="Filter…" oninput="renderPills()"/>
    <div class="freq-group">
      <span class="freq-lbl">POLL:</span>
      <button class="cbtn freq" onclick="setFreq(30)" id="f30">30s</button>
      <button class="cbtn freq" onclick="setFreq(60)" id="f60">60s</button>
      <button class="cbtn freq on" onclick="setFreq(90)" id="f90">90s</button>
    </div>
    <button class="cbtn" onclick="clearTheses()">CLR THESIS</button>
    <button class="cbtn" onclick="clearMarketCache()">CLR MKT</button>
    <button class="cbtn" id="btn-demo" onclick="toggleDemo()" style="color:var(--amber);border-color:var(--amber)">DEMO</button>
    <span class="cml"><span id="game-count">0</span> games</span>
  </div>

  <!-- Clutch Upload Zone -->
  <div class="clutch-upload" id="clutch-zone">

// BOOT DIAGNOSTICS — catches parse/runtime failures in main script
// This runs in its own <script> tag so it survives main script parse errors
// ══════════════════════════════════════════════════════════════════════════════
window.__nbaBooted = false;
window.__nbaVersion = 'v5.1';
window.__bootErrors = [];

window.onerror = function(msg, src, line, col, err) {
  window.__bootErrors.push({msg:msg, line:line, col:col, src:src});
  var el = document.getElementById('err');
  if(el){
    el.style.display = 'block';
    el.style.whiteSpace = 'pre-wrap';
    el.innerHTML = '<span style="color:#ff6b6b;font-weight:600">⚠ JS ERROR</span> ' + window.__nbaVersion + '\n'
      + String(msg) + '\nLine ' + line + (col ? ':' + col : '') + '\n'
      + '<span style="color:#888;font-size:5px">Check console for full trace. This usually means a syntax error in index.html.</span>';
  }
  console.error('[NBA CONTROL BOOT ERROR]', msg, 'at line', line, col, err);
};

window.addEventListener('unhandledrejection', function(e) {
  var msg = e.reason ? (e.reason.message || String(e.reason)) : 'Unknown async error';
  window.__bootErrors.push({msg:msg, async:true});
  console.error('[NBA CONTROL ASYNC ERROR]', msg, e.reason);
});

// Boot canary — fires 4s after page load. If main script parsed and ran,
// window.__nbaBooted will be true. If not, something broke silently.
setTimeout(function(){
  if(!window.__nbaBooted){
    var el = document.getElementById('err');
    if(el){
      el.style.display = 'block';
      el.style.whiteSpace = 'pre-wrap';
      var detail = window.__bootErrors.length > 0
        ? '\nCaptured errors:\n' + window.__bootErrors.map(function(e){return '  ' + e.msg + (e.line ? ' (L'+e.line+')' : '');}).join('\n')
        : '\nNo errors captured — main script likely failed to parse entirely.';
      el.innerHTML = '<span style="color:#ff6b6b;font-weight:600">⚠ BOOT FAILURE</span> ' + window.__nbaVersion + '\n'
        + 'Dashboard JS did not initialize.' + detail + '\n'
        + '<span style="color:#888;font-size:5px">This usually means a syntax error was introduced in the last deployment.\n'
        + 'Open browser DevTools → Console to see the parse error.\n'
        + 'Redeploy the last known working version from GitHub.</span>';
    }
    // Also make it obvious in the header
    var hdr = document.getElementById('hdr-sub');
    if(hdr) hdr.textContent = 'BOOT FAILURE · JS did not initialize · ' + window.__nbaVersion;
  }
}, 4000);
</script>

// SR DATA PROXY
// ══════════════════════════════════════════════════════════════════════════════
async function sr(type, params={}){
  const qs = new URLSearchParams({type, ...params}).toString();
  const r = await fetch(FN+'sr-data?'+qs);
  if(r.status===429) throw new Error('SR rate limited — retry in 1s');
  if(!r.ok){
    const d = await r.json().catch(()=>({error:r.statusText}));
    throw new Error(d.error||'SR error '+r.status);
  }
  return r.json();
}

// Rate-limited sequential fetch with delay
async function srSequential(calls, delayMs=1100){
  const results = [];
  for(const call of calls){
    try{
      const data = await sr(call.type, call.params);
      results.push({key:call.key, data, ok:true});
    }catch(e){
      results.push({key:call.key, data:null, ok:false, error:e.message});
    }
    if(calls.indexOf(call) < calls.length-1){
      await new Promise(r=>setTimeout(r, delayMs));
    }
  }
  return results;
}

async function bdl(type, params={}){
  const qs = new URLSearchParams({type, ...params}).toString();
  const r = await fetch(FN+'bdl-data?'+qs);
  if(!r.ok){
    const d = await r.json().catch(()=>({error:r.statusText}));
    throw new Error(d.error||'BDL error '+r.status);
  }
  return r.json();
}

// BDL team name normalization — maps SR alias to BDL matching patterns
const BDL_TEAM_MATCH = {
  ATL:'Hawks',BOS:'Celtics',BKN:'Nets',CHA:'Hornets',CHI:'Bulls',CLE:'Cavaliers',
  DAL:'Mavericks',DEN:'Nuggets',DET:'Pistons',GSW:'Warriors',HOU:'Rockets',IND:'Pacers',
  LAC:'Clippers',LAL:'Lakers',MEM:'Grizzlies',MIA:'Heat',MIL:'Bucks',MIN:'Timberwolves',
  NOP:'Pelicans',NYK:'Knicks',OKC:'Thunder',ORL:'Magic',PHI:'76ers',PHX:'Suns',
  POR:'Trail Blazers',SAC:'Kings',SAS:'Spurs',TOR:'Raptors',UTA:'Jazz',WAS:'Wizards',
};

async function buildBdlGameMap(dateStr){
  try{
    const data = await bdl('games',{date:dateStr});
    const bdlGames = data.data||[];
    // Match each SR game to a BDL game by team names
    for(const game of games){
      const hAlias = game.home?.alias, aAlias = game.away?.alias;
      if(!hAlias||!aAlias) continue;
      const hMatch = BDL_TEAM_MATCH[hAlias], aMatch = BDL_TEAM_MATCH[aAlias];
      const match = bdlGames.find(bg =>
        bg.home_team?.full_name?.includes(hMatch) && bg.visitor_team?.full_name?.includes(aMatch)
      );
      if(match) bdlGameMap[game.id] = match.id;
    }
    console.log('BDL game map built:', Object.keys(bdlGameMap).length, 'games mapped');
  }catch(e){
    console.warn('BDL game map failed:', e.message);
  }
}

// Fetch BDL data for a game — returns aggregated team stats
async function fetchBdlSummary(game){
  const bdlId = bdlGameMap[game.id];
  if(!bdlId) throw new Error('No BDL game ID mapped for '+game.id);

  // Fetch game info (scores, quarters, bonus) + basic stats + advanced stats in parallel
  const [gameInfo, statsData, advData] = await Promise.all([
    bdl('game',{game_id:bdlId}),
    bdl('stats',{game_id:bdlId}),
    bdl('advanced',{game_id:bdlId}),
  ]);

  const g = gameInfo; // or gameInfo.data depending on BDL response
  const gd = g.data || g;
  const stats = (statsData.data||[]).filter(s=>s.min && s.min!=='00'&&s.min!=='0:00');
  const adv = (advData.data||[]).filter(s=>s.possessions>0);

  // Determine home/away team IDs
  const homeTeamId = gd.home_team?.id;
  const awayTeamId = gd.visitor_team?.id;

  // Aggregate basic stats by team
  function aggBasic(teamId){
    const pl = stats.filter(s=>(s.team?.id||s.player?.team_id)===teamId);
    return {
      steals: pl.reduce((a,s)=>a+(s.stl||0),0),
      blocks: pl.reduce((a,s)=>a+(s.blk||0),0),
      offensive_rebounds: pl.reduce((a,s)=>a+(s.oreb||0),0),
      turnovers: pl.reduce((a,s)=>a+(s.turnover||0),0),
      assists: pl.reduce((a,s)=>a+(s.ast||0),0),
      field_goals_made: pl.reduce((a,s)=>a+(s.fgm||0),0),
      field_goals_att: pl.reduce((a,s)=>a+(s.fga||0),0),
      three_points_made: pl.reduce((a,s)=>a+(s.fg3m||0),0),
      three_points_att: pl.reduce((a,s)=>a+(s.fg3a||0),0),
      free_throws_att: pl.reduce((a,s)=>a+(s.fta||0),0),
      free_throws_made: pl.reduce((a,s)=>a+(s.ftm||0),0),
      personal_fouls: pl.reduce((a,s)=>a+(s.pf||0),0),
      players: pl, // keep individual player stats
    };
  }

  // Aggregate advanced stats by team
  function aggAdvanced(teamId){
    const pl = adv.filter(s=>(s.team?.id||s.player?.team_id)===teamId);
    const totalPoss = pl.reduce((a,s)=>a+(s.possessions||0),0);
    return {
      fast_break_points: pl.reduce((a,s)=>a+(s.points_fast_break||0),0),
      points_off_turnovers: pl.reduce((a,s)=>a+(s.points_off_turnovers||0),0),
      second_chance_points: pl.reduce((a,s)=>a+(s.points_second_chance||0),0),
      points_in_the_paint: pl.reduce((a,s)=>a+(s.points_paint||0),0),
      possessions: totalPoss,
      // Weighted average for ratings
      offensive_rating: totalPoss>0 ? pl.reduce((a,s)=>a+(s.offensive_rating||0)*(s.possessions||0),0)/totalPoss : 0,
      defensive_rating: totalPoss>0 ? pl.reduce((a,s)=>a+(s.defensive_rating||0)*(s.possessions||0),0)/totalPoss : 0,
      assist_ratio: totalPoss>0 ? pl.reduce((a,s)=>a+(s.assist_ratio||0)*(s.possessions||0),0)/totalPoss : 0,
    };
  }

  const hBasic = aggBasic(homeTeamId);
  const aBasic = aggBasic(awayTeamId);
  const hAdv = aggAdvanced(homeTeamId);
  const aAdv = aggAdvanced(awayTeamId);

  // Build quarter scores from game info
  const quarters = [];
  for(let q=1; q<=4; q++){
    const hq = gd['home_q'+q], aq = gd['visitor_q'+q];
    if(hq!=null) quarters.push({quarter:q, home_points:hq, away_points:aq});
  }
  // OT
  if(gd.home_ot1!=null) quarters.push({quarter:5, home_points:gd.home_ot1, away_points:gd.visitor_ot1});

  return {
    source: 'BDL',
    bdlGameId: bdlId,
    homePoints: gd.home_team_score || 0,
    awayPoints: gd.visitor_team_score || 0,
    status: gd.status,
    period: gd.period || quarters.length,
    time: gd.time || '',
    homeBonus: gd.home_in_bonus || false,
    awayBonus: gd.visitor_in_bonus || false,
    quarters,
    home: {...hBasic, ...hAdv, alias: game.home?.alias||'HOME', name: game.home?.name||'HOME'},
    away: {...aBasic, ...aAdv, alias: game.away?.alias||'AWAY', name: game.away?.name||'AWAY'},
  };
}

function getEasternDate(offset=0){
  const now = new Date();
  const eastern = new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  eastern.setDate(eastern.getDate()+offset);
  return {
    year: String(eastern.getFullYear()),
    month: String(eastern.getMonth()+1).padStart(2,'0'),
    day: String(eastern.getDate()).padStart(2,'0'),
    str: `${eastern.getFullYear()}-${String(eastern.getMonth()+1).padStart(2,'0')}-${String(eastern.getDate()).padStart(2,'0')}`
  };
}

async function fetchSummary(game){
  if(game.id === DEMO_ID) return; // Demo game — no API calls
  const cs = cardState[game.id];
  if(!cs || cs.editing || cs.generating) return;

  // If SR daily limit exhausted, go straight to BDL
  if(srExhausted){
    return fetchBdlFallback(game, 'SR daily limit exhausted');
  }

  addLog(game.id,'Fetching SR summary…',true);
  try{
    const data = await sr('summary',{game_id:game.id});
    sr429Count = 0; // reset on success
    game.summary = data;
    game.bdlData = null; // clear any fallback data
    game.dataSource = 'SR';
    game.homePoints = data.home?.points ?? 0;
    game.awayPoints = data.away?.points ?? 0;
    game.status = data.status;
    game.period = data.quarter || (data.home?.periods||[]).length || 0;
    game.clock = data.clock || '';
    // Build merged periods array for indicator use (SR nests under home/away)
    if(!data.periods && data.home?.periods){
      data.periods = (data.home.periods||[]).map((hp,i)=>{
        const ap = (data.away?.periods||[])[i]||{};
        return {number:hp.number||i+1, home_points:hp.points||0, away_points:ap.points||0};
      });
    }
    cs.lastUp = new Date();

    // ── STALENESS DETECTION ──
    // Separate score fingerprint from stats fingerprint
    const scoreFP = [data.home?.points, data.away?.points, game.period, data.clock].join('|');
    const hs = data.home?.statistics||{}, as = data.away?.statistics||{};
    const statsFP = [
      hs.turnovers, as.turnovers, hs.steals, as.steals,
      hs.field_goals_made, as.field_goals_made, hs.field_goals_att, as.field_goals_att,
      hs.assists, as.assists, hs.offensive_rebounds, as.offensive_rebounds,
      hs.free_throws_att, as.free_throws_att, hs.blocks, as.blocks,
      hs.points_in_the_paint, as.points_in_the_paint,
    ].join('|');

    const scoreChanged = scoreFP !== cs.lastScoreFP;
    const statsChanged = statsFP !== cs.lastStatsFP;

    if(scoreChanged && !statsChanged && cs.lastStatsFP){
      cs.staleCount = (cs.staleCount||0) + 1;
      if(cs.staleCount >= 2){
        // Stats frozen for 2+ polls while score changed — SR data is stale
        cs.dataFreshness = 'STALE';
        addLog(game.id, '⚠ STALE: score updated but stats frozen for '+cs.staleCount+' polls — trying BDL', false);
        return fetchBdlFallback(game, 'SR data stale (stats frozen '+cs.staleCount+' polls)');
      } else {
        cs.dataFreshness = 'WATCH';
        addLog(game.id, '⚠ Stats unchanged despite score change (poll '+cs.staleCount+')', false);
      }
    } else if(statsChanged){
      cs.staleCount = 0;
      cs.dataFreshness = 'FRESH';
    }
    cs.lastScoreFP = scoreFP;
    cs.lastStatsFP = statsFP;
    // ── END STALENESS DETECTION ──

    addLog(game.id,'OK — SR summary loaded'+(cs.dataFreshness==='WATCH'?' [stats lag]':''),true);

    // Build player baselines from p.average (season data in every summary)
    const bl = buildPlayerBaselines(game);
    if(bl){
      cs.baselines = bl;
      if(bl.built && !cs._baselineLogged){ addLog(game.id,'📊 Baselines built — '+Object.keys(bl.players).length+' players, stars: '+[...bl.stars.home,...bl.stars.away].join(', '),true); cs._baselineLogged=true; }
    }

    // Check if data changed meaningfully
    const fp = fingerprint(data);
    const changed = fp !== cs.lastFingerprint;
    cs.lastFingerprint = fp;

    renderCard(game);
    renderConfidenceTable();
    checkAlert(game);

    // Auto-analyze disabled — use manual ⚡ ANALYZE button to control token spend
    // if(changed && getState(game)==='LIVE' && game.period >= 2){
    //   triggerAnalysis(game);
    // }
  }catch(e){
    // Check if this is a rate limit — trigger BDL fallback
    if(e.message.includes('rate limit') || e.message.includes('429')){
      sr429Count++;
      // 3+ consecutive 429s across any games = daily limit suspected
      if(sr429Count >= 3){
        srExhausted = true;
        addLog(game.id,'⚠ SR DAILY LIMIT — switching to BDL for session',false);
        document.getElementById('hdr-sub').textContent = 'LIVE · BDL FALLBACK · v5.1 · PARTIAL';
      }
      return fetchBdlFallback(game, e.message);
    }
    addLog(game.id, e.message, false);
    renderCard(game);
  }
}

async function fetchBdlFallback(game, reason){
  const cs = cardState[game.id];
  if(!cs) return;
  addLog(game.id,'BDL fallback ('+reason+')',true);
  try{
    const data = await fetchBdlSummary(game);
    game.bdlData = data;
    game.summary = null; // clear SR data
    game.dataSource = 'BDL';
    game.homePoints = data.homePoints;
    game.awayPoints = data.awayPoints;
    game.period = data.period;
    game.clock = data.time || '';
    // Map BDL status to our format
    const bst = (data.status||'').toLowerCase();
    if(bst.includes('final')) game.status = 'closed';
    else if(bst.includes('progress')||data.period>0&&!bst.includes('final')) game.status = 'inprogress';
    cs.lastUp = new Date();
    addLog(game.id,'OK — BDL data loaded (PARTIAL)',true);

    const fp = fingerprintBDL(data);
    const changed = fp !== cs.lastFingerprint;
    cs.lastFingerprint = fp;

    renderCard(game);
    renderConfidenceTable();
    checkAlert(game);

    // Auto-analyze disabled — use manual ⚡ ANALYZE button
    // if(changed && getState(game)==='LIVE' && game.period >= 2){
    //   triggerAnalysis(game);
    // }
  }catch(e){
    addLog(game.id, 'BDL fallback failed: '+e.message, false);
    renderCard(game);
  }
}

function fingerprintBDL(data){
  if(!data) return '';
  return [
    data.homePoints, data.awayPoints, data.period,
    data.home?.turnovers, data.away?.turnovers,
    data.home?.steals, data.away?.steals,
    data.home?.offensive_rebounds, data.away?.offensive_rebounds,
    data.home?.points_in_the_paint, data.away?.points_in_the_paint,
    data.home?.free_throws_att, data.away?.free_throws_att,
    data.home?.blocks, data.away?.blocks,
    data.home?.field_goals_made, data.away?.field_goals_made,
    data.home?.assists, data.away?.assists,
    data.homeBonus?1:0, data.awayBonus?1:0,
  ].join('|');
}

// FINGERPRINT (meaningful change detection)
// ══════════════════════════════════════════════════════════════════════════════
function fingerprint(summary){
  if(!summary) return '';
  const h = summary.home?.statistics||{}, a = summary.away?.statistics||{};
  return [
    summary.home?.points, summary.away?.points,
    summary.quarter || (summary.periods||[]).length,
    h.turnovers, a.turnovers,
    h.steals, a.steals,
    h.offensive_rebounds, a.offensive_rebounds,
    h.points_in_the_paint, a.points_in_the_paint,
    h.free_throws_att, a.free_throws_att,
    h.blocks, a.blocks,
    h.field_goals_made, a.field_goals_made,
    h.assists, a.assists,
    summary.home?.bonus?1:0, summary.away?.bonus?1:0,
  ].join('|');
}

// SONNET ANALYSIS
// ══════════════════════════════════════════════════════════════════════════════
async function triggerAnalysis(game){
  const cs = cardState[game.id];
  if(!cs || cs.analyzing) return;
  cs.analyzing = true;
  renderCard(game);
  try{
    const thesis = theses[game.id]||'';
    const periodLabel = game.period ? 'Q'+game.period : '';
    const score = (game.away?.alias||'AWAY')+' '+(game.awayPoints||0)+' - '+(game.home?.alias||'HOME')+' '+(game.homePoints||0);
    const isBDL = game.dataSource==='BDL';
    const dataSourceNote = isBDL ? '\n\nDATA SOURCE: BDL FALLBACK (PARTIAL)\nUnavailable: T4 Foul Gate | T7 Closing Lineup | I1 chaos layer | at-rim splits\nAll five indicators computable but with reduced sub-layer coverage.' : '';
    const freshnessNote = cs.dataFreshness==='STALE' ? '\n⚠ DATA FRESHNESS: STALE — stats may lag behind live score.' : cs.dataFreshness==='WATCH' ? '\n⚠ DATA FRESHNESS: WATCH — possible stats delay.' : '';

    // Include dashboard computed scores
    const dashInd = computeAny(game);
    let dashNote = '';
    if(dashInd){
      dashNote = `\n\nDASHBOARD COMPUTED SCORES (simplified math):
I1:${dashInd.I1.score} (${dashInd.I1.leader}) I2:${dashInd.I2.score} (${dashInd.I2.leader}) I3:${dashInd.I3.score} (${dashInd.I3.leader}) I4:${dashInd.I4.score} (${dashInd.I4.leader}) I5:${dashInd.I5.score} (${dashInd.I5.leader})
Dashboard control: ${dashInd.controlTeam} ${dashInd.score.toFixed(2)} | Data: ${dashInd.dataQuality}`;
    }

    const summaryPayload = isBDL ? game.bdlData : game.summary;

    // Build clutch data with tier info
    let clutchPayload = cs.clutchData || null;
    if(clutchPayload && !clutchPayload.tier) clutchPayload.tier = cs.clutchTier || 1;
    // If no manual clutch data, try to build Tier 2 proxy from thesis
    if(!clutchPayload && thesis){
      const proxyClutch = parseThesisClutchProxy(thesis, game.home?.alias, game.away?.alias);
      if(proxyClutch){ clutchPayload = proxyClutch; cs.clutchTier = 2; }
    }

    const resp = await fetch(FN+'analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        summaryData: summaryPayload,
        thesis: thesis + dataSourceNote + freshnessNote + dashNote,
        homeTeam: game.home?.alias||game.home?.name||'HOME',
        awayTeam: game.away?.alias||game.away?.name||'AWAY',
        period: periodLabel,
        score: score,
        clutchData: clutchPayload,
        oddsData: cs.oddsData || null,
        edgeHistory: cs.edgeHistory.length > 0 ? cs.edgeHistory : null,
        analysisHistory: cs.analysisHistory && cs.analysisHistory.length > 0 ? cs.analysisHistory : null,
        trackingData: cs.trackingData || null,
        pbpAudit: cs.pbpAudit ? {home:cs.pbpAudit.home, away:cs.pbpAudit.away, homeAlias:cs.pbpAudit.homeAlias, awayAlias:cs.pbpAudit.awayAlias, runs:cs.pbpAudit.runs, pbpPeriod:cs.pbpPeriod, pbpAge:cs.pbpTime?Math.round((Date.now()-cs.pbpTime.getTime())/60000):null} : null,
      })
    });
    if(!resp.ok){
      const errData = await resp.json().catch(()=>({error:'HTTP '+resp.status}));
      throw new Error(errData.error || 'Analysis failed: '+resp.status);
    }
    const data = await resp.json();
    cs.analysis = data.analysis;
    cs.analysisUsage = data.usage;
    cs.sustainabilityAudit = data.sustainabilityAudit || null;
    cs.analysisTime = new Date();

    // Parse structural indicators
    const hAlias = game.home?.alias||'HOME', aAlias = game.away?.alias||'AWAY';
    const parsed = parseSonnetScores(data.analysis, hAlias, aAlias);
    if(parsed){
      cs.sonnetIndicators = parsed;
      // Snapshot client indicators at analysis time — divergence compares future client reads against THIS baseline
      cs.clientIndAtAnalysis = computeAny(game);
      console.log('Sonnet scores parsed:', parsed.controlTeam, parsed.score.toFixed(2));
    }

    // Parse decision/predictive layer
    const decision = parseSonnetDecision(data.analysis);
    if(decision){
      // ── CLIENT-SIDE EDGE OVERRIDE — COMPUTE BOTH TEAMS ──
      const od = cs.oddsData;
      // Use control score as FWP source (more reliable than Sonnet's text-parsed FWP)
      const fwpFromControl = parsed?.score ? parsed.score * 100 : null;
      const fwpNum = fwpFromControl || parseFloat((decision.fwp||'').replace(/[%\s]/g,''));
      if(od && !isNaN(fwpNum) && (od.homeML || od.awayML)){
        if(!isNaN(fwpNum)){
          const mlToProb = (ml) => { const n=parseFloat(ml); if(isNaN(n)||n===0) return null; return n<0?Math.abs(n)/(Math.abs(n)+100):100/(n+100); };
          const rawH = mlToProb(od.homeML), rawA = mlToProb(od.awayML);
          if(rawH!==null && rawA!==null){
            const vigSum = rawH + rawA;
            const homeMIP = rawH/vigSum*100, awayMIP = rawA/vigSum*100;
            // Determine which team Sonnet predicts to win — use controlTeam as primary signal
            // predText.includes() is unreliable since prediction text typically mentions BOTH teams
            const controlTeam = (parsed?.controlTeam||'').toUpperCase();
            const buyTeam = (decision.buyTeam||'').toUpperCase();
            // Priority: buyTeam from SIGNAL line > controlTeam from indicators > predText fallback
            const fwpTeam = buyTeam || controlTeam;
            const isHomeFWP = fwpTeam === hAlias.toUpperCase();
            const isAwayFWP = fwpTeam === aAlias.toUpperCase();
            let homeFWP, awayFWP;
            if(isHomeFWP){ homeFWP=fwpNum; awayFWP=100-fwpNum; }
            else if(isAwayFWP){ awayFWP=fwpNum; homeFWP=100-fwpNum; }
            else { homeFWP=fwpNum>=50?fwpNum:100-fwpNum; awayFWP=100-homeFWP; }
            // Two-sided value
            decision.homeValue = {team:hAlias, fwp:homeFWP, mip:homeMIP, edge:parseFloat((homeFWP-homeMIP).toFixed(1)), ml:od.homeML||'—', spread:od.homeSpread||'—'};
            var _aSprd = od.homeSpread ? parseFloat(od.homeSpread)*-1 : null;
            var _aSprdStr = _aSprd!==null&&!isNaN(_aSprd) ? (_aSprd>0?'+':'')+_aSprd : '—';
            decision.awayValue = {team:aAlias, fwp:awayFWP, mip:awayMIP, edge:parseFloat((awayFWP-awayMIP).toFixed(1)), ml:od.awayML||'—', spread:_aSprdStr};
            // Legacy fields for backward compat
            const winnerMIP = homeFWP>=awayFWP ? homeMIP : awayMIP;
            const edge = Math.max(homeFWP,awayFWP) - winnerMIP;
            decision.edge = (edge>=0?'+':'')+edge.toFixed(1)+'%';
            decision.edgeNum = parseFloat(edge.toFixed(1));
            decision.mip = winnerMIP.toFixed(1)+'%';
            decision.fwp = fwpNum.toFixed(1)+'%';
            console.log('Two-sided (FWP from '+(fwpFromControl?'control score':'Sonnet')+'):', hAlias, homeFWP.toFixed(1)+'%/'+homeMIP.toFixed(1)+'%', aAlias, awayFWP.toFixed(1)+'%/'+awayMIP.toFixed(1)+'%');
          }
        }
      }
      cs.prediction = decision;
      console.log('Decision parsed:', decision.conviction, decision.entry, decision.prediction);
      // Track edge history for entry timing
      if(decision.edgeNum !== null || decision.fwp){
        cs.edgeHistory.push({
          time: new Date().toLocaleTimeString(),
          period: game.period||'?',
          edge: decision.edge||'?',
          edgeNum: decision.edgeNum,
          fwp: decision.fwp||'?',
          control: parsed?.controlTeam||'?',
          score: ((game.away?.alias||'AWAY')+' '+(game.awayPoints||0)+'-'+(game.home?.alias||'HOME')+' '+(game.homePoints||0)),
        });
        // Keep last 20 entries max
        if(cs.edgeHistory.length > 20) cs.edgeHistory = cs.edgeHistory.slice(-20);
      }

      // ── ANALYSIS HISTORY — structured narrative for Sonnet context ──
      const saSnap = cs.sustainabilityAudit;
      const cSustSnap = cs.clientSustainability;
      const hAliasFull = game.home?.alias||'HOME', aAliasFull = game.away?.alias||'AWAY';
      // Get sustainability tiers (prefer Sonnet audit, fall back to client)
      let leadAlias = (game.homePoints||0)>=(game.awayPoints||0)?hAliasFull:aAliasFull;
      let trailAlias = leadAlias===hAliasFull?aAliasFull:hAliasFull;
      let leadSustTier = saSnap?(leadAlias===hAliasFull?saSnap.home?.tier:saSnap.away?.tier):cSustSnap?(leadAlias===hAliasFull?cSustSnap.home?.tier:cSustSnap.away?.tier):null;
      let trailSustTier = saSnap?(trailAlias===hAliasFull?saSnap.home?.tier:saSnap.away?.tier):cSustSnap?(trailAlias===hAliasFull?cSustSnap.home?.tier:cSustSnap.away?.tier):null;
      if(!cs.analysisHistory) cs.analysisHistory = [];
      cs.analysisHistory.push({
        time: new Date().toLocaleTimeString(),
        period: game.period||'?',
        clock: game.clock||'',
        score: ((game.away?.alias||'AWAY')+' '+(game.awayPoints||0)+'-'+(game.home?.alias||'HOME')+' '+(game.homePoints||0)),
        controlTeam: parsed?.controlTeam||'?',
        controlScore: parsed?.score||0,
        verdict: getVerdict(parsed?.score)?.label||'?',
        entry: decision.entry||null,
        conviction: decision.conviction||null,
        signal: decision.signalType||null,
        buyTeam: decision.buyTeam||null,
        leadSust: leadSustTier||null,
        trailSust: trailSustTier||null,
        leadTeam: leadAlias,
        trailTeam: trailAlias,
        thesisStatus: decision.thesisStatus||null,
        keyRead: decision.prediction||'',
        fwp: decision.fwp||null,
        edge: decision.edge||null,
      });
      if(cs.analysisHistory.length > 15) cs.analysisHistory = cs.analysisHistory.slice(-15);
    }

    persistAnalysis(game.id, cs);
    renderCard(game);
    renderConfidenceTable();
  }catch(e){
    cs.analysisError = e.message;
    console.error('Analysis error:', e);
    renderCard(game);
  }finally{
    cs.analyzing = false;
  }
}

// Odds data save handler
function oddsMovement(cs){
  if(!cs.oddsHistory || cs.oddsHistory.length===0 || !cs.oddsData) return null;
  const open = cs.oddsHistory[0], cur = cs.oddsData;
  function delta(curV, openV){
    const c=parseFloat(curV), o=parseFloat(openV);
    if(isNaN(c)||isNaN(o)) return null;
    const d = c - o;
    if(Math.abs(d)<0.1) return {val:'—',color:'var(--t2)',raw:0};
    const sign = d>0?'+':'';
    return {val:sign+d.toFixed(1), color:d>0?'var(--green)':'var(--red)', raw:d};
  }
  return {
    spread: delta(cur.homeSpread, open.homeSpread),
    homeML: delta(cur.homeML, open.homeML),
    awayML: delta(cur.awayML, open.awayML),
    total: delta(cur.total, open.total),
    pulls: cs.oddsHistory.length + 1,
    openTime: open.time || '?',
  };
}

async function enrichFromBDL(gameId){
  if(gameId === DEMO_ID) return; // Demo mode — no real data

        cs.clutchData = data.clutch;
        cs.clutchTier = 2;
        persistClutch(gameId, cs);
      }
    }

    // Populate odds — always update and track movement
    if(data.odds){
      const newOdds = {
        homeSpread: String(data.odds.homeSpread||''),
        homeML: String(data.odds.homeML||''),
        awayML: String(data.odds.awayML||''),
        total: String(data.odds.total||''),
        vendor: data.odds.vendor,
        time: new Date().toLocaleTimeString(),
      };
      // Track movement if previous odds exist
      if(cs.oddsData && cs.oddsData.homeML){
        cs.oddsHistory.push({...cs.oddsData, time: cs.oddsData.time || cs.lastUp?.toLocaleTimeString() || '?'});
        if(cs.oddsHistory.length > 20) cs.oddsHistory = cs.oddsHistory.slice(-20);
      }
      cs.oddsData = newOdds;
      if(data.oddsAll) cs.oddsAll = data.oddsAll;
      persistOdds(gameId, cs);
    }

    // Store tracking data for sustainability scoring
    if(data.tracking){ cs.trackingData = data.tracking; persistTracking(gameId, cs); }

    const srcList = (data.sources||[]).join(', ');
    const errList = (data.errors||[]);

    setTimeout(()=>{ cs.enrichDone = false; const g = games.find(x=>x.id===gameId); if(g) renderCard(g); }, 3000);

  }catch(e){
    console.error('BDL enrich error:', e);
    addLog(gameId, 'BDL enrich failed: '+e.message, false);
  }finally{
    cs.enriching = false;
    renderCard(game);
  }
}

function parsePBP(pbpData, game){
  const hId = game.home?.id||'', aId = game.away?.id||'';
  const hA = game.home?.alias||'HOME', aA = game.away?.alias||'AWAY';

  // Collect all events across periods
  const allEvents = [];
  const periods = pbpData?.periods || [];
  periods.forEach(per => {
    const q = per.number || per.sequence || 0;
    (per.events || []).forEach(ev => {
      ev._quarter = q;
      allEvents.push(ev);
    });
  });

  // ── SHOT MAP (3PT + at-rim + mid-range: player-level makes AND misses) ──
  const shots = [];
  allEvents.forEach(ev => {
    const et = (ev.event_type||'').toLowerCase().replace(/[\s_-]/g,'');
    const isThree = et.includes('threepoint') || et.includes('3pt');
    const isTwo = et.includes('twopoint') || et.includes('2pt');
    if(!isThree && !isTwo) return;
    const made = et.includes('made');

    // Get player info — check multiple possible locations
    const stat = (ev.statistics||[])[0] || {};
    const player = stat.player || ev.player || {};
    const playerName = player.full_name || player.name || '?';

    // Team attribution
    const attrId = ev.attribution?.id || stat.team?.id || '';
    const team = attrId === hId ? hA : attrId === aId ? aA : (ev.attribution?.market||'?');

    // Shot location / zone
    const loc = ev.location || {};
    const actionArea = (loc.action_area || ev.action_area || stat.action_area || '').toLowerCase();
    const coordX = loc.coord_x ?? ev.coord_x ?? null;
    const coordY = loc.coord_y ?? ev.coord_y ?? null;

    // Classify zone
    let zone;
    if(isThree){
      if(actionArea.includes('corner') || (coordY !== null && (coordY < 8 || coordY > 42))) zone = 'corner3';
      else zone = 'above3';
    } else {
      if(actionArea.includes('restricted') || actionArea.includes('rim') || (coordX !== null && Math.abs(coordX - 25) < 5 && coordY !== null && Math.abs(coordY - 5.25) < 5)) zone = 'rim';
      else if(actionArea.includes('paint') || actionArea.includes('lane')) zone = 'paint';
      else zone = 'mid';
    }

    // Assisted check — look for assist event immediately before this made shot
    let assisted = false;
    if(made){
      const shotDesc = (ev.description||'').toLowerCase();
      if(shotDesc.includes('assist')) assisted = true;
      // Also check statistics array for assist linkage
      (ev.statistics||[]).forEach(s => { if((s.type||'').toLowerCase().includes('assist')) assisted = true; });
    }

    // Shot type context (drive, catch-and-shoot, pull-up, putback, cut, transition)
    const shotType = (stat.shot_type_desc || stat.shot_type || ev.shot_type_desc || ev.shot_type || '').toLowerCase();
    let context = 'halfcourt';
    if(shotType.includes('driving') || shotType.includes('drive') || shotType.includes('layup') || shotType.includes('dunk')) context = 'drive';
    else if(shotType.includes('pullup') || shotType.includes('pull-up') || shotType.includes('pull up') || shotType.includes('step back') || shotType.includes('stepback') || shotType.includes('fadeaway')) context = 'pullup';
    else if(shotType.includes('putback') || shotType.includes('tip') || shotType.includes('put-back')) context = 'putback';
    else if(shotType.includes('cutting') || shotType.includes('cut') || shotType.includes('alley')) context = 'cut';
    else if(shotType.includes('fast') || shotType.includes('transition') || shotType.includes('break')) context = 'transition';
    else if(shotType.includes('hook') || shotType.includes('float') || shotType.includes('runner')) context = 'floater';
    else if(assisted && isThree) context = 'catch-shoot';

    shots.push({p:playerName, tm:team, z:zone, m:made, a:assisted, q:ev._quarter, ctx:context, is3:isThree});
  });

  // ── TURNOVER LOG ──
  const turnovers = [];
  allEvents.forEach(ev => {
    const et = (ev.event_type||'').toLowerCase().replace(/[\s_-]/g,'');
    if(!et.includes('turnover')) return;
    const stat = (ev.statistics||[])[0] || {};
    const player = stat.player || ev.player || {};
    const playerName = player.full_name || player.name || '?';
    const attrId = ev.attribution?.id || stat.team?.id || '';
    const team = attrId === hId ? hA : attrId === aId ? aA : '?';

    // Forced vs unforced — check multiple field locations
    const toType = (stat.turnover_type || ev.turnover_type || '').toLowerCase();
    const desc = (ev.description||'').toLowerCase();
    let forced = null;
    if(toType.includes('steal') || toType.includes('forced') || toType.includes('bad pass') || desc.includes('steal')) forced = true;
    else if(toType.includes('lost ball') || toType.includes('out of bounds') || toType.includes('travel') || toType.includes('violation') || toType.includes('offensive foul') || toType.includes('backcourt') || toType.includes('3 sec') || toType.includes('5 sec') || toType.includes('shot clock')) forced = false;
    // If unclear, attempt from description
    if(forced === null){
      if(desc.includes('steal') || desc.includes('strip')) forced = true;
      else if(desc.includes('lost ball') || desc.includes('out of bounds') || desc.includes('travel') || desc.includes('violation')) forced = false;
    }

    turnovers.push({p:playerName, tm:team, q:ev._quarter, forced:forced, type:toType||desc.substring(0,40)});
  });

  // ── SCORING RUNS ──
  // Track score progression and find biggest runs
  let hScore = 0, aScore = 0;
  const scoreLog = [];
  allEvents.forEach(ev => {
    const et = (ev.event_type||'').toLowerCase().replace(/[\s_-]/g,'');
    let pts = 0;
    if(et.includes('made')){
      if(et.includes('threepoint') || et.includes('3pt')) pts = 3;
      else if(et.includes('freethrow') || et.includes('ft')) pts = 1;
      else if(et.includes('twopoint') || et.includes('2pt')) pts = 2;
    }
    if(pts === 0) return;
    const attrId = ev.attribution?.id || (ev.statistics||[])[0]?.team?.id || '';
    const team = attrId === hId ? hA : attrId === aId ? aA : '?';
    if(team === hA) hScore += pts; else aScore += pts;

    // Get on_court lineup for run attribution
    const onCourt = ev.on_court || {};
    const homePlayers = (onCourt.home?.players || []).map(p => p.full_name || p.name || '?');
    const awayPlayers = (onCourt.away?.players || []).map(p => p.full_name || p.name || '?');

    scoreLog.push({team, pts, hScore, aScore, q:ev._quarter, lineup: team===hA ? homePlayers : awayPlayers});
  });

  // Find runs: consecutive scoring by same team (3+ scores or 8+ pts)
  const runs = [];
  let runTeam = null, runPts = 0, runStart = 0, runCount = 0, runLineup = [], runShotTypes = [];
  for(let i = 0; i < scoreLog.length; i++){
    const s = scoreLog[i];
    if(s.team === runTeam){
      runPts += s.pts; runCount++;
      if(s.lineup.length > 0) runLineup = s.lineup;
      runShotTypes.push(s.pts === 3 ? '3PT' : s.pts === 1 ? 'FT' : '2PT');
    } else {
      if(runPts >= 8 || runCount >= 3){
        runs.push({team:runTeam, pts:runPts, count:runCount, q:scoreLog[runStart]?.q, lineup:runLineup, mechanism:runShotTypes.slice()});
      }
      runTeam = s.team; runPts = s.pts; runStart = i; runCount = 1;
      runLineup = s.lineup; runShotTypes = [s.pts === 3 ? '3PT' : s.pts === 1 ? 'FT' : '2PT'];
    }
  }
  if(runPts >= 8 || runCount >= 3){
    runs.push({team:runTeam, pts:runPts, count:runCount, q:scoreLog[runStart]?.q, lineup:runLineup, mechanism:runShotTypes.slice()});
  }
  // Keep top 5 biggest runs
  runs.sort((a,b) => b.pts - a.pts);
  const topRuns = runs.slice(0, 5);

  // ── AGGREGATE SUMMARIES ──
  function teamShots(tm){ return shots.filter(s => s.tm === tm); }
  function aggTeam(tm){
    const s = teamShots(tm);
    const threes = s.filter(x => x.is3);
    const rim = s.filter(x => x.z === 'rim');
    const mid = s.filter(x => x.z === 'mid');
    const threeMade = threes.filter(x => x.m);
    const rimMade = rim.filter(x => x.m);
    const midMade = mid.filter(x => x.m);
    const assistedThrees = threeMade.filter(x => x.a).length;
    const assistedRim = rimMade.filter(x => x.m && x.a).length;

    // Per-player 3PT detail
    const playerThrees = {};
    threes.forEach(x => {
      if(!playerThrees[x.p]) playerThrees[x.p] = {name:x.p, made:0, att:0, assisted:0, zones:{corner3:0,above3:0}, contexts:{}};
      playerThrees[x.p].att++;
      if(x.m){ playerThrees[x.p].made++; if(x.a) playerThrees[x.p].assisted++; playerThrees[x.p].zones[x.z] = (playerThrees[x.p].zones[x.z]||0)+1; }
      playerThrees[x.p].contexts[x.ctx] = (playerThrees[x.p].contexts[x.ctx]||0)+1;
    });

    // Per-player at-rim detail
    const playerRim = {};
    rim.forEach(x => {
      if(!playerRim[x.p]) playerRim[x.p] = {name:x.p, made:0, att:0, contexts:{}};
      playerRim[x.p].att++;
      if(x.m) playerRim[x.p].made++;
      playerRim[x.p].contexts[x.ctx] = (playerRim[x.p].contexts[x.ctx]||0)+1;
    });

    // Per-player mid-range detail
    const playerMid = {};
    mid.forEach(x => {
      if(!playerMid[x.p]) playerMid[x.p] = {name:x.p, made:0, att:0, assisted:0};
      playerMid[x.p].att++;
      if(x.m){ playerMid[x.p].made++; if(x.a) playerMid[x.p].assisted++; }
    });

    // TO breakdown
    const tms = turnovers.filter(t => t.tm === tm);
    const forced = tms.filter(t => t.forced === true).length;
    const unforced = tms.filter(t => t.forced === false).length;
    const unknown = tms.filter(t => t.forced === null).length;

    return {
      threes:{made:threeMade.length, att:threes.length, assisted:assistedThrees, pct:threes.length>0?(threeMade.length/threes.length*100).toFixed(1):'0',
        corner:{made:threeMade.filter(x=>x.z==='corner3').length, att:threes.filter(x=>x.z==='corner3').length},
        above:{made:threeMade.filter(x=>x.z==='above3').length, att:threes.filter(x=>x.z==='above3').length},
        byPlayer:Object.values(playerThrees).filter(x=>x.att>=1).sort((a,b)=>b.att-a.att)},
      rim:{made:rimMade.length, att:rim.length, assisted:assistedRim, pct:rim.length>0?(rimMade.length/rim.length*100).toFixed(1):'0',
        byPlayer:Object.values(playerRim).filter(x=>x.att>=1).sort((a,b)=>b.att-a.att)},
      mid:{made:midMade.length, att:mid.length, assisted:midMade.filter(x=>x.a).length, pct:mid.length>0?(midMade.length/mid.length*100).toFixed(1):'0',
        byPlayer:Object.values(playerMid).filter(x=>x.att>=1).sort((a,b)=>b.att-a.att)},
      tos:{total:tms.length, forced, unforced, unknown, byPlayer:tms},
      shotDiet:{total:s.length, threePct:s.length>0?(threes.length/s.length*100).toFixed(1):'0', rimPct:s.length>0?(rim.length/s.length*100).toFixed(1):'0', midPct:s.length>0?(mid.length/s.length*100).toFixed(1):'0'},
    };
  }

  const home = aggTeam(hA);
  const away = aggTeam(aA);

  return {
    home, away, homeAlias:hA, awayAlias:aA,
    totalShots: shots.length, totalTOs: turnovers.length,
    runs: topRuns,
    raw: {shots, turnovers}, // keep raw for potential deep dives
  };
}

// Convert any image (including HEIC) to compressed JPEG for Sonnet vision
function compressImage(file, maxW, quality){
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.naturalWidth, h = img.naturalHeight;
      const c = document.createElement('canvas');
      const ctx = c.getContext('2d');

      // Iterative compression: shrink until base64 < 600KB
      let targetW = Math.min(w, maxW);
      let q = quality;
      let b64, attempts = 0;
      while(attempts < 4){
        let cw = targetW, ch = Math.round(h * targetW / w);
        c.width = cw; c.height = ch;
        ctx.drawImage(img, 0, 0, cw, ch);
        let dataUrl = c.toDataURL('image/jpeg', q);
        b64 = dataUrl.split(',')[1];
        let sizeKB = Math.round(b64.length * 3 / 4 / 1024);
        console.log('Compress pass '+(attempts+1)+': '+cw+'x'+ch+' q='+q.toFixed(2)+' → '+sizeKB+'KB (b64: '+Math.round(b64.length/1024)+'KB)');
        if(b64.length <= 600000) break; // under ~450KB image = safe for Netlify
        // Reduce more aggressively each pass
        targetW = Math.round(targetW * 0.75);
        q = Math.max(0.35, q - 0.15);
        attempts++;
      }
      res({ base64: b64, mediaType: 'image/jpeg' });
    };
    img.onerror = () => { URL.revokeObjectURL(url); rej(new Error('Image load failed — unsupported format?')); };
    img.src = url;
  });
}

async function handleClutchUpload(input){
  const file = input.files?.[0];
  if(!file) return;
  const status = document.getElementById('cu-status');
  const btn = document.getElementById('cu-btn');
  const badge = document.getElementById('cu-badge');
  const segment = document.getElementById('cu-segment')?.value || 'L15';

  status.textContent = '⏳ Processing...';
  status.className = 'cu-status';
  btn.classList.add('active');
  btn.textContent = '⏳ EXTRACTING...';
  btn.disabled = true;

  try{
    // Compress image client-side to avoid Netlify function timeout
    // iPhone screenshots can be 3-5MB; resize to max 1600px wide JPEG
    status.textContent = '⏳ Compressing...';
    const {base64, mediaType} = await compressImage(file, 1400, 0.72);

    // Collect team abbreviations from selected games only (not full slate)
    const activeTeams = [];
    const targetGames = selIds.length > 0 ? games.filter(g => selIds.includes(g.id)) : games;
    for(const g of targetGames){
      if(g.home?.alias) activeTeams.push(g.home.alias);
      if(g.away?.alias) activeTeams.push(g.away.alias);
    }

    // Send to clutch-ocr function with team filter
    const payload = JSON.stringify({ image: base64, mediaType, segment, teams: activeTeams });
    const payloadMB = (payload.length / 1024 / 1024).toFixed(1);
    console.log('Clutch OCR payload:', payloadMB+'MB');
    if(payload.length > 5500000){
      throw new Error('Image still too large after compression ('+payloadMB+'MB). Try cropping the screenshot to just the table area.');
    }
    status.textContent = '⏳ Extracting ' + activeTeams.length + ' teams from ' + targetGames.length + ' games (~15s, '+payloadMB+'MB)...';
    const resp = await fetch(FN+'clutch-ocr',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: payload
    });

    if(!resp.ok){
      if(resp.status === 502) throw new Error('Server crashed processing image ('+payloadMB+'MB). Try cropping to just the table.');
      if(resp.status === 504) throw new Error('Server timed out. Try cropping the screenshot.');
      if(resp.status === 413) throw new Error('Image too large for server. Try a smaller screenshot.');
      const err = await resp.json().catch(()=>({error:resp.statusText}));
      throw new Error(err.error || 'OCR failed: '+resp.status);
    }

    const data = await resp.json();

    if(data.error){
      throw new Error(data.error + (data.rawText ? ' — raw: '+data.rawText.substring(0,100) : ''));
    }

    if(!data.teams || Object.keys(data.teams).length === 0){
      throw new Error('No teams extracted from screenshot');
    }

    // Store globally
    globalClutchData = data;
    localStorage.setItem('nba4:globalClutch', JSON.stringify(data));
    const count = Object.keys(data.teams).length;
    const extractedList = Object.keys(data.teams).join(', ');

    // Distribute to all active game cards
    distributeClutchToCards();

    status.textContent = `✓ ${count} teams: ${extractedList}`;
    status.className = 'cu-status ok';
    badge.style.display = 'inline-flex';
    badge.className = 'cu-badge';
    badge.textContent = `✓ ${segment} CLUTCH · ${count} teams`;

    const tokens = data.usage ? `${data.usage.input||0}+${data.usage.output||0} tokens` : '';
    console.log('Clutch OCR complete:', count, 'teams:', extractedList, tokens, data.teams);

  }catch(e){
    console.error('Clutch upload error:', e);
    status.textContent = '✗ '+e.message;
    status.className = 'cu-status err';
  }finally{
    btn.classList.remove('active');
    btn.textContent = '📋 UPLOAD L15 CLUTCH';
    btn.disabled = false;
    // Reset file input so same file can be re-uploaded
    input.value = '';
  }
}

function distributeClutchToCards(){
  if(!globalClutchData?.teams) return;
  const teams = globalClutchData.teams;
  const extractedKeys = Object.keys(teams);
  let distributed = 0;

  // Debug: show what was extracted vs what games need
  const neededAliases = [];
  for(const game of games){
    if(game.home?.alias) neededAliases.push(game.home.alias);
    if(game.away?.alias) neededAliases.push(game.away.alias);
  }
  console.log('Clutch distribute: extracted=', extractedKeys, 'needed=', neededAliases, 
    'missing=', neededAliases.filter(a => !teams[a]));

  for(const game of games){
    const cs = cardState[game.id];
    if(!cs) continue;
    const hA = game.home?.alias||'';
    const aA = game.away?.alias||'';
    const hClutch = teams[hA];
    const aClutch = teams[aA];

    if(hClutch || aClutch){
      // Only upgrade if not already Tier 1 from manual entry
      // Screenshot data IS Tier 1 (it's L15 from NBA.com)
      cs.clutchData = {
        tier: 1,
        home: hClutch ? {
          netRtg: hClutch.netRtg,
          offRtg: hClutch.offRtg,
          defRtg: hClutch.defRtg,
          gp: hClutch.gp,
          w: hClutch.w,
          l: hClutch.l,
          wl: hClutch.wl || (hClutch.w!=null&&hClutch.l!=null ? hClutch.w+'-'+hClutch.l : null),
          efg: hClutch.efg,
          ts: hClutch.ts,
          pace: hClutch.pace,
          pie: hClutch.pie,
          tovPct: hClutch.tovPct,
          orebPct: hClutch.orebPct,
          drebPct: hClutch.drebPct,
          astRatio: hClutch.astRatio,
        } : (cs.clutchData?.home || {}),
        away: aClutch ? {
          netRtg: aClutch.netRtg,
          offRtg: aClutch.offRtg,
          defRtg: aClutch.defRtg,
          gp: aClutch.gp,
          w: aClutch.w,
          l: aClutch.l,
          wl: aClutch.wl || (aClutch.w!=null&&aClutch.l!=null ? aClutch.w+'-'+aClutch.l : null),
          efg: aClutch.efg,
          ts: aClutch.ts,
          pace: aClutch.pace,
          pie: aClutch.pie,
          tovPct: aClutch.tovPct,
          orebPct: aClutch.orebPct,
          drebPct: aClutch.drebPct,
          astRatio: aClutch.astRatio,
        } : (cs.clutchData?.away || {}),
      };
      cs.clutchTier = 1;
      persistClutch(game.id, cs);
      distributed++;
      addLog(game.id, `📋 L15 clutch loaded: ${hClutch?hA+' NetRtg '+hClutch.netRtg:''}${hClutch&&aClutch?' / ':''}${aClutch?aA+' NetRtg '+aClutch.netRtg:''}`, true);
    }
  }

  console.log('Clutch distributed to', distributed, 'game cards');

  // Re-render all visible cards
  for(const game of games){
    if(selIds.includes(game.id)){
      renderCard(game);
    }
  }
}

// Parse clutch proxy from thesis text — extracts Comeback Score + Lead-Keep Score as Tier 2
function parseThesisClutchProxy(thesis, homeAlias, awayAlias){
  if(!thesis) return null;
  try{
    // Look for Comeback Score patterns: "Comeback Score: 6.2" or "Comeback: X.X/10"
    const comebackMatch = thesis.match(/comeback\s*(?:score)?[:\s]+(\d+\.?\d*)\s*(?:\/\s*10)?/i);
    const leadKeepMatch = thesis.match(/lead[- ]?keep\s*(?:score)?[:\s]+(\d+\.?\d*)\s*(?:\/\s*10)?/i);
    // Also try to find per-team comeback/lead-keep
    const hComebackMatch = thesis.match(new RegExp(homeAlias+'[^\\n]*comeback[:\\s]+(\\d+\\.?\\d*)', 'i')) ||
                           thesis.match(new RegExp('comeback[^\\n]*'+homeAlias+'[:\\s]+(\\d+\\.?\\d*)', 'i'));
    const aComebackMatch = thesis.match(new RegExp(awayAlias+'[^\\n]*comeback[:\\s]+(\\d+\\.?\\d*)', 'i')) ||
                           thesis.match(new RegExp('comeback[^\\n]*'+awayAlias+'[:\\s]+(\\d+\\.?\\d*)', 'i'));
    const hLeadKeepMatch = thesis.match(new RegExp(homeAlias+'[^\\n]*lead[- ]?keep[:\\s]+(\\d+\\.?\\d*)', 'i')) ||
                           thesis.match(new RegExp('lead[- ]?keep[^\\n]*'+homeAlias+'[:\\s]+(\\d+\\.?\\d*)', 'i'));
    const aLeadKeepMatch = thesis.match(new RegExp(awayAlias+'[^\\n]*lead[- ]?keep[:\\s]+(\\d+\\.?\\d*)', 'i')) ||
                           thesis.match(new RegExp('lead[- ]?keep[^\\n]*'+awayAlias+'[:\\s]+(\\d+\\.?\\d*)', 'i'));

    const hComeback = hComebackMatch ? parseFloat(hComebackMatch[1]) : (comebackMatch ? parseFloat(comebackMatch[1]) : null);
    const aComeback = aComebackMatch ? parseFloat(aComebackMatch[1]) : null;
    const hLeadKeep = hLeadKeepMatch ? parseFloat(hLeadKeepMatch[1]) : (leadKeepMatch ? parseFloat(leadKeepMatch[1]) : null);
    const aLeadKeep = aLeadKeepMatch ? parseFloat(aLeadKeepMatch[1]) : null;

    // Need at least one value to be useful
    if(hComeback===null && aComeback===null && hLeadKeep===null && aLeadKeep===null) return null;

    // Convert to NetRtg proxy: (Comeback+LeadKeep)/2 mapped to clutch-like range
    // Score 7+ → positive NetRtg proxy, Score 5 → ~0, Score 3 → negative
    const toProxy = (cb, lk) => {
      if(cb===null && lk===null) return null;
      const avg = cb!==null && lk!==null ? (cb+lk)/2 : (cb||lk);
      return ((avg - 5) * 2).toFixed(1); // Maps 5→0, 7→+4, 3→-4
    };

    return {
      tier: 2,
      home: { netRtg: toProxy(hComeback, hLeadKeep), comebackScore: hComeback, leadKeepScore: hLeadKeep },
      away: { netRtg: toProxy(aComeback, aLeadKeep), comebackScore: aComeback, leadKeepScore: aLeadKeep },
    };
  }catch(e){
    console.warn('Thesis clutch proxy parse failed:', e.message);
    return null;
  }
}


function parseSonnetScores(text, homeAlias, awayAlias){
  if(!text) return null;
  try{
    const ind = {};
    const iMap = {
      'I1':{weight:0.25, nm:'POSSESS/TRANS'},
      'I2':{weight:0.25, nm:'RIM/FOUL'},
      'I3':{weight:0.20, nm:'SHOT QUALITY'},
      'I4':{weight:0.20, nm:'LINEUP INTEG'},
      'I5':{weight:0.10, nm:'TEMPO/EFF'},
    };
    for(const [key, meta] of Object.entries(iMap)){
      // Match any decimal score: "I1 Possession... : CLE 0.75 — explanation"
      const rx = new RegExp(key+'[^:]*:\\s*(\\S+)\\s+(\\d\\.\\d{1,2})\\s*[—–-]\\s*(.+)', 'i');
      const m = text.match(rx);
      if(m){
        const team = m[1].replace(/[^A-Za-z]/g,'').toUpperCase();
        const score = parseFloat(m[2]);
        const isHome = team === homeAlias.toUpperCase() || team.includes(homeAlias.toUpperCase().substring(0,3));
        // Flip score perspective: if away team named, invert
        const homeScore = isHome ? score : (1 - score);
        ind[key] = {
          score: homeScore,
          leader: m[1],
          detail: m[3].trim(),
          sonnet: true,
          rawScore: score, // original score as stated by Sonnet
        };
      }
    }
    if(Object.keys(ind).length < 3) return null;

    for(const key of Object.keys(iMap)){
      if(!ind[key]) ind[key] = {score:0.5, leader:'EVEN', detail:'(not parsed from Sonnet)', sonnet:false, rawScore:0.5};
    }

    const W = {I1:0.25, I2:0.25, I3:0.20, I4:0.20, I5:0.10};
    const raw = ind.I1.score*W.I1 + ind.I2.score*W.I2 + ind.I3.score*W.I3 + ind.I4.score*W.I4 + ind.I5.score*W.I5;
    const controlHome = raw >= 0.5;
    let score = controlHome ? raw : 1 - raw;
    let controlTeam = controlHome ? homeAlias : awayAlias;

    // Prefer Sonnet's own stated control score if parseable
    const controlMatch = text.match(/CONTROL:\s*(\S+)\s+([\d.]+)\s*[—–-]/i);
    if(controlMatch){
      const statedTeam = controlMatch[1];
      const statedScore = parseFloat(controlMatch[2]);
      if(statedScore >= 0.4 && statedScore <= 1.0){
        controlTeam = statedTeam;
        score = statedScore;
      }
    }

    const trajMatch = text.match(/TRAJECTORY:\s*(\S+)\s*[—–-]\s*(\d+)\/(\d+)/i);
    // Parse individual T1-T8 signal lines with team attribution
    const signalRegex = /(T[1-8])\s*[—–-]\s*([^:]+):\s*(.+)/g;
    const parsedSignals = [];
    let sm;
    const hUp = homeAlias.toUpperCase(), aUp = awayAlias.toUpperCase();
    const hSub = hUp.substring(0,3), aSub = aUp.substring(0,3);
    while((sm = signalRegex.exec(text)) !== null){
      const key = sm[1];
      const label = sm[2].trim();
      const detail = sm[3].trim();
      const isClear = /^CLEAR/i.test(detail);
      const col = isClear ? '#3e3e48' : 'var(--amber)';
      // Extract team attribution from signal text
      let sigTeam = null;
      if(!isClear){
        const detUp = detail.toUpperCase();
        const hasHome = detUp.includes(hUp) || detUp.includes(hSub);
        const hasAway = detUp.includes(aUp) || detUp.includes(aSub);
        // Check for [TEAM] bracket prefix from analyze.js
        const bracketMatch = detail.match(/\[([A-Z]{2,4})\]/);
        const bracketTeam = bracketMatch ? bracketMatch[1].toUpperCase() : null;
        if(key==='T1'||key==='T8'){
          // Heater/misalignment on team X → benefits opponent
          if(bracketTeam){
            sigTeam = (bracketTeam===hUp||bracketTeam===hSub) ? awayAlias : homeAlias;
          } else if(hasHome && !hasAway) sigTeam = awayAlias;
          else if(hasAway && !hasHome) sigTeam = homeAlias;
        } else if(key==='T4'){
          // Foul trouble on team X → benefits opponent
          if(bracketTeam){
            sigTeam = (bracketTeam===hUp||bracketTeam===hSub) ? awayAlias : homeAlias;
          } else if(hasHome && !hasAway) sigTeam = awayAlias;
          else if(hasAway && !hasHome) sigTeam = homeAlias;
        } else if(key==='T2'){
          // Star cold: process accelerating/intact → benefits star's team; declining/collapsed → benefits opponent
          const declining = /declin|collaps/i.test(detail);
          if(bracketTeam){
            sigTeam = declining ? ((bracketTeam===hUp||bracketTeam===hSub)?awayAlias:homeAlias) : ((bracketTeam===hUp||bracketTeam===hSub)?homeAlias:awayAlias);
          } else if(hasHome && !hasAway){
            sigTeam = declining ? awayAlias : homeAlias;
          } else if(hasAway && !hasHome){
            sigTeam = declining ? homeAlias : awayAlias;
          }
        } else {
          // T3, T5, T6, T7: named team IS the beneficiary
          if(bracketTeam){
            sigTeam = (bracketTeam===hUp||bracketTeam===hSub) ? homeAlias : awayAlias;
          } else if(hasHome && !hasAway) sigTeam = homeAlias;
          else if(hasAway && !hasHome) sigTeam = awayAlias;
        }
      }
      parsedSignals.push({key, text: label + ': ' + detail, color: col, team: sigTeam, w: isClear ? 0 : 1});
    }
    // Recompute lean from per-signal attribution (more reliable than Sonnet's stated lean)
    const sigLeanMap = {};
    parsedSignals.forEach(s=>{ if(s.team && s.w>0) sigLeanMap[s.team] = (sigLeanMap[s.team]||0) + (s.key==='T3'?2:1); });
    const sigSorted = Object.entries(sigLeanMap).sort((a,b)=>b[1]-a[1]);
    const computedLean = sigSorted.length>0 ? sigSorted[0][0] : 'NEUTRAL';
    const trajLean = parsedSignals.length > 0 ? computedLean : (trajMatch ? trajMatch[1] : 'NEUTRAL');
    const trajCount = parsedSignals.length > 0 ? parsedSignals.filter(s => s.team===trajLean && s.w>0).length : (trajMatch ? parseInt(trajMatch[2]) : 0);
    const trajTotal = parsedSignals.length > 0 ? parsedSignals.filter(s=>s.w>0).length : (trajMatch ? parseInt(trajMatch[3]) : 8);

    return {
      I1:ind.I1, I2:ind.I2, I3:ind.I3, I4:ind.I4, I5:ind.I5,
      score, controlTeam,
      dataQuality: 'SONNET',
      traj: {signals:parsedSignals, lean:trajLean, count:trajCount, total:trajTotal, tooEarly:false},
      source: 'sonnet',
    };
  }catch(e){
    console.warn('Sonnet score parse failed:', e.message);
    return null;
  }
}

// 5-tier indicator color: green → yellow-green → yellow → orange → red
function indColor(score){
  if(score >= 0.875) return '#00ff88'; // clear edge — green
  if(score >= 0.625) return '#a8ff78'; // lean — yellow-green
  if(score >= 0.375) return '#ffd166'; // contested — yellow
  if(score >= 0.125) return '#ff8c42'; // opponent leans — orange
  return '#ff5252';                     // opponent controls — red
}

// 5-tier pip class (for background color via CSS)
function pipClass(score){
  if(score >= 0.875) return 'pw';  // win
  if(score >= 0.625) return 'plw'; // lean-win
  if(score >= 0.375) return 'pd';  // draw/contested
  if(score >= 0.125) return 'pll'; // lean-loss
  return 'pl';                      // loss
}

// Parse Decision View fields from Sonnet analysis text
function parseSonnetDecision(text){
  if(!text) return null;
  try{
    const d = {};
    // Parse EDGE line: "EDGE: +11.3% | FWP: 72.4% | MIP: 61.1%"
    const edgeMatch = text.match(/EDGE:\s*([^\|]+)\|\s*FWP:\s*([^\|]+)\|\s*MIP:\s*(.+)/i);
    if(edgeMatch){
      d.edge = edgeMatch[1].trim();
      d.fwp = edgeMatch[2].trim();
      d.mip = edgeMatch[3].trim();
      // Extract numeric edge
      const edgeNum = parseFloat(d.edge.replace(/[+%]/g,''));
      d.edgeNum = isNaN(edgeNum) ? null : edgeNum;
    }
    // Parse ENTRY line
    const entryMatch = text.match(/ENTRY:\s*(OPTIMAL WINDOW|WINDOW OPEN|WINDOW CLOSING|NO WINDOW|COUNTER-SIGNAL)/i);
    d.entry = entryMatch ? entryMatch[1] : null;
    // Parse CONVICTION line
    const convMatch = text.match(/CONVICTION:\s*(DOMINANT|STRONG|EARNED|CONDITIONAL|NO ENTRY)/i);
    d.conviction = convMatch ? convMatch[1] : null;
    // Parse Sustainability line
    const sustMatch = text.match(/Sustainability:\s*(.+)/i);
    d.sustainability = sustMatch ? sustMatch[1].trim() : null;
    // Parse Team Quality line
    const tqMatch = text.match(/Team Quality:\s*(.+)/i);
    d.teamQuality = tqMatch ? tqMatch[1].trim() : null;
    // Parse Clutch line
    const clutchMatch = text.match(/Clutch:\s*(.+)/i);
    d.clutch = clutchMatch ? clutchMatch[1].trim() : null;
    // Parse Prediction line
    const predMatch = text.match(/Prediction:\s*(.+)/i);
    d.prediction = predMatch ? predMatch[1].trim() : null;
    // Parse Thesis Status line
    const tsMatch = text.match(/THESIS\s*STATUS:\s*(CONFIRMED|DEVELOPING|CONTESTED|DENIED)/i);
    d.thesisStatus = tsMatch ? tsMatch[1].toUpperCase() : null;
    // Parse Spread Analysis line
    const spreadMatch = text.match(/SPREAD\s*ANALYSIS:\s*(.+)/i);
    d.spreadAnalysis = spreadMatch ? spreadMatch[1].trim() : null;
    // Parse SIGNAL line: "SIGNAL: BUY DET — trailing on ORL variance"
    const sigMatch = text.match(/SIGNAL:\s*(BUY\s+\w+|NO VALUE|PASS)\s*(?:[—–-]\s*(.+))?/i);
    if(sigMatch){
      d.signalType = sigMatch[1].trim().toUpperCase();
      d.signalNote = sigMatch[2] ? sigMatch[2].trim() : '';
      const buyMatch = d.signalType.match(/BUY\s+(\w+)/i);
      d.buyTeam = buyMatch ? buyMatch[1].toUpperCase() : null;
    }
    // Need at least prediction or conviction to be valid
    if(!d.prediction && !d.conviction) return null;
    return d;
  }catch(e){
    console.warn('Decision parse failed:', e.message);
    return null;
  }
}

// THESIS GENERATION
