function parseThesis(t){
  if(!t)return{lean:null,entry:null,pass:null,mlThreshold:null,watches:[],flags:[],shotDiet:null,heaterWatch:null,clutchGate:null};
  const r={lean:null,entry:null,pass:null,mlThreshold:null,watches:[],flags:[],shotDiet:null,heaterWatch:null,clutchGate:null};
  t.split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{
    const l=line.toLowerCase();
    if(l.startsWith('lean:'))r.lean=line.replace(/^lean:?\s*/i,'').trim();
    else if(l.startsWith('entry'))r.entry=line.replace(/^entry(?: trigger)?:?\s*/i,'').trim();
    else if(l.startsWith('pass'))r.pass=line.replace(/^pass(?: if)?:?\s*/i,'').trim();
    else if(l.startsWith('ml threshold'))r.mlThreshold=line.replace(/^ml\s*threshold:?\s*/i,'').trim();
    else if(l.startsWith('shot diet'))r.shotDiet=line.replace(/^shot\s*diet:?\s*/i,'').trim();
    else if(l.startsWith('3pt heater'))r.heaterWatch=line.replace(/^3pt\s*heater\s*watchlist:?\s*/i,'').trim();
    else if(l.startsWith('clutch gate'))r.clutchGate=line.replace(/^clutch\s*gate:?\s*/i,'').trim();
    else if(l.startsWith('watch:'))r.watches.push(line.replace(/^-?\s*watch:?\s*/i,'').trim());
    else if(l.startsWith('flag:')||l.startsWith('⚠')||l.startsWith('!'))r.flags.push(line.replace(/^[⚠!]\s*|^flag:?\s*/i,'').trim());
    else if(/^\d+\.\s+/.test(line))r.watches.push(line.replace(/^\d+\.\s+/,''));
  });
  // Try to extract ML value from threshold line (e.g., "CLE below -250 ML")
  if(r.mlThreshold){
    const mlMatch = r.mlThreshold.match(/below\s+([+-]?\d+)/i);
    if(mlMatch) r.mlValue = parseInt(mlMatch[1]);
  }
  return r;
}
// ── CONFIDENCE TABLE — live-updating command center ──
function renderConfidenceTable(){
  const el = document.getElementById('conf-table');
  if(!el) return;
  const entryPriority = {'OPTIMAL WINDOW':0,'WINDOW OPEN':1,'WINDOW CLOSING':2,'NO WINDOW':3,'COUNTER-SIGNAL':4};
  const rows = [];
  for(const g of games){
    const t = theses[g.id];
    if(!t) continue;
    const hA = g.home?.alias||'HOME', aA = g.away?.alias||'AWAY';
    const matchup = aA + ' @ ' + hA;
    const state = getState(g);
    // Parse thesis baseline
    let team='', score=0, verdict='';
    const csMatch = t.match(/CONTROL\s+SCORE:\s*(\w+)\s+([\d.]+)\s*[—–-]\s*(\w+)/i);
    if(csMatch){ team=csMatch[1]; score=parseFloat(csMatch[2]); verdict=csMatch[3]; }
    const p = parseThesis(t);
    // Pull live data from cardState
    const cs = cardState[g.id];
    const si = cs?.sonnetIndicators;
    if(si && si.score){ team=si.controlTeam; score=si.score; verdict=getVerdict(si.score)?.label||verdict; }
    const pred = cs?.prediction;
    const fwp = pred?.fwp || null;
    const edge = pred?.edgeNum ?? null;
    const entry = pred?.entry || null;
    const conviction = pred?.conviction || null;
    const thesisStatus = pred?.thesisStatus || null;
    // Sustainability from audit
    let sustHome = null, sustAway = null;
    const sa = cs?.sustainabilityAudit;
    if(sa){ sustHome = sa.homeTier || sa.home?.tier || null; sustAway = sa.awayTier || sa.away?.tier || null; }
    else if(pred?.sustainability){ sustHome = pred.sustainability; sustAway = null; }
    // Live score
    const homeScore = g.homePoints, awayScore = g.awayPoints;
    const period = g.period||0, clock = g.clock||'';
    if(!team && !score) continue;
    // Highest FWP team edge (replaces best edge)
    let fwpTeamAlias = null, fwpTeamEdge = null, fwpTeamFwp = null, fwpTeamEntry = null;
    const csPred = cs?.prediction;
    if(csPred?.homeValue && csPred?.awayValue){
      const hv = csPred.homeValue, av = csPred.awayValue;
      if(hv.fwp >= av.fwp){ fwpTeamAlias = hv.team; fwpTeamEdge = hv.edge; fwpTeamFwp = hv.fwp; }
      else { fwpTeamAlias = av.team; fwpTeamEdge = av.edge; fwpTeamFwp = av.fwp; }
    }
    fwpTeamEntry = csPred?.entry || null;
    const signal = csPred?.signalType || null;
    const row = {matchup, team, score, verdict, gameId:g.id, state, fwp, edge, entry, conviction, thesisStatus, sustHome, sustAway, homeScore, awayScore, period, clock, hA, aA, entryIf:p.entry||null, passIf:p.pass||null, fwpTeamAlias, fwpTeamEdge, fwpTeamFwp, fwpTeamEntry, signal};
    // Persist live data to cache whenever we have analysis results
    if(pred || si){
      persistConfRow(g.id, {team, score, verdict, fwp, edge, entry, conviction, thesisStatus, sustHome, sustAway, homeScore, awayScore, period, clock, state, fwpTeamAlias, fwpTeamEdge, fwpTeamFwp, fwpTeamEntry, signal:csPred?.signalType||null, ts:Date.now()});
    } else {
      // Fall back to cached data if no live cardState (e.g. page refresh, card not mounted)
      const cached = confCache[g.id];
      if(cached){
        if(!row.entry && cached.entry) row.entry = cached.entry;
        if(!row.conviction && cached.conviction) row.conviction = cached.conviction;
        if(!row.thesisStatus && cached.thesisStatus) row.thesisStatus = cached.thesisStatus;
        if(!row.fwp && cached.fwp) row.fwp = cached.fwp;
        if(row.edge===null && cached.edge!==null) row.edge = cached.edge;
        if(!row.sustHome && cached.sustHome) row.sustHome = cached.sustHome;
        if(!row.sustAway && cached.sustAway) row.sustAway = cached.sustAway;
        if(!row.fwpTeamAlias && cached.fwpTeamAlias){ row.fwpTeamAlias=cached.fwpTeamAlias; row.fwpTeamEdge=cached.fwpTeamEdge; row.fwpTeamFwp=cached.fwpTeamFwp; row.fwpTeamEntry=cached.fwpTeamEntry; }
        if(!row.signal && cached.signal) row.signal = cached.signal;
        if(row.homeScore===null && cached.homeScore!==null){ row.homeScore=cached.homeScore; row.awayScore=cached.awayScore; row.period=cached.period; row.clock=cached.clock; }
        if(cached.state==='FINAL' && row.state==='PRE') row.state = cached.state;
        if(cached.team && !si) { row.team=cached.team; row.score=cached.score; row.verdict=cached.verdict; }
      }
    }
    rows.push(row);
  }
  if(!rows.length){ el.style.display='none'; return; }
  // Sort: LIVE first (by entry priority), then PRE (by score), then FINAL (by score)
  const stateOrder = {LIVE:0, PRE:1, FINAL:2};
  rows.sort((a,b)=>{
    const sa = stateOrder[a.state]??1, sb = stateOrder[b.state]??1;
    if(sa!==sb) return sa-sb;
    if(a.state==='LIVE'){
      const ea = entryPriority[a.entry]??5, eb = entryPriority[b.entry]??5;
      if(ea!==eb) return ea-eb;
    }
    return b.score-a.score;
  });
  const vColor = (v) => {
    const lv = (v||'').toLowerCase();
    return lv.includes('dominant')?'var(--green)':lv.includes('strong')?'var(--g2)':lv.includes('earned')?'var(--yellow)':lv.includes('no edge')||lv.includes('wait')?'var(--red)':'var(--t2)';
  };
  const edgeStr = (e) => e===null||e===undefined?'':'<span style="color:'+(e>=5?'var(--green)':e>=1?'var(--yellow)':e>=0?'var(--t3)':'var(--red)')+'">'+(e>=0?'+':'')+e.toFixed(1)+'%</span>';
  const entryColor = (e) => e==='OPTIMAL WINDOW'?'var(--green)':e==='WINDOW OPEN'?'var(--g2)':e==='WINDOW CLOSING'?'var(--yellow)':e==='COUNTER-SIGNAL'?'var(--red)':'var(--t3)';
  const convColor = (c) => ({DOMINANT:'var(--green)',STRONG:'var(--g2)',EARNED:'var(--yellow)',CONDITIONAL:'var(--amber)'})[c]||'var(--t3)';
  const tsColor = (s) => s==='CONFIRMED'?'var(--green)':s==='DEVELOPING'?'var(--g2)':s==='CONTESTED'?'var(--amber)':s==='DENIED'?'var(--red)':'var(--t3)';
  const entryClass = (e) => e==='OPTIMAL WINDOW'?'ct-optimal':e==='WINDOW OPEN'?'ct-window':e==='WINDOW CLOSING'?'ct-closing':e==='COUNTER-SIGNAL'?'ct-counter':'';
  const liveCount = rows.filter(r=>r.state==='LIVE').length;
  const preCount = rows.filter(r=>r.state==='PRE').length;
  const finalCount = rows.filter(r=>r.state==='FINAL').length;
  const statsSummary = [liveCount?liveCount+' live':'', preCount?preCount+' pre':'', finalCount?finalCount+' final':''].filter(Boolean).join(' / ');
  let html = '<div class="ct-hdr" onclick="confCollapsed=!confCollapsed;renderConfidenceTable()" style="cursor:pointer">CONFIDENCE TABLE <span class="arr" style="display:inline-block;transition:transform .2s;transform:rotate('+(confCollapsed?'0':'90')+'deg);margin-left:2px">&#9656;</span><span style="font-size:5px;color:var(--t3);margin-left:auto">'+rows.length+' '+(rows.length===1?'game':'games')+' &#183; '+statsSummary+'</span></div>';
  if(!confCollapsed){
  html += '<table><tr><th style="text-align:center">SCORE</th><th style="text-align:center">SUST</th><th style="text-align:center">FWP</th><th style="text-align:center">EDGE</th><th style="text-align:center">ENTRY</th><th>CTRL</th><th style="text-align:center">CTRL</th><th style="text-align:center">THESIS</th></tr>';
  for(const r of rows){
    const isFinal = r.state==='FINAL';
    const rowClass = 'ct-row'+(isFinal?' ct-final':' '+entryClass(r.entry));
    // State badge (folded into score cell)
    let stateBadge = '';
    if(r.state==='LIVE'){
      const qStr = r.period ? 'Q'+r.period+(r.clock?' '+r.clock:'') : 'LIVE';
      stateBadge = '<span class="ct-badge ct-live" style="margin-right:4px;vertical-align:middle">'+esc(qStr)+'</span>';
    } else if(r.state==='FINAL'){
      stateBadge = '<span class="ct-badge ct-done" style="margin-right:4px;vertical-align:middle">FIN</span>';
    }
    // Score display — always show team names, blank scores when pregame
    let scoreStr = '';
    if(r.homeScore!==null && r.homeScore!==undefined){
      scoreStr = stateBadge+'<span style="font-weight:600;font-size:7px">'+esc(r.aA)+' '+r.awayScore+'</span><span style="color:var(--t3);margin:0 2px">-</span><span style="font-weight:600;font-size:7px">'+r.homeScore+' '+esc(r.hA)+'</span>';
    } else {
      scoreStr = '<span style="font-weight:600;font-size:7px;color:var(--t2)">'+esc(r.aA)+'</span><span style="color:var(--t3);margin:0 3px">@</span><span style="font-weight:600;font-size:7px;color:var(--t2)">'+esc(r.hA)+'</span>';
    }
    // Sustainability — show both teams compact, pull client-side fallback
    let sustStr = '';
    const csForSust = cardState[r.gameId];
    let effSustHome = r.sustHome, effSustAway = r.sustAway;
    if(!effSustHome && csForSust?.clientSustainability){
      const cS = csForSust.clientSustainability;
      effSustHome = cS.home?.tier||null;
      effSustAway = cS.away?.tier||null;
    }
    if(effSustHome || effSustAway){
      const shorten = (s) => {
        if(!s) return '?';
        const u = s.toUpperCase();
        if(u.includes('LOCKED')) return 'LCKD';
        if(u.includes('DURABLE')) return 'DUR';
        if(u.includes('MIXED')) return 'MIX';
        if(u.includes('FRAGILE')) return 'FRG';
        if(u.includes('UNSUST')) return 'UNS';
        return s.substring(0,4).toUpperCase();
      };
      const sustColor = (s) => {
        if(!s) return 'var(--t3)';
        const u = s.toUpperCase();
        if(u.includes('LOCKED')) return 'var(--green)';
        if(u.includes('DURABLE')) return 'var(--g2)';
        if(u.includes('MIXED')) return 'var(--yellow)';
        if(u.includes('FRAGILE')) return 'var(--amber)';
        if(u.includes('UNSUST')) return 'var(--red)';
        return 'var(--t3)';
      };
      if(effSustAway){
        sustStr = '<span style="color:'+sustColor(effSustHome)+'">'+esc(r.hA)+':'+shorten(effSustHome)+'</span> <span style="color:'+sustColor(effSustAway)+'">'+esc(r.aA)+':'+shorten(effSustAway)+'</span>';
      } else {
        sustStr = '<span style="color:'+sustColor(effSustHome)+'">'+esc(effSustHome||'')+'</span>';
      }
    } else { sustStr = '<span style="color:var(--t3)">&#8212;</span>'; }
    // Edge display — show highest FWP team's edge
    let edgeDispStr = '<span style="color:var(--t3)">&#8212;</span>';
    if(r.fwpTeamAlias && r.fwpTeamEdge !== null && r.fwpTeamEdge !== undefined){
      const ec = r.fwpTeamEdge>=10?'var(--green)':r.fwpTeamEdge>=5?'var(--g2)':r.fwpTeamEdge>=1?'var(--yellow)':r.fwpTeamEdge>=0?'var(--t3)':'var(--red)';
      edgeDispStr = '<span style="color:'+ec+';font-weight:700">'+esc(r.fwpTeamAlias)+' '+(r.fwpTeamEdge>=0?'+':'')+r.fwpTeamEdge.toFixed(1)+'%</span>';
    }
    // FWP labeled with highest FWP team
    let fwpStr = '<span style="color:var(--t3)">&#8212;</span>';
    if(r.fwpTeamAlias && r.fwpTeamFwp){
      fwpStr = '<span style="color:var(--t1);font-weight:600">'+esc(r.fwpTeamAlias)+' '+r.fwpTeamFwp.toFixed(0)+'%</span>';
    } else if(r.fwp){
      fwpStr = '<span style="color:var(--t1);font-weight:600">'+esc(r.team||'')+' '+esc(r.fwp)+'</span>';
    }
    // Entry signal for highest FWP team
    let entryStr = '<span style="color:var(--t3)">&#8212;</span>';
    if(r.fwpTeamEntry){
      const shortEntry = r.fwpTeamEntry.replace('WINDOW ','W/').replace('COUNTER-SIGNAL','COUNTER');
      entryStr = '<span style="color:'+entryColor(r.fwpTeamEntry)+'">'+esc(shortEntry)+'</span>';
    } else if(r.signal){
      const sigCol = r.signal.startsWith('BUY')?'var(--green)':r.signal==='COUNTER'||r.signal==='COUNTER-SIGNAL'?'var(--red)':'var(--t3)';
      entryStr = '<span style="color:'+sigCol+'">'+esc(r.signal)+'</span>';
    }
    // Thesis status
    const tsStr = r.thesisStatus ? '<span style="color:'+tsColor(r.thesisStatus)+'">'+esc(r.thesisStatus)+'</span>' : '<span style="color:var(--t3)">&#8212;</span>';
    html += '<tr class="'+rowClass+'" style="cursor:pointer" onclick="document.getElementById(\'card-'+r.gameId+'\')?.scrollIntoView({behavior:\'smooth\',block:\'start\'})">'
      + '<td style="text-align:center;white-space:nowrap;font-size:7px">'+scoreStr+'</td>'
      + '<td style="font-size:5.5px;text-align:center;white-space:nowrap">'+sustStr+'</td>'
      + '<td style="font-size:7px;text-align:center;white-space:nowrap">'+fwpStr+'</td>'
      + '<td style="font-size:7px;text-align:center;white-space:nowrap">'+edgeDispStr+'</td>'
      + '<td style="font-size:6px;text-align:center;white-space:nowrap">'+entryStr+'</td>'
      + '<td style="color:'+vColor(r.verdict)+'">'+esc(r.team)+'</td>'
      + '<td class="ct-score" style="color:'+vColor(r.verdict)+'">'+r.score.toFixed(2)+'<div class="ct-verdict" style="color:'+vColor(r.verdict)+'">'+esc(r.verdict)+'</div></td>'
      + '<td style="font-size:6px;text-align:center">'+tsStr+'</td>'
      + '</tr>';
  }
  html += '</table>';
  } // end if(!confCollapsed)
  el.innerHTML = html;
  el.style.display = 'block';
}

function crossRef(parsed,ind){
  if(!parsed||!ind||!parsed.watches.length)return[];
  const a=[],txt=parsed.watches.join(' ').toLowerCase();
  if((txt.includes('turnover')||txt.includes('to rate'))&&ind.I1)
    a.push(ind.I1.score===0?{msg:'⚠ Turnover concern confirmed — I1 flagged',level:'warn'}:{msg:'✓ Turnover rate holding — I1 intact',level:'ok'});
  if((txt.includes('paint')||txt.includes('interior')||txt.includes('rim'))&&ind.I2)
    a.push(ind.I2.score===1?{msg:'✓ Interior edge confirmed — I2 developing',level:'ok'}:ind.I2.score===0?{msg:'⚠ Interior edge denied',level:'warn'}:{msg:'I2 contested',level:'info'});
  if((txt.includes('assist')||txt.includes('creation'))&&ind.I3)
    a.push(ind.I3.score===1?{msg:'✓ Ball movement confirmed — I3 developing',level:'ok'}:{msg:'⚠ Creation edge not materializing',level:'warn'});
  if((txt.includes('bonus')||txt.includes('foul'))&&ind.I2)
    a.push({msg:'Foul/bonus: '+ind.I2.detail,level:'info'});
  return a;
}

// ══════════════════════════════════════════════════════════════════════════════
// CARD MOUNT & RENDER
// ══════════════════════════════════════════════════════════════════════════════
function mountCard(game){
  const id=game.id;
  // Preserve existing Sonnet analysis results if card was previously mounted
  const prev = cardState[id];
  const _analysis = prev?.analysis||null;
  const _analysisTime = prev?.analysisTime||null;
  const _sonnetIndicators = prev?.sonnetIndicators||null;
  const _prediction = prev?.prediction||null;
  const _sustainabilityAudit = prev?.sustainabilityAudit||null;
  const _edgeHistory = prev?.edgeHistory||[];
  const _pbpAudit = prev?.pbpAudit||null;
  const _pbpTime = prev?.pbpTime||null;
  const _pbpPeriod = prev?.pbpPeriod||null;
  const _clientIndAtAnalysis = prev?.clientIndAtAnalysis||null;
  const _analysisHistory = prev?.analysisHistory||[];
  const _mktCollapsed = prev?.mktCollapsed !== undefined ? prev.mktCollapsed : true;
  cardState[id]={logs:[],lastUp:null,editing:false,generating:false,analyzing:false,
    prevLvl:null,_countdown:null,lastFingerprint:'',analysis:_analysis,analysisTime:_analysisTime,genSteps:null,genError:null,
    lastScoreFP:'',lastStatsFP:'',staleCount:0,dataFreshness:'FRESH',sonnetIndicators:_sonnetIndicators,
    prediction:_prediction, sustainabilityAudit:_sustainabilityAudit, clutchData:null, clutchTier:3, oddsData:null, oddsAll:null, oddsHistory:[], trackingData:null, enriching:false, enrichDone:false, evCollapsed:false, mktCollapsed:_mktCollapsed, edgeHistory:_edgeHistory, analysisHistory:_analysisHistory, pbpAudit:_pbpAudit, pbpTime:_pbpTime, pbpPeriod:_pbpPeriod, pbpLoading:false};
  // Restore cached clutch data from localStorage
  if(cachedClutch[id]){
    const cs = cardState[id];
    cs.clutchData = cachedClutch[id].data;
    cs.clutchTier = cachedClutch[id].tier || 2;
    addLog(id, '📋 Clutch restored from cache', true);
  }
  // Restore cached odds from localStorage
  if(cachedOdds[id]){
    cardState[id].oddsData = cachedOdds[id];
    cardState[id].oddsHistory = cachedOddsHistory[id] || [];
    addLog(id, '📋 Odds restored from cache', true);
  }
  // Restore structural context from localStorage
  try{
    const savedStructural = localStorage.getItem('nba4:structural:'+id);
    if(savedStructural){ cardState[id].structural = JSON.parse(savedStructural); addLog(id, '📋 Structural context restored', true); }
  }catch(e){}
  // Restore tracking data from localStorage
  try{
    const savedTracking = localStorage.getItem('nba4:tracking:'+id);
    if(savedTracking){ cardState[id].trackingData = JSON.parse(savedTracking); addLog(id, '📋 Tracking baselines restored', true); }
  }catch(e){}
  // Restore analysis data from localStorage (fallback when in-memory prev was deleted on deselect or browser refresh)
  if(!cardState[id].analysis){
    try{
      const savedAnalysis = localStorage.getItem('nba4:analysis:'+id);
      if(savedAnalysis){
        const sa = JSON.parse(savedAnalysis);
        cardState[id].analysis = sa.analysis;
        cardState[id].analysisTime = sa.analysisTime ? new Date(sa.analysisTime) : null;
        cardState[id].sonnetIndicators = sa.sonnetIndicators;
        cardState[id].prediction = sa.prediction;
        cardState[id].sustainabilityAudit = sa.sustainabilityAudit;
        cardState[id].analysisHistory = sa.analysisHistory || [];
        cardState[id].edgeHistory = sa.edgeHistory || [];
        cardState[id].clientIndAtAnalysis = sa.clientIndAtAnalysis || null;
        addLog(id, '📋 Analysis restored from cache ('+((sa.analysisHistory||[]).length)+' reads)', true);
      }
    }catch(e){ console.warn('Analysis restore failed:', e.message); }
  }
  // Restore depth audit from localStorage
  if(!cardState[id].pbpAudit){
    try{
      const savedDepth = localStorage.getItem('nba4:depth:'+id);
      if(savedDepth){
        const sd = JSON.parse(savedDepth);
        cardState[id].pbpAudit = sd.pbpAudit;
        cardState[id].pbpTime = sd.pbpTime ? new Date(sd.pbpTime) : null;
        cardState[id].pbpPeriod = sd.pbpPeriod;
        addLog(id, '📋 Depth audit restored from cache (Q'+(sd.pbpPeriod||'?')+')', true);
      }
    }catch(e){ console.warn('Depth restore failed:', e.message); }
  }
  // Initialize new fields
  cardState[id].baselines = null;
  cardState[id].clientSustainability = null;
  cardState[id].divergences = [];
  cardState[id].clientInd = null;
  cardState[id].clientIndAtAnalysis = _clientIndAtAnalysis;
  cardState[id]._baselineLogged = false;
  if(_analysis) addLog(id, '📋 Analysis preserved from previous mount', true);
  // Auto-distribute global clutch data if available (uploaded before game selected — overrides cache)
  if(globalClutchData?.teams){
    const hA = game.home?.alias||'', aA = game.away?.alias||'';
    const hC = globalClutchData.teams[hA], aC = globalClutchData.teams[aA];
    if(hC || aC){
      const cs = cardState[id];
      cs.clutchData = {
        tier:1,
        home: hC ? { netRtg:hC.netRtg, offRtg:hC.offRtg, defRtg:hC.defRtg, gp:hC.gp, w:hC.w, l:hC.l, wl:hC.wl, efg:hC.efg, ts:hC.ts, pace:hC.pace, pie:hC.pie, tovPct:hC.tovPct, orebPct:hC.orebPct, drebPct:hC.drebPct, astRatio:hC.astRatio } : {},
        away: aC ? { netRtg:aC.netRtg, offRtg:aC.offRtg, defRtg:aC.defRtg, gp:aC.gp, w:aC.w, l:aC.l, wl:aC.wl, efg:aC.efg, ts:aC.ts, pace:aC.pace, pie:aC.pie, tovPct:aC.tovPct, orebPct:aC.orebPct, drebPct:aC.drebPct, astRatio:aC.astRatio } : {},
      };
      cs.clutchTier = 1;
      persistClutch(id, cs);
      addLog(id, `📋 L15 clutch auto-loaded from OCR`, true);
    }
  }
  const div=document.createElement('div');
  div.id='card-'+id;
  document.getElementById('grid').appendChild(div);
  renderCard(game);
  if(getState(game)==='LIVE'||getState(game)==='FINAL') fetchSummary(game);
  // Auto-enrich from BDL if not already done
  if(!cardState[id].enrichDone && !cardState[id].enriching) enrichFromBDL(id);
}

function addLog(id,msg,ok){const cs=cardState[id];if(!cs)return;cs.logs=[...cs.logs.slice(-29),{msg,ok,t:new Date().toLocaleTimeString()}];}

function renderCard(game){
  const id=game.id, cs=cardState[id];
  if(!cs||cs.editing) return;
  const el=document.getElementById('card-'+id);
  if(!el)return;
  const state=getState(game), rawInd=computeAny(game);
  // Prefer Sonnet indicators when available, fall back to compute()
  const ind = cs.sonnetIndicators || rawInd;
  const v=ind?getVerdict(ind.score):null;
  // Count indicators where the leader matches the controlling team (0.75+ for Sonnet, 1.0 for compute)
  const indWon = ind ? [ind.I1,ind.I2,ind.I3,ind.I4,ind.I5].filter(d => {
    if(d.leader === 'EVEN') return false;
    const leaderMatchesControl = d.leader.toUpperCase().substring(0,3) === ind.controlTeam.toUpperCase().substring(0,3);
    return leaderMatchesControl;
  }).length : 0;
  const indTotal = 5;
  const thesis=theses[id]||'', p=parseThesis(thesis);
  const xrefs=ind&&state!=='PRE'?crossRef(p,ind):[];
  const hA=game.home?.alias||'HOME', aA=game.away?.alias||'AWAY';
  const periodLabel=state==='PRE'?'PRE':state==='FINAL'?'FINAL':({1:'1ST',2:'2ND',3:'3RD',4:'4TH',5:'OT',6:'2OT'}[game.period]||'Q'+game.period);
  el.className='card'+(v?.lvl==='entry'?' ce':v?.lvl==='watch'?' cw':'');

  let html=`
  <div class="ch">
    <div><div class="mup">${esc(aA)} @ ${esc(hA)}</div>
    <div class="sub">${esc(game.away?.name)} at ${esc(game.home?.name)}${game.venue?' · '+esc(game.venue):''}</div></div>
    <div class="chr">${state==='LIVE'?'<div class="ld"></div>':''}<span class="pb">${periodLabel}${game.clock?' '+game.clock:''}</span></div>
  </div>
  <div class="sr">
    <div><div class="srt">${esc(aA)}</div>
    <div><span class="srs">${state==='PRE'?'—':game.awayPoints??'—'}</span>${game.summary?.away?.bonus?'<span class="bonus-tag">BONUS</span>':''}</div></div>
    <span class="sr-sep">–</span>
    <div style="text-align:right"><div class="srt">${esc(hA)}</div>
    <div>${game.summary?.home?.bonus?'<span class="bonus-tag">BONUS</span>':''}<span class="srs">${state==='PRE'?'—':game.homePoints??'—'}</span></div></div>
  </div>`;

  if(state==='PRE'){
    const ms=new Date(game.scheduled)-new Date();
    const h=Math.max(0,Math.floor(ms/3600000)),m=Math.max(0,Math.floor((ms%3600000)/60000)),s=Math.max(0,Math.floor((ms%60000)/1000));
    const cdown=ms<=0?'TIP OFF SOON':(h>0?h+'h ':'')+m+'m '+String(s).padStart(2,'0')+'s';
    html+=`<div class="pre"><div class="prelbl">TIP OFF IN</div><div class="countdown">${cdown}</div>
    <div class="prediv"></div><div style="font-size:6px;color:var(--t3)">Indicators activate at tip · Generate or paste thesis below</div></div>`;
  }

  if(state!=='PRE'&&ind){
    const analyzeBtn = state==='LIVE' ? (cs.analyzing ? `<button class="tgen" style="font-size:6px;padding:1px 6px;margin-left:4px;opacity:.5;color:var(--t3);border-color:var(--t3);" disabled>⏳ ANALYZING</button>` : `<button class="tgen" style="font-size:6px;padding:1px 6px;margin-left:4px;" onclick="triggerAnalysis(games.find(g=>g.id==='${id}'))">⚡ ANALYZE</button>`) : '';
    const pred = cs.prediction;

    // ── RECOMPUTE EDGE CLIENT-SIDE on every render (fixes stale Sonnet edge on refresh) ──
    if(pred && cs.oddsData && ind){
      const od = cs.oddsData;
      if(od.homeML || od.awayML){
        // Derive FWP from control score (primary) or Sonnet text parse (fallback)
        const fwpVal = ind.score ? ind.score * 100 : parseFloat((pred.fwp||'').replace(/[%\s]/g,''));
        if(!isNaN(fwpVal)){
          const _mlP = (ml) => { const n=parseFloat(ml); if(isNaN(n)||n===0) return null; return n<0?Math.abs(n)/(Math.abs(n)+100):100/(n+100); };
          const rH=_mlP(od.homeML), rA=_mlP(od.awayML);
          if(rH!==null && rA!==null){
            const vs=rH+rA, hMIP=rH/vs*100, aMIP=rA/vs*100;
            const cTeam=(ind.controlTeam||'').toUpperCase();
            const bTeam=(pred.buyTeam||'').toUpperCase();
            const fwpTeam = bTeam || cTeam;
            const isH = fwpTeam===hA.toUpperCase();
            const isA = fwpTeam===aA.toUpperCase();
            let hFWP,aFWP;
            if(isH){hFWP=fwpVal;aFWP=100-fwpVal;}
            else if(isA){aFWP=fwpVal;hFWP=100-fwpVal;}
            else{hFWP=fwpVal>=50?fwpVal:100-fwpVal;aFWP=100-hFWP;}
            pred.homeValue={team:hA,fwp:hFWP,mip:hMIP,edge:parseFloat((hFWP-hMIP).toFixed(1)),ml:od.homeML||'—',spread:od.homeSpread||'—'};
            var awaySpr = od.homeSpread ? parseFloat(od.homeSpread)*-1 : null;
            var awaySprStr = awaySpr!==null&&!isNaN(awaySpr) ? (awaySpr>0?'+':'')+awaySpr : '—';
            pred.awayValue={team:aA,fwp:aFWP,mip:aMIP,edge:parseFloat((aFWP-aMIP).toFixed(1)),ml:od.awayML||'—',spread:awaySprStr};
            const wMIP=Math.max(hFWP,aFWP)===hFWP?hMIP:aMIP;
            const edge=Math.max(hFWP,aFWP)-wMIP;
            pred.edge=(edge>=0?'+':'')+edge.toFixed(1)+'%';
            pred.edgeNum=parseFloat(edge.toFixed(1));
            pred.mip=wMIP.toFixed(1)+'%';
            pred.fwp=fwpVal.toFixed(1)+'%';
          }
        }
      }
    }

    // ─── CONTROL BAR (compact — pure mechanical, no FWP) ───
    const trajTeam = ind.traj&&!ind.traj.tooEarly&&ind.traj.lean!=='NEUTRAL' ? ind.traj.lean : null;
    const trajBadgeColor = trajTeam ? 'var(--amber)' : 'var(--t3)';
    const trajBadgeText = ind.traj&&!ind.traj.tooEarly ? (trajTeam||'EVEN')+' '+ind.traj.count+'/'+ind.traj.total : '';
    html+=`
    <div class="ctrl-bar">
      <div class="vrd" style="color:${v.color};border-color:${v.color};background:${v.bg}">${v.label} (${ind.score.toFixed(2)})</div>
      <div><div class="cl">CONTROL</div><div class="ct">${esc(ind.controlTeam)}</div></div>
      <div class="bw"><div class="bt2"><div class="bf" style="width:${ind.score*100}%;background:${v.color}"></div></div></div>
      <div class="cn" style="color:${v.color}">${ind.score.toFixed(2)}</div>
      <span style="font-size:5px;color:var(--t3);margin-left:-2px;letter-spacing:.3px">CTL</span>
      ${trajBadgeText?`<span class="dq" style="color:${trajBadgeColor};border-color:${trajBadgeColor}">${trajBadgeText}</span>`:''}
    </div>`;

    // ─── DIVERGENCE DETECTION ───
    const baseInd = cs.clientIndAtAnalysis;
    if(cs.sonnetIndicators && rawInd && baseInd){
      const divergences = [];
      const iKeys = ['I1','I2','I3','I4','I5'];
      for(const k of iKeys){
        const bL = baseInd[k]?.leader?.toUpperCase().substring(0,3)||'';
        const cL = rawInd[k]?.leader?.toUpperCase().substring(0,3)||'';
        if(bL && cL && bL!=='EVE' && cL!=='EVE' && bL!==cL){
          divergences.push(k+' flipped: '+baseInd[k].leader+' → '+rawInd[k].leader);
        }
      }
      const scoreDelta = Math.abs((rawInd.score||0)-(baseInd.score||0));
      if(scoreDelta>=0.15){
        divergences.push('Control shifted '+(baseInd.score||0).toFixed(2)+' → '+(rawInd.score||0).toFixed(2)+' (Δ'+scoreDelta.toFixed(2)+')');
      }
      if(rawInd.controlTeam && baseInd.controlTeam && rawInd.controlTeam.toUpperCase().substring(0,3)!==baseInd.controlTeam.toUpperCase().substring(0,3)){
        divergences.push('Control team flipped: '+baseInd.controlTeam+' → '+rawInd.controlTeam);
      }
      cs.divergences = divergences;
      cs.clientInd = rawInd;
    } else {
      cs.divergences = [];
    }

    if(cs.divergences && cs.divergences.length>0){
      var minsAgo = cs.analysisTime ? Math.round((Date.now()-cs.analysisTime.getTime())/60000) : '?';
      html+='<div style="padding:5px 10px;background:rgba(255,170,0,.08);border-top:1px solid rgba(255,170,0,.25)">';
      html+='<div style="font-size:6.5px;color:#ffaa00;font-weight:600;letter-spacing:.5px">⚠ STALE READ — '+cs.divergences.length+' divergence'+(cs.divergences.length>1?'s':'')+' since last analysis ('+minsAgo+'m ago)</div>';
      html+='<div style="font-size:6px;color:var(--t2);margin-top:2px">'+cs.divergences.map(function(d){return esc(d);}).join(' | ')+'</div>';
      html+='<div style="margin-top:3px"><button class="tgen" style="font-size:6px;padding:1px 6px;background:rgba(255,170,0,.12);border-color:#ffaa00;color:#ffaa00" onclick="triggerAnalysis(games.find(g=>g.id===\''+id+'\'))">⚡ RE-ANALYZE</button></div>';
      html+='</div>';
    }

    // ─── SUSTAINABILITY BRIDGE ───
    var sa = cs.sustainabilityAudit;
    var cSust = cs.clientSustainability;
    var leadTeam = (game.homePoints||0)>=(game.awayPoints||0) ? hA : aA;
    var trailTeam = leadTeam===hA ? aA : hA;
    var leadSA = sa ? (leadTeam===hA ? sa.home : sa.away) : null;
    var trailSA = sa ? (trailTeam===hA ? sa.home : sa.away) : null;
    // Client-side sustainability fallback
    var leadCSust = cSust ? (leadTeam===hA ? cSust.home : cSust.away) : null;
    var trailCSust = cSust ? (trailTeam===hA ? cSust.home : cSust.away) : null;
    function sustColor(tier){ if(!tier) return 'var(--t3)'; var t=(tier||'').toUpperCase(); return t.includes('LOCKED')?'var(--green)':t.includes('DURABLE')?'var(--g2)':t.includes('MIXED')?'var(--yellow)':t.includes('FRAGILE')?'var(--amber)':t.includes('UNSUST')?'var(--red)':'var(--t3)'; }
    function sustDetail(t){ if(!t||!t.personnelGrade) return ''; return 'P:'+t.personnelGrade.substring(0,3)+' R:'+t.regressionGrade.substring(0,3)+' S:'+t.shotTypeGrade.substring(0,3); }
    // Use Sonnet audit when available, fall back to client audit
    var showSonnetSust = leadSA;
    var showClientSust = !showSonnetSust && leadCSust;
    if(showSonnetSust || showClientSust || (pred && pred.sustainability)){
      html+='<div style="padding:6px 10px;border-top:1px solid var(--b1)">';
      html+='<div style="font-size:6px;color:#a78bfa;letter-spacing:1.5px;margin-bottom:4px;font-family:inherit">SUSTAINABILITY &#8212; IS THE LEAD STRUCTURAL?'+(showClientSust?' <span style="color:var(--t3);letter-spacing:0">(client-side)</span>':'')+'</div>';
      if(showSonnetSust){
        html+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px"><span style="font-size:7px;color:var(--t3);width:48px">LEADING</span><span class="dv-tag" style="color:'+sustColor(leadSA.tier)+';border-color:'+sustColor(leadSA.tier)+';font-size:6px;padding:0 4px">'+esc(leadSA.teamAlias||leadTeam)+' '+(leadSA.tier||'?')+'</span><span style="font-size:5.5px;color:var(--t3)">('+sustDetail(leadSA)+')</span></div>';
        if(leadSA.shotTypeNote) html+='<div style="font-size:6px;color:var(--t2);margin-left:52px;margin-bottom:3px">'+esc(leadSA.shotTypeNote)+'</div>';
        html+='<div style="display:flex;align-items:center;gap:4px"><span style="font-size:7px;color:var(--t3);width:48px">TRAILING</span><span class="dv-tag" style="color:'+sustColor(trailSA.tier)+';border-color:'+sustColor(trailSA.tier)+';font-size:6px;padding:0 4px">'+esc(trailSA.teamAlias||trailTeam)+' '+(trailSA.tier||'?')+'</span><span style="font-size:5.5px;color:var(--t3)">('+sustDetail(trailSA)+')</span></div>';
        if(trailSA.shotTypeNote) html+='<div style="font-size:6px;color:var(--t2);margin-left:52px">'+esc(trailSA.shotTypeNote)+'</div>';
      } else if(showClientSust){
        html+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px"><span style="font-size:7px;color:var(--t3);width:48px">LEADING</span><span class="dv-tag" style="color:'+sustColor(leadCSust.tier)+';border-color:'+sustColor(leadCSust.tier)+';font-size:6px;padding:0 4px">'+esc(leadTeam)+' '+esc(leadCSust.tier)+'</span><span style="font-size:5.5px;color:var(--t2)">'+esc(leadCSust.reason)+'</span></div>';
        html+='<div style="display:flex;align-items:center;gap:4px"><span style="font-size:7px;color:var(--t3);width:48px">TRAILING</span><span class="dv-tag" style="color:'+sustColor(trailCSust.tier)+';border-color:'+sustColor(trailCSust.tier)+';font-size:6px;padding:0 4px">'+esc(trailTeam)+' '+esc(trailCSust.tier)+'</span><span style="font-size:5.5px;color:var(--t2)">'+esc(trailCSust.reason)+'</span></div>';
      } else if(pred && pred.sustainability){
        html+='<div style="font-size:6px;color:var(--t2)">'+esc(pred.sustainability)+'</div>';
      }
      html+='</div>';
    }

    // ─── VALUE READ (two-sided — primary decision interface) ───
    if(pred){
      var hv = pred.homeValue, av = pred.awayValue;
      var hasValues = hv && av;
      // Determine highest FWP team for green highlight
      var fwpTeam = null;
      if(hasValues){
        if(hv.fwp > av.fwp){ fwpTeam = hA; }
        else if(av.fwp > hv.fwp){ fwpTeam = aA; }
      }
      // Best edge team (for signal bar)
      var bestTeam = null, bestEdge = null;
      if(hasValues){
        if(hv.edge > av.edge && hv.edge >= 5){ bestTeam = hA; bestEdge = hv; }
        else if(av.edge > hv.edge && av.edge >= 5){ bestTeam = aA; bestEdge = av; }
      }
      var entryColor = pred.entry==='OPTIMAL WINDOW'?'var(--green)':pred.entry==='WINDOW OPEN'?'var(--g2)':pred.entry==='WINDOW CLOSING'?'var(--yellow)':pred.entry==='COUNTER-SIGNAL'?'var(--red)':'var(--t3)';
      var convColor = ({DOMINANT:'var(--green)',STRONG:'var(--g2)',EARNED:'var(--yellow)',CONDITIONAL:'var(--amber)'})[pred.conviction]||'var(--t3)';
      // Edge history
      var eh = cs.edgeHistory.filter(function(e){return e.edgeNum!==null&&e.edgeNum!==undefined;});
      var peakEdge = null, edgeTrend = '';
      if(eh.length >= 2){
        peakEdge = eh.reduce(function(max,e){return e.edgeNum>max.edgeNum?e:max;}, eh[0]);
        var recent = eh.slice(-2);
        var diff = recent[1].edgeNum - recent[0].edgeNum;
        edgeTrend = diff > 1.5 ? '&#9650;' : diff < -1.5 ? '&#9660;' : '&#9472;';
      }
      // Thesis status
      var tsCol = pred.thesisStatus==='CONFIRMED'?'var(--green)':pred.thesisStatus==='DEVELOPING'?'var(--g2)':pred.thesisStatus==='CONTESTED'?'var(--amber)':pred.thesisStatus==='DENIED'?'var(--red)':'var(--t3)';
      // Parse thesis team from thesis text
      var thesisTeamMatch = (theses[id]||'').match(/CONTROL\s+SCORE:\s*(\w+)/i);
      var thesisTeam = thesisTeamMatch ? thesisTeamMatch[1] : '';

      html+='<div class="dv" style="'+(fwpTeam?'border-left:2px solid var(--green);background:rgba(0,200,83,.02)':'')+'">';
      // Header
      html+='<div class="dv-hdr">VALUE READ<span style="display:flex;align-items:center;gap:6px;margin-left:auto">';
      if(thesisTeam && pred.thesisStatus) html+='<span style="font-size:5.5px;color:var(--t3);letter-spacing:.3px">THESIS '+esc(thesisTeam)+': <span style="color:'+tsCol+'">'+esc(pred.thesisStatus)+'</span></span>';
      html+=analyzeBtn+'<span class="analysis-cost">'+(cs.analysisTime?cs.analysisTime.toLocaleTimeString():'')+'</span></span></div>';

      if(hasValues){
        // Table header
        html+='<div style="display:grid;grid-template-columns:42px 1fr 1fr 1fr 52px 52px;gap:2px;padding:0 2px;margin-bottom:2px">';
        var hdrs = ['','FWP','MIP','EDGE','ML','SPREAD'];
        for(var hi=0;hi<hdrs.length;hi++) html+='<span style="font-size:5px;color:var(--t3);letter-spacing:.5px;text-align:'+(hi?'center':'left')+'">'+hdrs[hi]+'</span>';
        html+='</div>';
        // Rows
        var rows = [av, hv];
        for(var ri=0;ri<rows.length;ri++){
          var rv = rows[ri];
          var isBest = fwpTeam && rv.team===fwpTeam;
          var isHigherFwp = rv.fwp >= 50;
          var tColor = isHigherFwp ? 'var(--t1)' : 'var(--t3)';
          var eColor = isHigherFwp ? (rv.edge>=10?'var(--green)':rv.edge>=5?'var(--g2)':rv.edge>=1?'var(--yellow)':rv.edge>=0?'var(--t3)':'var(--red)') : 'var(--t3)';
          html+='<div style="display:grid;grid-template-columns:42px 1fr 1fr 1fr 52px 52px;gap:2px;padding:3px 2px;border-radius:3px;margin-bottom:1px;'+(isHigherFwp?'background:rgba(0,200,83,.08);border-left:2px solid var(--green)':'border-left:2px solid transparent')+'">';
          html+='<span style="font-size:9px;font-weight:700;color:'+(isHigherFwp?'var(--t1)':'var(--t3)')+'">'+esc(rv.team)+'</span>';
          html+='<span style="font-size:10px;font-weight:600;color:'+tColor+';text-align:center">'+rv.fwp.toFixed(0)+'%</span>';
          html+='<span style="font-size:10px;color:'+(isHigherFwp?'var(--t2)':'var(--t3)')+';text-align:center">'+rv.mip.toFixed(1)+'%</span>';
          html+='<span style="font-size:10px;font-weight:700;color:'+eColor+';text-align:center">'+(rv.edge>=0?'+':'')+rv.edge.toFixed(1)+'%</span>';
          html+='<span style="font-size:9px;color:'+(isHigherFwp?'var(--t2)':'var(--t3)')+';text-align:center">'+esc(String(rv.ml))+'</span>';
          html+='<span style="font-size:9px;color:'+(isHigherFwp?'var(--t2)':'var(--t3)')+';text-align:center">'+esc(String(rv.spread))+'</span>';
          html+='</div>';
        }
      } else {
        // Fallback: single-line legacy edge display
        var legEdgeNum = pred.edgeNum;
        var legEdgeColor = legEdgeNum===null?'var(--t3)':legEdgeNum>=10?'var(--green)':legEdgeNum>=5?'var(--g2)':legEdgeNum>=1?'var(--yellow)':legEdgeNum>=0?'var(--t3)':'var(--red)';
        html+='<div class="dv-row"><span class="dv-label">EDGE</span><span class="dv-val" style="color:'+legEdgeColor+'">'+esc(pred.edge||'&#8212;')+'</span><span class="dv-sub">FWP '+esc(pred.fwp||'&#8212;')+'</span><span class="dv-sub">MIP '+esc(pred.mip||'N/A')+'</span></div>';
      }

      // Signal bar (entry + conviction + buy team)
      var sigType = pred.signalType || (pred.entry==='OPTIMAL WINDOW'||pred.entry==='WINDOW OPEN'?(bestTeam?'BUY '+bestTeam:'WINDOW'):pred.entry==='COUNTER-SIGNAL'?'COUNTER':pred.entry==='NO WINDOW'?'NO VALUE':'PASS');
      var sigNote = pred.signalNote || pred.prediction || '';
      var sigIcon = sigType.startsWith('BUY')?'&#9889; ':sigType==='NO VALUE'?'&#9675; ':sigType==='COUNTER'?'&#10005; ':'&#9675; ';
      var sigCol = sigType.startsWith('BUY')?'var(--green)':sigType==='COUNTER'?'var(--red)':'var(--t3)';
      html+='<div style="margin-top:6px;padding:5px 7px;border-radius:4px;border:1px solid '+(bestTeam?'var(--green)':'var(--b1)')+';background:'+(bestTeam?'rgba(0,200,83,.06)':'rgba(255,255,255,.02)')+';display:flex;align-items:center;gap:6px">';
      html+='<span style="font-size:6.5px;font-weight:700;letter-spacing:.8px;color:'+sigCol+';white-space:nowrap">'+sigIcon+esc(sigType)+'</span>';
      html+='<span style="font-size:6.5px;color:var(--t2)">'+esc(sigNote)+'</span>';
      html+='</div>';

      // Entry + Conviction tags
      html+='<div class="dv-row" style="margin-top:5px"><span class="dv-label">ENTRY</span><span class="dv-tag" style="color:'+entryColor+';border-color:'+entryColor+'">'+esc(pred.entry||'&#8212;')+'</span><span class="dv-tag" style="color:'+convColor+';border-color:'+convColor+';margin-left:4px">'+esc(pred.conviction||'&#8212;')+'</span></div>';

      // Spread analysis (from Sonnet)
      if(pred.spreadAnalysis){
        html+='<div style="font-size:6px;color:var(--t2);margin-top:3px;padding:2px 0"><span style="color:var(--amber);font-size:5.5px;letter-spacing:.5px">SPREAD: </span>'+esc(pred.spreadAnalysis)+'</div>';
      }

      // Clutch
      html+='<div class="dv-row" style="margin-top:2px"><span class="dv-label">CLUTCH</span><span class="dv-sub">'+esc(pred.clutch||'No data')+'</span></div>';

      // Prediction
      html+='<div class="dv-pred">'+esc(pred.prediction||'')+'</div>';

      // Peak edge + edge history
      if(peakEdge) html+='<div class="dv-row"><span class="dv-label">PEAK</span><span class="dv-sub" style="color:var(--t2)">+'+peakEdge.edgeNum.toFixed(1)+'% at '+peakEdge.time+' ('+peakEdge.score+')</span></div>';
      if(eh.length>=3) html+='<div style="font-size:5px;color:var(--t2);margin-top:2px;letter-spacing:.5px">EDGE: '+eh.slice(-6).map(function(e){return (e.edgeNum>=0?'+':'')+e.edgeNum.toFixed(0)+'%';}).join(' &#8594; ')+'</div>';
      html+='</div>';
    } else if(cs.analyzing){
      html+='<div class="dv"><div class="dv-hdr">VALUE READ</div><div class="analysis-loading"><div class="spin"></div> Sonnet analyzing&#8230;</div></div>';
    } else {
      html+='<div class="dv"><div class="dv-hdr">VALUE READ<span style="margin-left:auto">'+analyzeBtn+'</span></div><div style="font-size:6px;color:var(--t3);padding:2px 0">'+(cs.analysisError?'<span style="color:var(--red)">&#9888; '+esc(cs.analysisError)+'</span>':game.period<2?'Predictive layer activates Q2+ &#8212; press &#9889; to analyze':'Awaiting analysis &#8212; press &#9889; ANALYZE')+'</div></div>';
    }

    // ─── GAME NARRATIVE STRIP (analysis history timeline — after value read) ───
    var nh = cs.analysisHistory;
    if(nh && nh.length > 0){
      html+='<div style="padding:6px 10px;border-top:1px solid var(--b1)">';
      html+='<div style="font-size:6px;color:#67e8f9;letter-spacing:1.5px;margin-bottom:5px;font-family:inherit">GAME NARRATIVE <span style="color:var(--t3);letter-spacing:0">('+nh.length+' read'+(nh.length>1?'s':'')+')</span></div>';
      html+='<div style="display:flex;gap:3px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch">';
      for(var ni=0;ni<nh.length;ni++){
        var ne = nh[ni];
        var nCtrlCol = ne.controlScore>=0.75?'var(--green)':ne.controlScore>=0.60?'var(--g2)':ne.controlScore>=0.45?'var(--yellow)':'var(--t3)';
        var nEntCol = ne.entry==='OPTIMAL WINDOW'?'var(--green)':ne.entry==='WINDOW OPEN'?'var(--g2)':ne.entry==='WINDOW CLOSING'?'var(--yellow)':ne.entry==='COUNTER-SIGNAL'?'var(--red)':'var(--t3)';
        var nLsCol = sustColor(ne.leadSust);
        var nTsCol = sustColor(ne.trailSust);
        var isLatest = ni===nh.length-1;
        html+='<div style="min-width:72px;max-width:82px;flex-shrink:0;padding:4px 5px;border-radius:4px;border:1px solid '+(isLatest?'var(--b2)':'var(--b1)')+';background:'+(isLatest?'rgba(255,255,255,.04)':'rgba(255,255,255,.01)')+'">';
        html+='<div style="font-size:5.5px;color:var(--t3);margin-bottom:2px">Q'+(ne.period||'?')+(ne.clock?' '+ne.clock:'')+' <span style="color:var(--t2)">'+(ne.time||'')+'</span></div>';
        html+='<div style="font-size:7px;color:var(--t2);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(ne.score||'')+'</div>';
        html+='<div style="display:flex;align-items:center;gap:3px;margin-bottom:2px"><span style="font-size:7px;font-weight:700;color:'+nCtrlCol+'">'+(ne.controlTeam||'?')+'</span><span style="font-size:8px;font-weight:700;color:'+nCtrlCol+'">'+(ne.controlScore?ne.controlScore.toFixed(2):'?')+'</span></div>';
        html+='<div style="display:flex;gap:2px;align-items:center;margin-bottom:2px"><span style="font-size:5px;color:'+nLsCol+';border:1px solid '+nLsCol+';padding:0 2px;border-radius:2px">'+(ne.leadTeam||'L')+' '+(ne.leadSust?ne.leadSust.substring(0,4).toUpperCase():'?')+'</span>';
        html+='<span style="font-size:5px;color:'+nTsCol+';border:1px solid '+nTsCol+';padding:0 2px;border-radius:2px">'+(ne.trailTeam||'T')+' '+(ne.trailSust?ne.trailSust.substring(0,4).toUpperCase():'?')+'</span></div>';
        html+='<div style="font-size:5px;color:'+nEntCol+';letter-spacing:.3px">'+(ne.entry?ne.entry.replace('WINDOW ','W/'):ne.conviction||'—')+'</div>';
        html+='</div>';
      }
      html+='</div>';
      html+='</div>';
    }

    // ─── DATA INPUTS (Clutch + Odds) ───
    const cl = cs.clutchData, od = cs.oddsData;
    // ─── MARKET & CLUTCH (read-only, collapsible) ───
    const mktHasData = od || cl || cs.trackingData;
    const mktCollapsed = cs.mktCollapsed !== false; // default collapsed
    const mktStatus = (od?'<span style="color:var(--green)">✓ ODDS</span>':'<span style="color:var(--t3)">no odds</span>')+' · '+(cl?'<span style="color:var(--green)">✓ CLUTCH</span>':'<span style="color:var(--t3)">no clutch</span>')+(cs.trackingData?' · <span style="color:var(--green)">✓ TRK</span>':'');
    html+=`<div class="data-inputs" style="padding:3px 11px">
      <div class="di-hdr" style="cursor:pointer;margin-bottom:${mktCollapsed?'0':'3px'}" onclick="cardState['${id}'].mktCollapsed=!cardState['${id}'].mktCollapsed;renderCard(games.find(g=>g.id==='${id}'))">
        <span>MARKET & CLUTCH</span><span style="font-size:4.5px;margin-left:4px">${mktStatus}</span>
        <span style="margin-left:auto;display:flex;align-items:center;gap:4px">
          <button class="di-btn" style="background:${cs.enriching?'var(--b2)':cs.enrichDone?'rgba(0,255,136,.15)':'rgba(147,130,220,.15)'};color:${cs.enriching?'var(--t3)':cs.enrichDone?'var(--green)':'#9382dc'};padding:1px 5px" onclick="event.stopPropagation();enrichFromBDL('${id}')" ${cs.enriching?'disabled':''}>${cs.enriching?'⏳...':cs.enrichDone?'✓ ODDS':'⚡ ODDS'}</button>
          <span style="font-size:6px;color:var(--t3);display:inline-block;transition:transform .2s;transform:rotate(${mktCollapsed?'0':'90'}deg)">&#9656;</span>
        </span>
      </div>`;
    if(!mktCollapsed){
      // Odds row (read-only)
      if(od){
        const mv = oddsMovement(cs);
        html+=`<div style="display:flex;gap:8px;align-items:baseline;margin-bottom:2px;flex-wrap:wrap">
          <span style="font-size:5px;color:var(--amber);width:28px">ODDS</span>
          <span style="font-size:6px"><span style="color:var(--t1);font-weight:600">${esc(hA)}</span> <span style="color:var(--t1)">${od.homeSpread||'—'}</span> <span style="color:var(--t3)">ML</span> <span style="color:var(--t1)">${od.homeML||'—'}</span></span>
          <span style="font-size:6px"><span style="color:var(--t1);font-weight:600">${esc(aA)}</span> <span style="color:var(--t3)">ML</span> <span style="color:var(--t1)">${od.awayML||'—'}</span></span>
          <span style="font-size:6px"><span style="color:var(--t3)">O/U</span> <span style="color:var(--t1)">${od.total||'—'}</span></span>
        </div>`;
        if(mv){
          const mvCell = (d) => d ? `<span style="color:${d.color}">${d.val}</span>` : '—';
          html+=`<div style="font-size:4.5px;color:var(--t3);margin-bottom:2px;margin-left:28px">MOVE: sprd ${mvCell(mv.spread)} · ${esc(hA)} ${mvCell(mv.homeML)} · ${esc(aA)} ${mvCell(mv.awayML)} · O/U ${mv.total?mvCell(mv.total):'—'} (${mv.pulls} pulls)</div>`;
        }
      } else {
        html+=`<div style="font-size:5px;color:var(--t3);margin-bottom:2px">No odds — tap ⚡ ODDS to pull</div>`;
      }
      // Clutch row (read-only)
      if(cl){
        const cRow = (label, d) => {
          if(!d || (!d.netRtg && d.netRtg!==0)) return '';
          const nrCol = parseFloat(d.netRtg)>=0?'var(--green)':parseFloat(d.netRtg)>=-2?'var(--yellow)':'var(--red)';
          return `<div style="display:flex;gap:5px;align-items:baseline;margin-bottom:1px">
            <span style="font-size:5.5px;color:var(--t1);font-weight:600;width:28px">${label}</span>
            <span style="font-size:6px;color:${nrCol};font-weight:600">Net ${d.netRtg}</span>
            <span style="font-size:5.5px"><span style="color:var(--t3)">Off</span> <span style="color:var(--t1)">${d.offRtg??'—'}</span> <span style="color:var(--t3)">Def</span> <span style="color:var(--t1)">${d.defRtg??'—'}</span></span>
            <span style="font-size:5.5px"><span style="color:var(--t3)">GP</span> <span style="color:var(--t1)">${d.gp??'—'}</span> <span style="color:var(--t1)">${d.wl??''}</span></span>
          </div>`;
        };
        html+='<div style="border-top:1px solid var(--b1);padding-top:2px;margin-top:2px">';
        html+=`<div style="font-size:4.5px;color:var(--amber);letter-spacing:1px;margin-bottom:2px">L15 CLUTCH (Tier ${cs.clutchTier||'?'})</div>`;
        html+=cRow(esc(hA), cl.home);
        html+=cRow(esc(aA), cl.away);
        // Extra clutch fields if available
        if(cl.home?.efg || cl.away?.efg){
          html+=`<div style="font-size:5px;color:var(--t2);margin-top:1px">`;
          if(cl.home?.efg) html+=`<span style="color:var(--t1);font-weight:600">${esc(hA)}</span>: eFG ${cl.home.efg} TS ${cl.home.ts||'—'} Pace ${cl.home.pace||'—'} PIE ${cl.home.pie||'—'} `;
          if(cl.away?.efg) html+=`<span style="color:var(--t1);font-weight:600">${esc(aA)}</span>: eFG ${cl.away.efg} TS ${cl.away.ts||'—'} Pace ${cl.away.pace||'—'} PIE ${cl.away.pie||'—'}`;
          html+=`</div>`;
        }
        html+='</div>';
      } else {
        html+=`<div style="font-size:5px;color:var(--t3);border-top:1px solid var(--b1);padding-top:2px;margin-top:2px">No clutch — upload L15 via OCR</div>`;
      }
      // Tracking baselines
      if(cs.trackingData){
        const ht=cs.trackingData.home||{}, at=cs.trackingData.away||{};
        html+=`<div style="font-size:5px;color:var(--t2);border-top:1px solid var(--b1);padding-top:2px;margin-top:2px">`;
        if(ht.catchAndShoot||at.catchAndShoot) html+=`C&S: <span style="color:var(--t1);font-weight:600">${esc(aA)}</span> ${at.catchAndShoot?.efg||'?'}% · <span style="color:var(--t1);font-weight:600">${esc(hA)}</span> ${ht.catchAndShoot?.efg||'?'}% `;
        if(ht.pullUp||at.pullUp) html+=`Pull-up: <span style="color:var(--t1);font-weight:600">${esc(aA)}</span> ${at.pullUp?.efg||'?'}% · <span style="color:var(--t1);font-weight:600">${esc(hA)}</span> ${ht.pullUp?.efg||'?'}%`;
        html+=`</div>`;
      }
    }
    html+=`</div>`;

    // ─── EVIDENCE VIEW TOGGLE ───
    const pbpTs = cs.pbpTime ? 'Q'+(cs.pbpPeriod||'?')+' '+cs.pbpTime.toLocaleTimeString() : '';
    const depthBtn = `<button class="di-btn" style="background:${cs.pbpLoading?'var(--b2)':cs.pbpAudit?'rgba(0,255,136,.15)':'rgba(147,130,220,.15)'};color:${cs.pbpLoading?'var(--t3)':cs.pbpAudit?'var(--green)':'#9382dc'};font-size:6px;padding:1px 5px;margin-left:4px" onclick="event.stopPropagation();fetchPBP('${id}')" ${cs.pbpLoading?'disabled':''}>${cs.pbpLoading?'⏳ PBP...':cs.pbpAudit?'✓ DEPTH ('+pbpTs+')':'⚡ DEPTH'}</button>`;
    html+=`<div class="ev-toggle ${cs.evCollapsed?'':'open'}" id="ev-toggle-${id}" onclick="toggleEV('${id}')">
      EVIDENCE<span style="font-size:5px;color:var(--t3);margin-left:1px">▾</span> <span class="arr">▸</span>
      <span style="margin-left:auto;display:flex;align-items:center;gap:6px">
        <span style="font-size:7px;color:${v.color};letter-spacing:.5px">CONTROL <span style="font-size:9px;font-weight:600">${esc(ind.controlTeam)}</span> <span style="font-size:9px">${ind.score.toFixed(2)}</span></span>
        <span style="font-size:6px;color:var(--t3)">·</span>
        <span style="font-size:7px;color:${ind.traj.lean!=='NEUTRAL'&&!ind.traj.tooEarly?'var(--amber)':'var(--t3)'}">TRAJ ${ind.traj.tooEarly?'Q1':esc(ind.traj.lean)+' '+ind.traj.count+'/'+ind.traj.total}</span>
        ${depthBtn}
      </span>
    </div>`;

    // ─── EVIDENCE BODY (collapsible) ───
    html+=`<div class="ev-body ${cs.evCollapsed?'collapsed':''}" id="ev-body-${id}" style="${cs.evCollapsed?'max-height:0':'max-height:2000px'}">`;

    // Indicators
    html+=`<div class="inds">
    ${[{id:'I1',nm:'POSSESS/TRANS',wt:25,d:ind.I1},{id:'I2',nm:'RIM/FOUL',wt:25,d:ind.I2},
       {id:'I3',nm:'SHOT QUALITY',wt:20,d:ind.I3},{id:'I4',nm:'LINEUP INTEG',wt:20,d:ind.I4},
       {id:'I5',nm:'TEMPO/EFF',wt:10,d:ind.I5}].map(({id:iid,nm,wt,d})=>{
      let displayScore;
      if(d.sonnet){
        const leaderIsControl = d.leader.toUpperCase().substring(0,3) === ind.controlTeam.toUpperCase().substring(0,3);
        displayScore = leaderIsControl ? d.rawScore : (1 - d.rawScore);
      } else {
        displayScore = d.score;
      }
      const col = d.sonnet ? indColor(displayScore) : (d.score===1?'var(--green)':d.score===.5?'var(--yellow)':'var(--red)');
      const pc = d.sonnet ? pipClass(displayScore) : (d.score===1?'pw':d.score===.5?'pd':'pl');
      return `
      <div class="ind">
        <span class="ii">${iid}</span><span class="in">${nm}</span><span class="iw">${wt}%</span>
        <div class="pip ${pc}"></div>
        <span class="il" style="color:${col}">${esc(d.leader)}${d.sonnet?' <span style="opacity:0.6">'+d.rawScore.toFixed(2)+'</span>':''}</span>
        ${d.sonnet?'<span style="color:#a78bfa;font-size:5px;margin-left:2px">◈</span>':''}
        <span class="id">${esc(d.detail)}</span>
      </div>`;}).join('')}
    </div>`;

    // Trajectory
    html+=`<div class="traj">
      <div class="th">TRAJECTORY
        ${!ind.traj.tooEarly?`<span class="tl" style="color:${ind.traj.lean==='NEUTRAL'?'var(--t3)':'var(--amber)'};border-color:${ind.traj.lean==='NEUTRAL'?'var(--b2)':'var(--amber)'}">${esc(ind.traj.lean)}${ind.traj.total>0?' '+ind.traj.count+'/'+ind.traj.total:''}</span>`:''}
      </div>
      ${ind.traj.tooEarly
        ?'<div style="font-size:6px;color:var(--t3)">Q1 — trajectory check begins Q2</div>'
        :ind.traj.signals.length>0
          ?ind.traj.signals.map(s=>`<div class="ts"><span class="tk" style="color:${s.color}">${s.key}</span><span class="tt" style="color:${s.color==='#3e3e48'?'var(--t3)':s.color}">${esc(s.text)}</span></div>`).join('')
          :(rawInd&&rawInd.traj&&!rawInd.traj.tooEarly
            ?rawInd.traj.signals.map(s=>`<div class="ts"><span class="tk" style="color:${s.color}">${s.key}</span><span class="tt" style="color:${s.color==='#3e3e48'?'var(--t3)':s.color}">${esc(s.text)}</span></div>`).join('')
            :'<div style="font-size:6px;color:var(--t3)">See Sonnet analysis for trajectory detail</div>')}
    </div>`;

    // ─── PBP DEPTH AUDIT (when available) ───
    if(cs.pbpAudit){
      const pbp = cs.pbpAudit;
      const hPbp = pbp.home, aPbp = pbp.away;
      const pbpAge = cs.pbpTime ? Math.round((Date.now() - cs.pbpTime.getTime())/60000) : '?';
      html+=`<div class="traj" style="border-top:1px solid var(--b1);margin-top:2px">
        <div class="th">DEPTH AUDIT <span style="font-size:5px;color:var(--t3)">Q${cs.pbpPeriod||'?'} · ${pbpAge}m ago</span></div>`;

      // Shot creation quality
      const hA3 = hPbp.threes, aA3 = aPbp.threes;
      const hAstPct = hA3.made>0 ? (hA3.assisted/hA3.made*100).toFixed(0) : '0';
      const aAstPct = aA3.made>0 ? (aA3.assisted/aA3.made*100).toFixed(0) : '0';
      html+=`<div class="ts"><span class="tk" style="color:#a78bfa">3PT</span><span class="tt">${pbp.homeAlias} ${hA3.made}/${hA3.att} (${hA3.pct}%) ${hAstPct}% ast · corner ${hA3.corner.made}/${hA3.corner.att} above ${hA3.above.made}/${hA3.above.att}</span></div>`;
      html+=`<div class="ts"><span class="tk" style="color:#a78bfa">3PT</span><span class="tt">${pbp.awayAlias} ${aA3.made}/${aA3.att} (${aA3.pct}%) ${aAstPct}% ast · corner ${aA3.corner.made}/${aA3.corner.att} above ${aA3.above.made}/${aA3.above.att}</span></div>`;

      // Player 3PT detail (top shooters)
      [pbp.homeAlias, pbp.awayAlias].forEach((tm, ti) => {
        const tPbp = ti===0 ? hPbp : aPbp;
        tPbp.threes.byPlayer.slice(0,3).forEach(p => {
          const astFlag = p.made>0 && p.assisted>0 ? ' ('+p.assisted+' ast)' : '';
          const ctx = Object.entries(p.contexts).map(([k,v])=>k+':'+v).join(' ');
          html+=`<div class="ts"><span class="tk" style="color:var(--t3);font-size:5px">  </span><span class="tt" style="font-size:5px;color:var(--t3)">${p.name}: ${p.made}/${p.att}${astFlag} · ${ctx}</span></div>`;
        });
      });

      // Rim pressure
      html+=`<div class="ts"><span class="tk" style="color:#ff9f43">RIM</span><span class="tt">${pbp.homeAlias} ${hPbp.rim.made}/${hPbp.rim.att} (${hPbp.rim.pct}%) · ${pbp.awayAlias} ${aPbp.rim.made}/${aPbp.rim.att} (${aPbp.rim.pct}%)</span></div>`;

      // Mid-range
      html+=`<div class="ts"><span class="tk" style="color:var(--t3)">MID</span><span class="tt">${pbp.homeAlias} ${hPbp.mid.made}/${hPbp.mid.att} (${hPbp.mid.pct}%) ${hPbp.mid.att>0?(hPbp.mid.assisted/Math.max(hPbp.mid.made,1)*100).toFixed(0)+'% ast':''} · ${pbp.awayAlias} ${aPbp.mid.made}/${aPbp.mid.att} (${aPbp.mid.pct}%) ${aPbp.mid.att>0?(aPbp.mid.assisted/Math.max(aPbp.mid.made,1)*100).toFixed(0)+'% ast':''}</span></div>`;

      // Chaos layer — forced vs unforced TOs
      const hTO = hPbp.tos, aTO = aPbp.tos;
      const hForcedPct = hTO.total>0 ? ((hTO.forced||0)/hTO.total*100).toFixed(0) : '?';
      const aForcedPct = aTO.total>0 ? ((aTO.forced||0)/aTO.total*100).toFixed(0) : '?';
      html+=`<div class="ts"><span class="tk" style="color:${Math.abs((hTO.forced||0)-(aTO.forced||0))>=3?'#ff6b6b':'var(--t3)'}">TOs</span><span class="tt">${pbp.homeAlias} ${hTO.total} (${hTO.forced||0}F/${hTO.unforced||0}U${hTO.unknown>0?'/'+hTO.unknown+'?':''}) · ${pbp.awayAlias} ${aTO.total} (${aTO.forced||0}F/${aTO.unforced||0}U${aTO.unknown>0?'/'+aTO.unknown+'?':''})</span></div>`;

      // Shot diet breakdown
      html+=`<div class="ts"><span class="tk" style="color:var(--t3)">DIET</span><span class="tt">${pbp.homeAlias} 3P:${hPbp.shotDiet.threePct}% rim:${hPbp.shotDiet.rimPct}% mid:${hPbp.shotDiet.midPct}% · ${pbp.awayAlias} 3P:${aPbp.shotDiet.threePct}% rim:${aPbp.shotDiet.rimPct}% mid:${aPbp.shotDiet.midPct}%</span></div>`;

      // Scoring runs
      if(pbp.runs.length > 0){
        pbp.runs.slice(0,3).forEach(r => {
          const mech = r.mechanism.reduce((acc,v)=>{acc[v]=(acc[v]||0)+1;return acc;},{});
          const mechStr = Object.entries(mech).map(([k,v])=>v+k).join('+');
          html+=`<div class="ts"><span class="tk" style="color:#ffd166">RUN</span><span class="tt">${r.team} ${r.pts}-0 (Q${r.q}) — ${mechStr}${r.lineup.length>0?' · '+r.lineup.slice(0,3).map(n=>n.split(' ').pop()).join('/'):''}</span></div>`;
        });
      }

      html+=`</div>`;
    }

    // PBP Depth Audit display (when available)
    if(cs.pbpAudit){
      const pa = cs.pbpAudit;
      html+=`<div style="padding:4px 8px;border-top:1px solid var(--b1)">
        <div style="font-size:6px;color:var(--t2);letter-spacing:1px;margin-bottom:3px">DEPTH AUDIT <span style="color:var(--t3)">Q${cs.pbpPeriod||'?'} · ${pa.totalShots} shots · ${pa.totalTOs} TOs · ${pa.runs.length} runs</span></div>`;
      [pa.away, pa.home].forEach(tm=>{
        if(!tm)return;
        const alias = tm===pa.away ? pa.awayAlias : pa.homeAlias;
        html+=`<div style="font-size:6px;color:var(--t1);margin:2px 0">${esc(alias)}:</div>`;
        if(tm.threes&&tm.threes.att>0)html+=`<div style="font-size:5.5px;color:var(--t2);padding-left:6px">3PT ${tm.threes.made}/${tm.threes.att} (${tm.threes.pct}%) · ${tm.threes.assisted}/${tm.threes.made} ast · C${tm.threes.corner?.att||0}/AB${tm.threes.above?.att||0}</div>`;
        if(tm.rim&&tm.rim.att>0)html+=`<div style="font-size:5.5px;color:var(--t2);padding-left:6px">RIM ${tm.rim.made}/${tm.rim.att} (${tm.rim.pct}%)</div>`;
        if(tm.mid&&tm.mid.att>0)html+=`<div style="font-size:5.5px;color:var(--t2);padding-left:6px">MID ${tm.mid.made}/${tm.mid.att} (${tm.mid.pct}%) · ${tm.mid.assisted}/${tm.mid.made} ast</div>`;
        if(tm.tos&&tm.tos.total>0)html+=`<div style="font-size:5.5px;color:var(--t2);padding-left:6px">TO ${tm.tos.forced}f/${tm.tos.unforced}u${tm.tos.unknown>0?'/'+tm.tos.unknown+'?':''}</div>`;
        if(tm.shotDiet)html+=`<div style="font-size:5.5px;color:var(--t3);padding-left:6px">diet: rim${tm.shotDiet.rimPct}% mid${tm.shotDiet.midPct}% 3pt${tm.shotDiet.threePct}%</div>`;
      });
      if(pa.runs&&pa.runs.length>0){
        html+=`<div style="font-size:6px;color:var(--t2);margin-top:2px">RUNS: ${pa.runs.map(r=>`${esc(r.team)} ${r.pts}pt Q${r.q} (${Array.isArray(r.mechanism)?r.mechanism.join('+'):r.mechanism||'?'})`).join(' · ')}</div>`;
      }
      html+=`</div>`;
    }

    // Full Sonnet analysis text (in evidence view)
    html+=`<div class="analysis" id="analysis-${id}">`;
    if(cs.analysis){
      const usage=cs.analysisUsage;
      const cost=usage?((usage.input_tokens*3+usage.output_tokens*15)/1000000).toFixed(4):'?';
      html+=`<div class="analysis-hdr">FULL ANALYSIS<span class="analysis-cost">~$${cost} · ${cs.analysisTime?.toLocaleTimeString()||''}</span></div><div class="analysis-body">${esc(cs.analysis)}</div>`;
    } else if(cs.analyzing){
      html+=`<div class="analysis-loading"><div class="spin"></div> Analyzing…</div>`;
    } else {
      html+=`<div style="font-size:6px;color:var(--t3)">No analysis yet</div>`;
    }
    html+=`</div>`;

    // Close evidence body
    html+=`</div>`;
  }

  // Thesis xref
  if(xrefs.length){
    html+=`<div class="xref"><div class="xh">THESIS × LIVE</div>${xrefs.map(r=>`<div class="xr ${r.level}">${esc(r.msg)}</div>`).join('')}</div>`;
  }

  // Thesis block
  html+=`<div class="thesis" id="thesis-block-${id}">
    <div class="thdr">
      PRE-GAME THESIS
      <div style="display:flex;gap:6px;align-items:center;">
        ${state==='PRE'&&!cs.generating?`<button class="tgen" onclick="generateThesis('${id}')">⚡ ${localStorage.getItem('nba4:srCache:'+id)?'GEN (cached)':'GENERATE'}</button>${localStorage.getItem('nba4:srCache:'+id)?`<button class="tedit" onclick="localStorage.removeItem('nba4:srCache:${id}');renderCard(games.find(g=>g.id==='${id}'))">🗑 CLR</button>`:''}`:''}
        <button class="tedit" onclick="startEdit('${id}')">EDIT</button>
      </div>
    </div>`;

  if(cs.generating){
    html+=`<div class="gen-progress" id="gen-progress-${id}">${(cs.genSteps||[]).map(s=>{
      const icon=s.status==='done'?'✓':s.status==='active'?'⟳':s.status==='err'?'✗':'·';
      return `<span class="gen-step ${s.status}">${icon} ${s.label}${s.error?' — '+s.error:''}</span>`;
    }).join('<br>')}</div>`;
  } else if(cs.genError && !thesis){
    html+=`<div style="font-size:7px;color:var(--red);padding:4px 0;">⚠ Thesis generation failed: ${esc(cs.genError)}</div>`;
  } else if(thesis){
    html+=`<div class="tbody">${esc(thesis)}</div>`;
    if(p.lean||p.entry||p.pass||p.watches.length){
      html+=`<div class="tpr">
        ${p.lean?`<div class="trow">LEAN: <span>${esc(p.lean)}</span></div>`:''}
        ${p.entry?`<div class="trow">ENTRY: <span>${esc(p.entry)}</span></div>`:''}
        ${p.pass?`<div class="trow">PASS IF: <span>${esc(p.pass)}</span></div>`:''}
        ${p.watches.map(w=>`<div class="trow">WATCH: <span>${esc(w)}</span></div>`).join('')}
        ${p.flags.map(f=>`<div class="trow" style="color:var(--yellow)">⚠ ${esc(f)}</div>`).join('')}
      </div>`;
    }
  } else {
    html+=`<div class="tempty">No thesis — click GENERATE or EDIT</div>`;
  }
  html+=`</div>`;

  // Logs + footer
  if(cs.logs.length){
    html+=`<div class="log">${cs.logs.map(l=>`<div class="${l.ok?'ok':'er'}">${l.t} ${esc(l.msg)}</div>`).join('')}</div>`;
  }
  if(cs.lastUp){
    const srcLabel = game.dataSource==='BDL'?'<span style="color:var(--yellow)">BDL</span>':'SR';
    const freshLabel = cs.dataFreshness==='STALE'?' · <span style="color:var(--red)">STALE</span>':cs.dataFreshness==='WATCH'?' · <span style="color:var(--yellow)">STATS LAG</span>':'';
    html+=`<div class="foot">↻ ${cs.lastUp.toLocaleTimeString()} · ${pollInterval/1000}s · ${srcLabel}${freshLabel}</div>`;
  }

  // Preserve log scroll position before re-render
  const logEl = el.querySelector('.log');
  const logScroll = logEl ? logEl.scrollTop : 0;
  const logWasAtBottom = logEl ? (logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 5) : true;
  el.innerHTML=html;
  // Restore log scroll — if user was at bottom, stay at bottom; otherwise preserve position
  const newLog = el.querySelector('.log');
  if(newLog){
    if(logWasAtBottom) newLog.scrollTop = newLog.scrollHeight;
    else newLog.scrollTop = logScroll;
  }

  // Countdown for PRE
  if(state==='PRE'&&game.scheduled){
    if(cs._countdown)clearInterval(cs._countdown);
    cs._countdown=setInterval(()=>{if(!cs.editing&&!cs.generating)renderCard(game);},1000);

// ── Thesis editing ────────────────────────────────────────────────────────
function startEdit(cardId){
  const cs=cardState[cardId];if(!cs)return;
  cs.editing=true;
  const tb=document.getElementById('thesis-block-'+cardId);
  if(!tb)return;
  const currentThesis=theses[cardId]||'';
  var h='<div class="thdr">PRE-GAME THESIS<span style="font-size:6px;color:var(--amber);letter-spacing:1px;">EDITING</span></div>';
  h+='<textarea class="ta" id="ta-'+cardId+'" autocomplete="off" autocorrect="on" spellcheck="true">'+esc(currentThesis)+'</textarea>';
  h+='<div class="thint">Lean: [team]\nEntry: [trigger]\nPass: [condition]\nWatch: [signal]\nFlag: [risk]</div>';
  h+='<div class="tbtn-row">';
  h+='<button class="tsave" onclick="saveThesisFromCard(\''+cardId+'\')">SAVE</button>';
  h+='<button class="tcancel" onclick="cancelEdit(\''+cardId+'\')">CANCEL</button>';
  h+='</div>';
  tb.innerHTML=h;
  setTimeout(function(){var ta=document.getElementById('ta-'+cardId);if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}},50);
}
function cancelEdit(cardId){const cs=cardState[cardId];if(!cs)return;cs.editing=false;const g=games.find(x=>x.id===cardId);if(g)renderCard(g);}
function saveThesisFromCard(cardId){
  const ta=document.getElementById('ta-'+cardId);if(!ta)return;
  saveThesis(cardId,ta.value);
  const cs=cardState[cardId];if(cs)cs.editing=false;
  const g=games.find(x=>x.id===cardId);if(g)renderCard(g);
}
